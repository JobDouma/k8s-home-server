apiVersion: v1
kind: Pod
metadata:
  name: nfs-test
  namespace: media
spec:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containers:
  - name: test
    image: busybox
    command:
      - sh
      - -c
      - |
        echo "UID=$(id -u) GID=$(id -g)"
        ls -ld /config
        ls -l /config
        echo "Trying to create /config/log..."
        mkdir -p /config/log
        echo "SUCCESS: directory created"
        sleep 3600
    volumeMounts:
    - name: config
      mountPath: /config
  volumes:
  - name: config
    persistentVolumeClaim:
      claimName: tank-configs
