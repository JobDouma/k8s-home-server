apiVersion: v1
kind: Secret
metadata:
  name: authentik-blueprints
  namespace: authentik
type: Opaque
stringData:
  homelab-proxy-providers.yaml: |
    ---
    version: 1
    metadata:
      name: Homelab Proxy Providers
      labels:
        blueprints.goauthentik.io/instantiate: "true"

    context:
      auth_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]

    entries:
      # -----------------------
      # Proxy Providers
      # -----------------------
      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: traefik-proxy}
        attrs:
          name: traefik-proxy
          external_host: https://traefik.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: longhorn-proxy}
        attrs:
          name: longhorn-proxy
          external_host: https://longhorn.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: blocky-proxy}
        attrs:
          name: blocky-proxy
          external_host: https://blocky.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: prometheus-proxy}
        attrs:
          name: prometheus-proxy
          external_host: https://prometheus.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: dashy-proxy}
        attrs:
          name: dashy-proxy
          external_host: https://dashy.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: radarr-proxy}
        attrs:
          name: radarr-proxy
          external_host: https://radarr.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: sonarr-proxy}
        attrs:
          name: sonarr-proxy
          external_host: https://sonarr.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: prowlarr-proxy}
        attrs:
          name: prowlarr-proxy
          external_host: https://prowlarr.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: qbittorrent-proxy}
        attrs:
          name: qbittorrent-proxy
          external_host: https://qbittorrent.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: sabnzbd-proxy}
        attrs:
          name: sabnzbd-proxy
          external_host: https://sabnzbd.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      - model: authentik_providers_proxy.proxyprovider
        state: present
        identifiers: {name: falco-proxy}
        attrs:
          name: falco-proxy
          external_host: https://falco.lan
          mode: forward_single
          authorization_flow: !Context auth_flow

      # -----------------------
      # Applications
      # -----------------------
      - model: authentik_core.application
        state: present
        identifiers: {slug: traefik}
        attrs:
          name: Traefik
          slug: traefik
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, traefik-proxy]]
          meta_launch_url: https://traefik.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: longhorn}
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-proxy]]
          meta_launch_url: https://longhorn.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: blocky}
        attrs:
          name: Blocky
          slug: blocky
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, blocky-proxy]]
          meta_launch_url: https://blocky.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: prometheus}
        attrs:
          name: Prometheus
          slug: prometheus
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, prometheus-proxy]]
          meta_launch_url: https://prometheus.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: dashy}
        attrs:
          name: Dashy
          slug: dashy
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, dashy-proxy]]
          meta_launch_url: https://dashy.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: radarr}
        attrs:
          name: Radarr
          slug: radarr
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, radarr-proxy]]
          meta_launch_url: https://radarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: sonarr}
        attrs:
          name: Sonarr
          slug: sonarr
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, sonarr-proxy]]
          meta_launch_url: https://sonarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: prowlarr}
        attrs:
          name: Prowlarr
          slug: prowlarr
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, prowlarr-proxy]]
          meta_launch_url: https://prowlarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: qbittorrent}
        attrs:
          name: qBittorrent
          slug: qbittorrent
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, qbittorrent-proxy]]
          meta_launch_url: https://qbittorrent.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: sabnzbd}
        attrs:
          name: SABnzbd
          slug: sabnzbd
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, sabnzbd-proxy]]
          meta_launch_url: https://sabnzbd.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: falco}
        attrs:
          name: Falco
          slug: falco
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, falco-proxy]]
          meta_launch_url: https://falco.lan

      # -----------------------
      # Attach Providers to Embedded Outpost
      # -----------------------
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          pk: !Find [authentik_outposts.outpost, [name, "authentik Embedded Outpost"]]
        attrs:
          providers:
            - !Find [authentik_providers_proxy.proxyprovider, [name, traefik-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, blocky-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, prometheus-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, dashy-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, radarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, sonarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, prowlarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, qbittorrent-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, sabnzbd-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, falco-proxy]]