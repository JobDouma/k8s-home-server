apiVersion: v1
kind: Secret
metadata:
  name: authentik-blueprints
  namespace: authentik
type: Opaque
stringData:
  01-homelab-providers.yaml: |
    version: 1
    metadata:
      name: Homelab Proxy Providers
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # ── REMOVED: sabnzbd (state: absent propagates deletion on next sync) ────
      # NEW: these two entries were added to clean up the old sabnzbd application
      - model: authentik_providers_proxy.proxyprovider
        state: absent
        identifiers: {name: sabnzbd-proxy}

      - model: authentik_core.application
        state: absent
        identifiers: {slug: sabnzbd}
      # ── END REMOVED ──────────────────────────────────────────────────────────

      # ── Proxy providers (unchanged) ──────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: traefik-proxy
        identifiers: {name: traefik-proxy}
        attrs:
          name: traefik-proxy
          mode: forward_single
          external_host: https://traefik.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: longhorn-proxy
        identifiers: {name: longhorn-proxy}
        attrs:
          name: longhorn-proxy
          mode: forward_single
          external_host: https://longhorn.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: blocky-proxy
        identifiers: {name: blocky-proxy}
        attrs:
          name: blocky-proxy
          mode: forward_single
          external_host: https://blocky.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: prometheus-proxy
        identifiers: {name: prometheus-proxy}
        attrs:
          name: prometheus-proxy
          mode: forward_single
          external_host: https://prometheus.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: dashy-proxy
        identifiers: {name: dashy-proxy}
        attrs:
          name: dashy-proxy
          mode: forward_single
          external_host: https://dashy.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: radarr-proxy
        identifiers: {name: radarr-proxy}
        attrs:
          name: radarr-proxy
          mode: forward_single
          external_host: https://radarr.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: sonarr-proxy
        identifiers: {name: sonarr-proxy}
        attrs:
          name: sonarr-proxy
          mode: forward_single
          external_host: https://sonarr.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: prowlarr-proxy
        identifiers: {name: prowlarr-proxy}
        attrs:
          name: prowlarr-proxy
          mode: forward_single
          external_host: https://prowlarr.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: qbittorrent-proxy
        identifiers: {name: qbittorrent-proxy}
        attrs:
          name: qbittorrent-proxy
          mode: forward_single
          external_host: https://qbittorrent.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: falco-proxy
        identifiers: {name: falco-proxy}
        attrs:
          name: falco-proxy
          mode: forward_single
          external_host: https://falco.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: gotify-proxy
        identifiers: {name: gotify-proxy}
        attrs:
          name: gotify-proxy
          mode: forward_single
          external_host: https://gotify.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      # ── NEW: Headlamp OIDC provider ──────────────────────────────────────────
      # Uses authentik-oidc-clients secret (must be created in authentik namespace)
      # with keys: headlamp-client-id, headlamp-client-secret
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        id: headlamp-oidc
        identifiers: {name: headlamp-oidc}
        attrs:
          name: headlamp-oidc
          client_type: confidential
          client_id: "$(headlamp-client-id)"
          client_secret: "$(headlamp-client-secret)"
          redirect_uris:
            - url: https://headlamp.lan/oidc-callback
              matching_mode: strict
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          sub_mode: hashed_user_id
          access_token_validity: hours=1
          refresh_token_validity: days=30
          include_claims_in_id_token: true
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
      # ── END NEW ──────────────────────────────────────────────────────────────

      # ── Applications (unchanged) ─────────────────────────────────────────────
      - model: authentik_core.application
        state: present
        identifiers: {slug: traefik}
        attrs:
          name: Traefik
          slug: traefik
          provider: !KeyOf traefik-proxy
          meta_launch_url: https://traefik.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: longhorn}
        attrs:
          name: Longhorn
          slug: longhorn
          provider: !KeyOf longhorn-proxy
          meta_launch_url: https://longhorn.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: blocky}
        attrs:
          name: Blocky
          slug: blocky
          provider: !KeyOf blocky-proxy
          meta_launch_url: https://blocky.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: prometheus}
        attrs:
          name: Prometheus
          slug: prometheus
          provider: !KeyOf prometheus-proxy
          meta_launch_url: https://prometheus.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: dashy}
        attrs:
          name: Dashy
          slug: dashy
          provider: !KeyOf dashy-proxy
          meta_launch_url: https://dashy.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: radarr}
        attrs:
          name: Radarr
          slug: radarr
          provider: !KeyOf radarr-proxy
          meta_launch_url: https://radarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: sonarr}
        attrs:
          name: Sonarr
          slug: sonarr
          provider: !KeyOf sonarr-proxy
          meta_launch_url: https://sonarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: prowlarr}
        attrs:
          name: Prowlarr
          slug: prowlarr
          provider: !KeyOf prowlarr-proxy
          meta_launch_url: https://prowlarr.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: qbittorrent}
        attrs:
          name: qBittorrent
          slug: qbittorrent
          provider: !KeyOf qbittorrent-proxy
          meta_launch_url: https://qbittorrent.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: falco}
        attrs:
          name: Falco
          slug: falco
          provider: !KeyOf falco-proxy
          meta_launch_url: https://falco.lan

      - model: authentik_core.application
        state: present
        identifiers: {slug: gotify}
        attrs:
          name: Gotify
          slug: gotify
          provider: !KeyOf gotify-proxy
          meta_launch_url: https://gotify.lan

      # ── NEW: Headlamp application ─────────────────────────────────────────────
      - model: authentik_core.application
        state: present
        identifiers: {slug: headlamp}
        attrs:
          name: Headlamp
          slug: headlamp
          provider: !KeyOf headlamp-oidc
          meta_launch_url: https://headlamp.lan
      # ── END NEW ──────────────────────────────────────────────────────────────

      # ── NEW: Uptime Kuma application ──────────────────────────────────────────
      - model: authentik_providers_proxy.proxyprovider
        state: present
        id: uptime-kuma-proxy
        identifiers: {name: uptime-kuma-proxy}
        attrs:
          name: uptime-kuma-proxy
          mode: forward_single
          external_host: https://uptime-kuma.lan
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      - model: authentik_core.application
        state: present
        identifiers: {slug: uptime-kuma}
        attrs:
          name: Uptime Kuma
          slug: uptime-kuma
          provider: !KeyOf uptime-kuma-proxy
          meta_launch_url: https://uptime-kuma.lan
      # ── END NEW ──────────────────────────────────────────────────────────────

  02-homelab-outpost.yaml: |
    version: 1
    metadata:
      name: Homelab Outpost Assignment
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_outposts.outpost
        state: present
        identifiers:
          name: "authentik Embedded Outpost"
        attrs:
          name: "authentik Embedded Outpost"
          type: proxy
          providers:
            # unchanged
            - !Find [authentik_providers_proxy.proxyprovider, [name, traefik-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, longhorn-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, blocky-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, prometheus-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, dashy-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, radarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, sonarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, prowlarr-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, qbittorrent-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, falco-proxy]]
            - !Find [authentik_providers_proxy.proxyprovider, [name, gotify-proxy]]
            # NEW: uptime-kuma added to outpost (proxy provider)
            - !Find [authentik_providers_proxy.proxyprovider, [name, uptime-kuma-proxy]]
            # NOTE: headlamp-oidc intentionally NOT listed here — OIDC providers
            # are handled directly by the authentik server, not the outpost