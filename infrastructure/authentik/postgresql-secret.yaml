# ============================================
# authentik/postgresql-secret.yaml
# (Bitnami-style keys so the embedded Postgres uses YOUR known password)
# Fill value, then encrypt with sops like your other secret.
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: authentik-postgresql-secret
  namespace: authentik
type: Opaque
stringData:
  # used by many bitnami/postgresql chart versions
  postgres-password: "REPLACE_ME"
  password: "REPLACE_ME"