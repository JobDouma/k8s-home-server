apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 15m
  timeout: 30m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: authentik
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    blueprints:
      enabled: true
      secrets:
        - authentik-blueprints
        - authentik-oidc-clients # Includes Headlamp and all future OIDC clients
    prometheus:
      rules:
        create: false

    authentik:
      existingSecret:
        secretName: authentik-secret
      error_reporting:
        enabled: false
      web:
        path: "/"

    server:
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          # CHANGED: 30s is aggressive for a homelab auth server.
          # 120s gives Prometheus the same data with 4x less scrape work.
          interval: 120s
          scrapeTimeout: 10s
      # CHANGED: 2 → 1. On a homelab, running 2 server pods means
      # double the memory, double the Python process overhead, and
      # Longhorn replicating writes for two pods' session data.
      # If your single node goes down you'd lose auth anyway since
      # the 2nd pod is on the same 3-node pool with no zone HA.
      # 1 replica is the honest homelab choice.
      replicas: 1

      # ADDED: without limits, a spike in logins or blueprint
      # processing can consume 2-3 cores temporarily. These limits
      # keep authentik from crowding out your other workloads.
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          cpu: 750m
          memory: 1Gi

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: authentik
                    app.kubernetes.io/component: server
                topologyKey: kubernetes.io/hostname

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    worker:
      replicas: 1

      # ADDED: workers handle background tasks like blueprint sync,
      # outpost health checks, and email. Unbounded they can spike
      # heavily during policy evaluation.
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 300m
          memory: 512Mi

      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: authentik
                    app.kubernetes.io/component: worker
                topologyKey: kubernetes.io/hostname

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-postgresql-secret
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 5Gi
        # ADDED: Postgres for authentik on a homelab rarely needs
        # more than 200m CPU. Without limits it can vacuum/analyze
        # and spike freely.
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi

    redis:
      enabled: true
      auth:
        enabled: false
      # ADDED: Redis for session caching is tiny workload.
      # Cap it so it doesn't quietly grow.
      master:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi   # was 128Mi
        args:
          - --appendonly yes
          - --appendfsync everysec