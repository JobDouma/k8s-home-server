apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 15m
  timeout: 30m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: authentik
      version: "2026.2.0"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:

    authentik:
      existingSecret:
        secretName: authentik-secret
      error_reporting:
        enabled: false
      web:
        path: "/"

    server:
      replicas: 1
      strategy:
        type: Recreate

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    worker:
      replicas: 1
      strategy:
        type: Recreate

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-postgresql-secret
      primary:
        podAnnotations:
          backup.velero.io/backup-volumes-excludes: "data"
        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi

    redis:
      enabled: true
      auth:
        enabled: false