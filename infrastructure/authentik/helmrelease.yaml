apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 15m
  timeout: 30m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: authentik
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system

  values:
    prometheus:
      serviceMonitor:
        create: true
        interval: 30s
        scrapeTimeout: 10s
      rules:
        create: false
        
    authentik:
      existingSecret:
        secretName: authentik-secret
      error_reporting:
        enabled: false
      web:
        path: "/"

    server:
      replicas: 2
      # RollingUpdate is safe with 2+ replicas — always 1 server available during upgrades
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1

      # Spread server pods across nodes — 1 survives any single node loss
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: authentik
                    app.kubernetes.io/component: server
                topologyKey: kubernetes.io/hostname

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    worker:
      replicas: 1
      # Workers are stateless — RollingUpdate is safe
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: authentik
                    app.kubernetes.io/component: worker
                topologyKey: kubernetes.io/hostname

      startupProbe:
        failureThreshold: 120
        periodSeconds: 10
        timeoutSeconds: 3

      readinessProbe: {}
      livenessProbe: {}

    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
        existingSecret: authentik-postgresql-secret
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi

    redis:
      enabled: true
      auth:
        enabled: false