apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-backup
  namespace: longhorn
spec:
  cron: "0 2 * * *"    # 02:00 — 1 hour before Velero at 03:00
  task: backup
  groups:
    - default
  retain: 7             # 7 daily backups = 1 week of history
  concurrency: 1
  labels: {}
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: snapshot
  namespace: longhorn
spec:
  cron: "0 */4 * * *"  # every 4 hours instead of every hour
  task: snapshot
  groups:
    - default
  retain: 6             # 6 × 4h = 24h of snapshot history
  concurrency: 1
  labels: {}