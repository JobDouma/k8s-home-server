apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 15m

  chart:
    spec:
      chart: longhorn
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    defaultSettings:
      defaultReplicaCount: 2
      createDefaultDiskLabeledNodes: false
      defaultDataPath: /var/lib/longhorn
      replicaAutoBalance: best-effort

    longhornManager:
      tolerations:
        - operator: Exists
      nodeSelector: {}

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain

    csi:
      kubeletRootDir: /var/lib/kubelet
