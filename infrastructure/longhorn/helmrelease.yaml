# ============================================
# longhorn/helmrelease.yaml
# ============================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 15m

  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace

  values:
    defaultSettings:
      defaultReplicaCount: 2
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn
      backupTarget: "nfs://192.168.2.5:/mnt/tank/configs/longhorn-backups"
      backupTargetCredentialSecret: ""

      # CHANGED: best-effort means Longhorn continuously calculates
      # replica placement across nodes and moves replicas to achieve
      # balance. On a 3-node homelab this runs background I/O and
      # CPU work constantly. "disabled" means replicas stay where
      # they are placed at volume creation — no ongoing rebalancing.
      replicaAutoBalance: disabled

      # CHANGED: fast-check still runs a CRC scan on every snapshot
      # which is I/O and CPU work on each node. For a homelab with
      # NFS backups, this is unnecessary overhead. Your backups are
      # the integrity guarantee.
      snapshotDataIntegrity: disabled

      # CHANGED: 600s (10 min) means if a node blips, Longhorn starts
      # rebuilding replicas after just 10 minutes. Rebuilds are the
      # most CPU/IO intensive thing Longhorn does. 1800s (30 min) is
      # better for a homelab where node restarts are expected.
      replicaReplenishmentWaitInterval: 1800

      # ADDED: without this, if your NFS backup kicks off, Longhorn
      # can run unlimited concurrent backup jobs and saturate your
      # nodes. 1 concurrent backup is plenty for a homelab.
      backupConcurrentLimit: 1

      # These were already well set, kept as-is:
      recurringJobMaxRetention: 10
      guaranteedEngineManagerCPU: 0
      guaranteedReplicaManagerCPU: 0
      replicaFileSyncHTTPClientTimeout: 30
      disableRevisionCounter: true
      concurrentReplicaRebuildPerNodeLimit: 1
      engineReplicaTimeout: 8
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      replicaSoftAntiAffinity: true
      replicaZoneSoftAntiAffinity: true
      disableReplicaRebuildOnNodeDrainingAndVolumeMigrating: false
      autoCleanupSystemGeneratedSnapshot: true
      autoDeletePodWhenVolumeDetachedUnexpectedly: true

    longhornManager:
      tolerations:
        - operator: Exists
      nodeSelector: {}

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain

    csi:
      kubeletRootDir: /var/lib/kubelet

    longhornDriver:
      tolerations:
        - operator: Exists

    longhornUI:
      enabled: true
      service:
        type: ClusterIP
      tolerations:
        - operator: Exists
    longhornCSIPlugin:
      tolerations:
        - operator: Exists
