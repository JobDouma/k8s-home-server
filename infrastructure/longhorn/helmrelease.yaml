apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 15m
  chart:
    spec:
      chart: longhorn
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2

    defaultSettings:
      defaultReplicaCount: 2
      backupTarget: ""
      createDefaultDiskLabeledNodes: false
