# ============================================
# longhorn/helmrelease.yaml
# (Redeploy Longhorn safely via Flux; keeps data on /var/lib/longhorn)
# ============================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 15m

  chart:
    spec:
      chart: longhorn
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace

  values:
    defaultSettings:
      defaultReplicaCount: 2
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn
      replicaAutoBalance: best-effort

    longhornManager:
      tolerations:
        - operator: Exists
      nodeSelector: {}

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain

    csi:
      kubeletRootDir: /var/lib/kubelet
    
    longhornDriver:
      tolerations:
        - operator: Exists

    longhornUI:
      enabled: true               # <-- enable the UI
      service:
        type: ClusterIP           # use ClusterIP, we’ll expose it via Traefik
      tolerations:
        - operator: Exists