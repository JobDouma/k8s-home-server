# ============================================
# longhorn/helmrelease.yaml
# ============================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn
spec:
  interval: 15m

  chart:
    spec:
      chart: longhorn
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace

  values:
    defaultSettings:
      defaultReplicaCount: 3                  # ← was 2
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn
      replicaAutoBalance: best-effort
      backupTarget: "nfs://192.168.2.5:/mnt/tank/configs/longhorn-backups"
      backupTargetCredentialSecret: ""
      snapshotDataIntegrity: fast-check
      recurringJobMaxRetention: 10

    longhornManager:
      tolerations:
        - operator: Exists
      nodeSelector: {}

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3             # ← was 2
      reclaimPolicy: Retain

    csi:
      kubeletRootDir: /var/lib/kubelet

    longhornDriver:
      tolerations:
        - operator: Exists

    longhornUI:
      enabled: true
      service:
        type: ClusterIP
      tolerations:
        - operator: Exists