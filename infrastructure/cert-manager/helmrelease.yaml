apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.3"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  values:
    crds:
      enabled: true
    replicaCount: 1
    webhook:
      config:
        apiVersion: webhook.config.cert-manager.io/v1alpha1
        kind: WebhookConfiguration
        timeoutSeconds: 30
      extraArgs:
        - --feature-gates=AdditionalCertificateOutputFormats=true
    # Prevent webhook failures from blocking Flux during bootstrap
    # when cert-manager itself is still starting up
    global:
      webhook:
        timeoutSeconds: 30
