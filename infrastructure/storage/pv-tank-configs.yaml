apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-tank-configs
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  nfs:
    server: 192.168.2.5
    path: /mnt/tank/configs

