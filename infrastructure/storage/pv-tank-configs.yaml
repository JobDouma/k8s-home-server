# ============================================
# PersistentVolume for MEDIA namespace
# ============================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-tank-configs-media
spec:
  capacity:
    storage: 20Gi

  volumeMode: Filesystem

  accessModes:
    - ReadWriteMany

  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime

  nfs:
    server: 192.168.2.5
    path: /mnt/tank/configs

---
