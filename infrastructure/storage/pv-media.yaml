apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-media
  labels:
    backup.velero.io/exclude-from-backup: "true"
spec:
  capacity:
    storage: 20Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=4.1
    - hard
    - noatime
  nfs:
    server: 192.168.2.5
    path: /mnt/tank/media
