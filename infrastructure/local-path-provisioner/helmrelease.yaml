apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: kube-system
spec:
  interval: 15m

  chart:
    spec:
      chart: local-path-provisioner
      version: "0.0.34"
      sourceRef:
        kind: HelmRepository
        name: local-path-provisioner
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:
    storageClass:
      create: true
      name: local-path
      defaultClass: false

    nodePathMap:
      - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
        paths:
          - /var/local-path-provisioner
