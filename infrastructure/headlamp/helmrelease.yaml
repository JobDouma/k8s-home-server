apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.40.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    replicaCount: 1

    envFrom:
      - secretRef:
          name: headlamp-oidc-credentials

    volumes:
      - name: homelab-ca
        secret:
          secretName: homelab-ca-secret
          items:
            - key: tls.crt
              path: homelab-ca.crt

    volumeMounts:
      - name: homelab-ca
        mountPath: /etc/ssl/certs/homelab-ca.crt
        subPath: homelab-ca.crt

    env:
      - name: SSL_CERT_FILE
        value: /etc/ssl/certs/homelab-ca.crt

    service:
      type: ClusterIP
      port: 80
      sessionAffinity: ClientIP

    config:
      oidc:
        secret:
          create: false
      extraArgs:
        - -oidc-client-id=$(HEADLAMP_CONFIG_OIDC_CLIENT_ID)
        - -oidc-client-secret=$(HEADLAMP_CONFIG_OIDC_CLIENT_SECRET)
        - -oidc-idp-issuer-url=$(HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL)
        - -oidc-scopes=$(HEADLAMP_CONFIG_OIDC_SCOPES)
        - -oidc-ca-file=/etc/ssl/certs/homelab-ca.crt

    serviceAccount:
      create: false
      name: headlamp

    clusterRoleBinding:
      create: false

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi