apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.40.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  values:
    replicaCount: 2

    service:
      type: ClusterIP
      port: 80

    config:
      oidc:
        clientID: "JCh5JqdWtaeixQDMyQbkdJBNxyUTuZtpXfBJDyPL"
        issuerURL: "http://auth.lan/application/o/headlamp/"
        scopes: "openid profile email groups"
        secret:
          create: false
        externalSecret:
          enabled: true
          name: headlamp-oidc-credentials

    serviceAccount:
      create: false
      name: headlamp

    clusterRoleBinding:
      create: false

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 512Mi