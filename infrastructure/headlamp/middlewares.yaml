apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: headlamp-chain
  namespace: headlamp
spec:
  chain:
    middlewares:
      - name: lan-headers
      - name: authentik-forwardauth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-headers
  namespace: headlamp
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: headlamp
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt