# This file follows the same shape as your other *secret.yaml files so the
# existing .sops.yaml rule (#2: path_regex '.*secret(\.yaml|\.yml)$',
# encrypted_regex '^(data|stringData)$') picks it up automatically.
#
# It is NOT applied to the k8s cluster with kubectl/flux — Omni runs as a
# host-level docker-compose service, not in-cluster. This is purely a
# convenient, consistent place to store the OIDC client secret as
# SOPS-encrypted material in git.
#
# To fill in and encrypt (see README.md for full steps):
#   sops infrastructure/omni/secret.yaml
# replace REPLACE_ME_BEFORE_ENCRYPTING with the real value, save+quit.
# sops encrypts the stringData block automatically on save.
