apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace first
  - storage/namespace.yaml

  # PersistentVolumes (must exist first)
  - storage/pv-media.yaml
  - storage/pv-tank-configs.yaml
  #- storage/pv-jellyfin-config.yaml
  #- storage/pv-qbittorrent-config.yaml

  # PersistentVolumeClaims (bind to existing PVs)
  - storage/pvc-media.yaml
  - storage/pvc-tank-configs.yaml
  #- storage/pvc-jellyfin-config.yaml
  #- storage/pvc-qbittorrent-config.yaml
