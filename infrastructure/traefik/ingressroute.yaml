apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: networking
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.lan`)
      kind: Rule
      middlewares:
        - name: traefik-chain
      services:
        - name: api@internal
          kind: TraefikService