apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "27.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  values:
    deployment:
      replicas: 1

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      type: LoadBalancer
      spec:
        loadBalancerIP: 192.168.2.22   # your node IP

    ports:
      web:
        port: 80
        expose: true
        exposedPort: 80
      websecure:
        port: 443
        expose: true
        exposedPort: 443

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true

    logs:
      general:
        level: INFO
