apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  maxHistory: 2
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: traefik
      version: "39.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  values:
    deployment:
      replicas: 2

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: 192.168.2.100
      annotations:
        metallb.universe.tf/address-pool: traefik-pool
      spec:
        externalTrafficPolicy: Local
        allocateLoadBalancerNodePorts: false

    ports:
      web:
        port: 80
        protocol: TCP
        nodePort: null
        expose:
          enabled: true
          port: 80
      websecure:
        port: 443
        protocol: TCP
        nodePort: null
        expose:
          enabled: true
          port: 443
      metrics:
        port: 9100
        protocol: TCP
        expose:
          default: false  # internal only, no need to expose via LoadBalancer

    metrics:
      prometheus:
        enabled: true
        entryPoint: metrics

    providers:
      kubernetesIngress:
        enabled: true
        namespaces: []

      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true

    additionalArguments:
      - "--providers.kubernetesingress.ingressclass=traefik"
      - "--api.dashboard=true"
      - "--api=true"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--entrypoints.web.forwardedHeaders.insecure=true"
      - "--entrypoints.websecure.forwardedHeaders.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.metrics.address=:9100"

    logs:
      general:
        level: INFO
      access:
        enabled: true