apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-chain
  namespace: networking
spec:
  chain:
    middlewares:
      - name: lan-headers
      - name: authentik-forwardauth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-headers
  namespace: networking
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: false
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: networking
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: networking
spec:
  redirectScheme:
    scheme: https
    permanent: true