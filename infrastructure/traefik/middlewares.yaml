apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-chain
  namespace: networking
spec:
  chain:
    middlewares:
      - name: lan-headers
      - name: authentik-forwardauth
---
# Use this for services that handle their own auth
# (Headlamp with OIDC, Jellyfin, Prometheus, Grafana)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-chain-noauth
  namespace: networking
spec:
  chain:
    middlewares:
      - name: lan-headers
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: lan-headers
  namespace: networking
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: false
    customRequestHeaders:
      X-Forwarded-Proto: "https"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: networking
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local:80/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt