# FILE: ./infrastructure/traefik/base/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "27.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  values:
    deployment:
      replicas: 2

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.2.100
      annotations:
        metallb.universe.tf/address-pool: traefik-pool

    ports:
      web:
        port: 80
        expose:
          default: true
        exposedPort: 80
      websecure:
        port: 443
        expose:
          default: true
        exposedPort: 443

    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true

    additionalArguments:
      - "--providers.kubernetesingress.ingressclass=traefik"

    logs:
      general:
        level: INFO
