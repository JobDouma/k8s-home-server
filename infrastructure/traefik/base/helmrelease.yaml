apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  maxHistory: 2
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: traefik
      version: "39.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  values:
    deployment:
      replicas: 2

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: 192.168.2.100
      annotations:
        metallb.universe.tf/address-pool: traefik-pool
      spec:
        externalTrafficPolicy: Local
        allocateLoadBalancerNodePorts: false


    ports:
      web:
        port: 80
        protocol: TCP
        expose:
          enabled: true
          port: 80
      websecure:
        port: 443
        protocol: TCP
        expose:
          enabled: true
          port: 443

    providers:
      kubernetesIngress:
        enabled: true
        namespaces: []   # required for chart 27.x

      kubernetesCRD:
        enabled: true

    additionalArguments:
      - "--providers.kubernetesingress.ingressclass=traefik"

    logs:
      general:
        level: INFO
