apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: networking
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: "27.0.2"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system

  values:
    replicas: 2

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      main:
        enabled: true
        type: LoadBalancer
        loadBalancerIP: 192.168.2.100
        annotations:
          metallb.universe.tf/address-pool: traefik-pool

    ports:
      web:
        expose: true
        port: 80
      websecure:
        expose: true
        port: 443

    providers:
      kubernetesCRD: true
      kubernetesIngress: true

    additionalArguments:
      - "--providers.kubernetesingress.ingressclass=traefik"

    logs:
      general:
        level: INFO
