# FILE: ./infrastructure/metallb/config/l2-advertisements.yaml
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: main-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - dns-pool
    - lan-pool
  nodeSelectors:
    - matchLabels:
        node-role.kubernetes.io/control-plane: ""
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: traefik-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - traefik-pool
  nodeSelectors:
    - matchLabels:
        node-role.kubernetes.io/control-plane: ""
