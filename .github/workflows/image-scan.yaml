name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-repo:
    name: SBOM + CVE scan (repo)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM from repo
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: repo-sbom.spdx.json
          output-file: repo-sbom.spdx.json

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update

      - name: Scan SBOM with Grype
        run: |
          grype sbom:repo-sbom.spdx.json \
            --fail-on high \
            --output sarif \
            > results.sarif || true

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif

  scan-upstream-images:
    name: Scan upstream image changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update

      - name: Extract and scan changed images
        run: |
          echo "=== Detecting changed image references in PR ==="

          # Get full diff of yaml files changed in this PR
          DIFF=$(git diff origin/main...HEAD -- '*.yaml' '*.yml')

          if [ -z "$DIFF" ]; then
            echo "No YAML files changed, skipping image scan"
            exit 0
          fi

          # Extract added lines containing image repository + tag patterns
          # Handles both:
          #   repository: louislam/uptime-kuma
          #   tag: "2.3.0@sha256:..."
          # and inline:
          #   image: louislam/uptime-kuma:2.3.0@sha256:...

          FAILED=0
          SCANNED=0

          # Pattern 1: bjw-s app-template style (repository + tag on separate lines)
          # Extract repository values from added lines
          REPOS=$(echo "$DIFF" | grep '^\+' | grep -oP '(?<=repository:\s{0,10})[\w.\-/]+' | sort -u || true)
          TAGS=$(echo "$DIFF" | grep '^\+' | grep -oP '(?<=tag:\s{0,10}")[^"]+' | sort -u || true)

          if [ -n "$REPOS" ] && [ -n "$TAGS" ]; then
            echo "Found repository/tag pairs:"
            while IFS= read -r repo; do
              while IFS= read -r tag; do
                # Clean tag — strip sha256 digest for the reference
                # but keep full ref for accurate scanning
                REF="${repo}:${tag}"
                echo "  Scanning: $REF"
                grype "$REF" --fail-on critical --output table || FAILED=1
                SCANNED=$((SCANNED + 1))
              done <<< "$TAGS"
            done <<< "$REPOS"
          fi

          # Pattern 2: inline image references
          # e.g. image: nginx:1.25@sha256:...
          INLINE=$(echo "$DIFF" | grep '^\+' | grep -oP '(?<=image:\s{0,10})[\w.\-/:@]+' | grep ':' | sort -u || true)

          if [ -n "$INLINE" ]; then
            echo "Found inline image references:"
            while IFS= read -r ref; do
              echo "  Scanning: $ref"
              grype "$ref" --fail-on critical --output table || FAILED=1
              SCANNED=$((SCANNED + 1))
            done <<< "$INLINE"
          fi

          if [ "$SCANNED" -eq 0 ]; then
            echo "No image changes detected in YAML diff"
            exit 0
          fi

          echo "=== Scanned $SCANNED image(s) ==="
          exit $FAILED
