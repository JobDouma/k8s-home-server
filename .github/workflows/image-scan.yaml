name: Build, Scan & Sign

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan-repo:
    name: SBOM + CVE scan (repo)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write   # allows uploading results to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM from repo
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: repo-sbom.spdx.json
          output-file: repo-sbom.spdx.json

      - name: Scan repo SBOM with Grype
        uses: anchore/scan-action@v3
        with:
          sbom: repo-sbom.spdx.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: grype-results.sarif

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: grype-results.sarif

  build-sign:
    name: Build, scan & sign image
    runs-on: ubuntu-latest
    # Only run on main push, not PRs — you don't sign unmerged code
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: jobdouma
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build image
        run: |
          docker build -t ghcr.io/jobdouma/test:${{ github.sha }} .

      - name: Generate SBOM from image
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/jobdouma/test:${{ github.sha }}
          artifact-name: image-sbom.spdx.json
          output-file: image-sbom.spdx.json

      - name: Scan image SBOM with Grype
        uses: anchore/scan-action@v3
        with:
          sbom: image-sbom.spdx.json
          fail-build: true
          severity-cutoff: high

      - name: Push image
        # Only push after CVE scan passes
        run: |
          docker push ghcr.io/jobdouma/test:${{ github.sha }}

      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            ghcr.io/jobdouma/test:${{ github.sha }}

      - name: Verify signature
        run: |
          cosign verify --key ~/k8s-home-server/cosign.pub \
            ghcr.io/jobdouma/test:${{ github.sha }}