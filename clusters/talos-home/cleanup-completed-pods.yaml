apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup-completed-pods
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cleanup-completed-pods
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cleanup-completed-pods
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cleanup-completed-pods
subjects:
  - kind: ServiceAccount
    name: cleanup-completed-pods
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-completed-pods
  namespace: kube-system
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cleanup-completed-pods
          restartPolicy: Never
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -ec
                - |
                  for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | grep -Ev '^(kube-system|monitoring)$'); do
                    kubectl get pods -n "$ns" \
                      --field-selector=status.phase==Succeeded \
                      -o name | xargs -r kubectl delete

                    kubectl get pods -n "$ns" \
                      --field-selector=status.phase==Failed \
                      -o name | xargs -r kubectl delete
                  done
