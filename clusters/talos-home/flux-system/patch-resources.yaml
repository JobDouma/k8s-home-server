apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-controller
  namespace: flux-system
spec:
  template:
    spec:
      containers:
        - name: manager
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 1Gi
