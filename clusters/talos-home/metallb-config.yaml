apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/talos-home/metallb/config
  prune: true
  wait: true
  dependsOn:
    - name: metallb-base
  sourceRef:
    kind: GitRepository
    name: flux-system
