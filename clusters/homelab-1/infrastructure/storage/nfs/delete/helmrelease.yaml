apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir
        namespace: flux-system

  values:
    nfs:
      server: 192.168.2.5
      path: /mnt/tank/k8s

    storageClass:
      name: nfs
      defaultClass: true
      reclaimPolicy: Retain
      accessModes: ReadWriteMany
