apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  chart:
    spec:
      chart: app-template
      version: 3.x
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controller:
      replicas: 1
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    persistence:
      config:
        enabled: true
        type: pvc
        existingClaim: jellyfin-config
      media:
        enabled: true
        type: pvc
        existingClaim: media
        mountPath: /media
    service:
      main:
        ports:
          http:
            port: 8096
    ingress:
      main:
        enabled: true
        hosts:
          - host: jellyfin.lan
            paths:
              - path: /
