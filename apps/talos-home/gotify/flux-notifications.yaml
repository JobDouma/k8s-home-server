apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: gotify
  namespace: flux-system
spec:
  type: generic
  address: ""   # leave empty — address comes from the secret
  secretRef:
    name: gotify-flux-token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: gotify-flux-alerts
  namespace: flux-system
spec:
  providerRef:
    name: gotify
  eventSeverity: warn
  eventSources:
    - kind: Kustomization
      name: "*"
    - kind: HelmRelease
      name: "*"
  eventMetadata:
    summary: "Flux reconciliation failed"