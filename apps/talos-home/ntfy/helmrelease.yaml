apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: ntfy
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      ntfy:
        initContainers:
          bootstrap:
            image:
              repository: binwiederhier/ntfy
              tag: v2.11.0
            command:
              - /bin/sh
              - /etc/ntfy/bootstrap.sh
            envFrom:
              - secretRef:
                  name: ntfy-secret
            # needs access to both the config (bootstrap.sh) and the cache (user.db)
            volumeMounts:
              - name: config
                mountPath: /etc/ntfy/server.yml
                subPath: server.yml
                readOnly: true
              - name: bootstrap
                mountPath: /etc/ntfy/bootstrap.sh
                subPath: bootstrap.sh
                readOnly: true
              - name: cache
                mountPath: /var/cache/ntfy

        containers:
          app:
            image:
              repository: binwiederhier/ntfy
              tag: v2.11.0
            args:
              - serve
            envFrom:
              - secretRef:
                  name: ntfy-secret
            env:
              TZ: Europe/Amsterdam
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: ntfy
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

    persistence:
      config:
        enabled: true
        type: configMap
        name: ntfy-config
        globalMounts:
          - path: /etc/ntfy/server.yml
            subPath: server.yml
            readOnly: true

      bootstrap:
        enabled: true
        type: configMap
        name: ntfy-config
        defaultMode: 0755
        globalMounts:
          - path: /etc/ntfy/bootstrap.sh
            subPath: bootstrap.sh
            readOnly: true

      cache:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /var/cache/ntfy