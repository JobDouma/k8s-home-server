apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ntfy
  namespace: ntfy
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      ntfy:
        initContainers:
          bootstrap:
            image:
              repository: binwiederhier/ntfy
              tag: v2.11.0
            command:
              - /bin/sh
              - /scripts/bootstrap.sh
            envFrom:
              - secretRef:
                  name: ntfy-secret

        containers:
          app:
            image:
              repository: binwiederhier/ntfy
              tag: v2.11.0
            args:
              - serve
            env:
              TZ: Europe/Amsterdam
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: ntfy
        type: ClusterIP
        ports:
          http:
            port: 80
            targetPort: 80

    persistence:
      # server.yml config for the main container
      config:
        type: configMap
        name: ntfy-config
        advancedMounts:
          ntfy:
            app:
              - path: /etc/ntfy/server.yml
                subPath: server.yml
                readOnly: true

      # bootstrap.sh mounted into the init container only
      scripts:
        type: configMap
        name: ntfy-config
        defaultMode: 0755
        advancedMounts:
          ntfy:
            bootstrap:
              - path: /scripts/bootstrap.sh
                subPath: bootstrap.sh
                readOnly: true

      # shared cache volume — both init container and main container need it
      # init container writes user.db, main container reads/writes cache.db
      cache:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          ntfy:
            bootstrap:
              - path: /var/cache/ntfy
            app:
              - path: /var/cache/ntfy