apiVersion: v1
kind: Secret
metadata:
  name: ntfy-secret
  namespace: ntfy
type: Opaque
stringData:
  server.yml: |
    base-url: https://ntfy.lan
    listen-http: ":80"
    auth-default-access: deny-all
    auth-file: /var/cache/ntfy/user.db
    auth-users:
      - "admin:$2b$10$.vWutx4thCudUlCDcGkrhu/TKEBIGLFV1uW9RrDFENB3gsMuwtvJm:admin"
      - "publisher:$2b$10$YtvzUwImhpKzPo2BO06hY.GYr1hVbfZi64hxKtTKI7kSEx/br/Aea:user"
    auth-access:
      - "publisher:homelab-alerts:write-only"
      - "publisher:longhorn:write-only"
      - "publisher:velero:write-only"
      - "publisher:renovate:write-only"
      - "publisher:flux:write-only"
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h
    attachment-cache-dir: /var/cache/ntfy/attachments
    attachment-total-size-limit: 5G
    attachment-file-size-limit: 15M
    attachment-expiry-duration: 3h
    log-level: info
