apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: https://ntfy.lan
    listen-http: ":80"
    auth-default-access: deny-all
    auth-file: /var/cache/ntfy/user.db
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h
    attachment-cache-dir: /var/cache/ntfy/attachments
    attachment-total-size-limit: 5G
    attachment-file-size-limit: 15M
    attachment-expiry-duration: 3h
    log-level: info

  bootstrap.sh: |
    #!/bin/sh
    set -eu

    DB="/var/cache/ntfy/user.db"

    if [ -f "$DB" ]; then
      echo "Auth DB already exists, skipping bootstrap."
      exit 0
    fi

    echo "Bootstrapping ntfy users and ACLs..."

    # Admin user
    ntfy user add --role=admin --password="$NTFY_ADMIN_PASSWORD" "$NTFY_ADMIN_USER"

    # Publisher user
    ntfy user add --password="$NTFY_PUBLISHER_PASSWORD" "$NTFY_PUBLISHER_USER"

    # ACLs — note: correct command is `ntfy user access`, NOT `ntfy access`
    ntfy user access "$NTFY_PUBLISHER_USER" homelab-alerts  write-only
    ntfy user access "$NTFY_PUBLISHER_USER" longhorn        write-only
    ntfy user access "$NTFY_PUBLISHER_USER" velero          write-only
    ntfy user access "$NTFY_PUBLISHER_USER" renovate        write-only
    ntfy user access "$NTFY_PUBLISHER_USER" flux            write-only

    ntfy user access "$NTFY_ADMIN_USER" homelab-alerts  read-write
    ntfy user access "$NTFY_ADMIN_USER" longhorn        read-write
    ntfy user access "$NTFY_ADMIN_USER" velero          read-write
    ntfy user access "$NTFY_ADMIN_USER" renovate        read-write
    ntfy user access "$NTFY_ADMIN_USER" flux            read-write

    echo "Bootstrap complete."