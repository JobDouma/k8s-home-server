apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: https://ntfy.lan
    listen-http: ":80"

    # Auth — deny unauthenticated access
    auth-default-access: deny-all
    auth-file: /var/cache/ntfy/user.db

    # Cache — persist messages across restarts
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h

    # Attachments
    attachment-cache-dir: /var/cache/ntfy/attachments
    attachment-total-size-limit: 5G
    attachment-file-size-limit: 15M
    attachment-expiry-duration: 3h

    # Logging
    log-level: info

  bootstrap.sh: |
    #!/bin/sh
    set -eu

    DB="/var/cache/ntfy/user.db"

    # Only bootstrap on first run — if db already exists, skip entirely.
    if [ -f "$DB" ]; then
      echo "Auth DB already exists, skipping bootstrap."
      exit 0
    fi

    echo "Bootstrapping ntfy users and ACLs..."

    # ── Users ────────────────────────────────────────────────
    # Admin user — full access
    ntfy user add --role=admin "$NTFY_ADMIN_USER" <<EOF
    $NTFY_ADMIN_PASSWORD
    $NTFY_ADMIN_PASSWORD
    EOF

    # Publisher user — used by apps to POST notifications
    ntfy user add "$NTFY_PUBLISHER_USER" <<EOF
    $NTFY_PUBLISHER_PASSWORD
    $NTFY_PUBLISHER_PASSWORD
    EOF

    # ── ACLs ─────────────────────────────────────────────────
    # Publisher: write-only to each topic
    ntfy access "$NTFY_PUBLISHER_USER" homelab-alerts rw
    ntfy access "$NTFY_PUBLISHER_USER" longhorn        rw
    ntfy access "$NTFY_PUBLISHER_USER" velero          rw
    ntfy access "$NTFY_PUBLISHER_USER" renovate        rw
    ntfy access "$NTFY_PUBLISHER_USER" flux            rw

    # Admin: read access to all topics (admin role covers write already)
    ntfy access "$NTFY_ADMIN_USER" homelab-alerts ro
    ntfy access "$NTFY_ADMIN_USER" longhorn        ro
    ntfy access "$NTFY_ADMIN_USER" velero          ro
    ntfy access "$NTFY_ADMIN_USER" renovate        ro
    ntfy access "$NTFY_ADMIN_USER" flux            ro

    echo "Bootstrap complete."