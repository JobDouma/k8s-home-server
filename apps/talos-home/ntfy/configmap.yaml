apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: https://ntfy.lan
    listen-http: ":80"

    # Auth — deny unauthenticated access
    auth-default-access: deny-all
    auth-file: /var/cache/ntfy/user.db

    # Cache — persist messages across restarts
    cache-file: /var/cache/ntfy/cache.db
    cache-duration: 12h

    # Attachments
    attachment-cache-dir: /var/cache/ntfy/attachments
    attachment-total-size-limit: 5G
    attachment-file-size-limit: 15M
    attachment-expiry-duration: 3h

    # Logging
    log-level: info

  bootstrap.sh: |
    #!/bin/sh
    set -eu

    DB="/var/cache/ntfy/user.db"

    # Only bootstrap on first run — if db already exists, skip entirely.
    if [ -f "$DB" ]; then
      echo "Auth DB already exists, skipping bootstrap."
      exit 0
    fi

    echo "Bootstrapping ntfy users and ACLs..."

    # ntfy reads auth-file from server.yml — pass it explicitly here too
    CONF="--config /etc/ntfy/server.yml"

    # ── Users ────────────────────────────────────────────────
    # Admin user — full cluster access
    ntfy $CONF user add --role=admin --password="$NTFY_ADMIN_PASSWORD" "$NTFY_ADMIN_USER"

    # Publisher user — used by apps (Alertmanager, Velero, Renovate) to POST
    ntfy $CONF user add --password="$NTFY_PUBLISHER_PASSWORD" "$NTFY_PUBLISHER_USER"

    # ── ACLs ─────────────────────────────────────────────────
    # Publisher: write access to each topic
    ntfy $CONF access "$NTFY_PUBLISHER_USER" homelab-alerts  write-only
    ntfy $CONF access "$NTFY_PUBLISHER_USER" longhorn        write-only
    ntfy $CONF access "$NTFY_PUBLISHER_USER" velero          write-only
    ntfy $CONF access "$NTFY_PUBLISHER_USER" renovate        write-only
    ntfy $CONF access "$NTFY_PUBLISHER_USER" flux            write-only

    # Admin: read access to all topics (admin role covers everything already,
    # but explicit grants make it visible in the ACL table)
    ntfy $CONF access "$NTFY_ADMIN_USER" homelab-alerts  read-write
    ntfy $CONF access "$NTFY_ADMIN_USER" longhorn        read-write
    ntfy $CONF access "$NTFY_ADMIN_USER" velero          read-write
    ntfy $CONF access "$NTFY_ADMIN_USER" renovate        read-write
    ntfy $CONF access "$NTFY_ADMIN_USER" flux            read-write

    echo "Bootstrap complete."