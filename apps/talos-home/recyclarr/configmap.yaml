apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
  labels:
    app: recyclarr
data:
  recyclarr.yml: |
    # Recyclarr Configuration (v7+ compatible)
    radarr:
      - name: movies
        base_url: ${RADARR_URL}
        api_key: ${RADARR_APIKEY}
        include:
          # Note the 'radarr-' prefix now required for these specific templates
          - template: radarr-quality-definition-movie-remux-web-2160p
          - template: radarr-quality-definition-movie-hd-bluray-web

    sonarr:
      - name: series
        base_url: ${SONARR_URL}
        api_key: ${SONARR_APIKEY}
        include:
          - template: sonarr-quality-definition-series-web-1080p
        custom_formats:
        - trash_ids: []
          assign_scores_to:
            - name: series
        - assign_scores_to:
            - name: series
              score: -10000
          custom_formats:
            - name: Non-English Audio
              specifications:
                - name: Not English
                  implementation: LanguageSpecification
                  negate: true
                  required: false
                  fields:
                    value: 1  # 1 = English