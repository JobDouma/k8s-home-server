apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-cronjob
  namespace: media
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: config
              configMap:
                name: recyclarr-config
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: TZ
                  value: Europe/Amsterdam
                - name: RADARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_url
                - name: RADARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_apikey
                - name: SONARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_url
                - name: SONARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_apikey
              args:
                - sync
              volumeMounts:
                - name: config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml