apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-cronjob
  namespace: media
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: config-file
              configMap:
                name: recyclarr-config
            - name: app-data
              emptyDir: {}
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.6.0@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b
              imagePullPolicy: IfNotPresent
              args: ["sync"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              env:
                - name: TZ
                  value: Europe/Amsterdam
                - name: RECYCLARR_CONFIG_DIR
                  value: /config
                - name: RECYCLARR_DATA_DIR
                  value: /tmp/recyclarr
                - name: RADARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_url
                - name: RADARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_apikey
                - name: SONARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_url
                - name: SONARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_apikey
              volumeMounts:
                - name: config-file
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
                - name: app-data
                  mountPath: /tmp/recyclarr