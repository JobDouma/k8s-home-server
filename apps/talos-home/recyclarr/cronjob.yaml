apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-cronjob
  namespace: media
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 7200
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: config-file
              configMap:
                name: recyclarr-config
            # Writable space for Recyclarr's database, cache, and logs
            - name: app-data
              emptyDir: {}
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:latest
              imagePullPolicy: IfNotPresent
              args: ["sync"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true # Best practice
              env:
                - name: TZ
                  value: Europe/Amsterdam
                # Use the new variable name instead of RECYCLARR_APP_DATA
                - name: RECYCLARR_CONFIG_DIR
                  value: /config
                # Optional: specify a separate path for the cache/db if you want
                - name: RECYCLARR_DATA_DIR
                  value: /tmp/recyclarr
                - name: RADARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_url
                - name: RADARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: radarr_apikey
                - name: SONARR_URL
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_url
                - name: SONARR_APIKEY
                  valueFrom:
                    secretKeyRef:
                      name: recyclarr-secrets
                      key: sonarr_apikey
              volumeMounts:
                # Mount the config file specifically
                - name: config-file
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
                  readOnly: true
                # Mount the writable scratch space
                - name: app-data
                  mountPath: /tmp/recyclarr