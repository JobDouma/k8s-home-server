apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  timeout: 30m

  chart:
    spec:
      chart: loki
      version: "6.53.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary

    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1
        path_prefix: /var/loki
        storage:
          filesystem:
            directory: /var/loki

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin

      storage_config:
        filesystem:
          directory: /var/loki/chunks

      compactor:
        retention_enabled: true
        working_directory: /var/loki/compactor
        delete_request_store: filesystem

      limits_config:
        retention_period: 168h

    singleBinary:
      replicas: 1
      podAnnotations:
        backup.velero.io/backup-volumes-excludes: "storage"
      tolerations:
        - operator: Exists

      persistence:
        enabled: true
        storageClass: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi

    gateway:
      enabled: true
      replicas: 1
      tolerations:
        - operator: Exists