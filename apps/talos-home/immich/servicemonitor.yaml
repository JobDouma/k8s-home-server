apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: immich
  namespace: immich
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - immich
  selector:
    matchLabels:
      app.kubernetes.io/name: immich-server
  endpoints:
    - port: http
      path: /metrics
      interval: 60s