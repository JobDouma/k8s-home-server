apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      # Pin everything to talos-cp-1 (64GB RAM)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - talos-cp-1

    controllers:
      immich-server:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.4
            env:
              TZ: Europe/Amsterdam
              IMMICH_PORT: "2283"
              DB_HOSTNAME: immich-immich-postgres
              DB_PORT: "5432"
              REDIS_HOSTNAME: immich-immich-redis
              REDIS_PORT: "6379"
            envFrom:
              - secretRef:
                  name: immich-secret
            ports:
              - name: http
                containerPort: 2283
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 4Gi
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 6
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: 2283
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3

      immich-machine-learning:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.4
            env:
              TZ: Europe/Amsterdam
              MACHINE_LEARNING_CACHE_FOLDER: /cache
            envFrom:
              - secretRef:
                  name: immich-secret
            ports:
              - name: http
                containerPort: 3003
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi
            probes:
              # ADDED: ML takes 30-60s to load models on first start.
              # Without this the server hammers it immediately and floods
              # logs with fetch failed errors on every pod restart.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 12   # 2 min max startup window
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: 3003
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 3

      immich-postgres:
        strategy: Recreate
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
            env:
              POSTGRES_DB:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_DATABASE_NAME
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_USERNAME
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secret
                    key: DB_PASSWORD
              POSTGRES_INITDB_ARGS: "--data-checksums"
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: 1000m   # was 500m — tight during vector indexing
                memory: 1Gi
            probes:
              startup:
                enabled: true
                spec:
                  exec:
                    command: [sh, -c, "pg_isready -U $POSTGRES_USER"]
                  failureThreshold: 30
                  periodSeconds: 5
              readiness:
                enabled: true
                spec:
                  exec:
                    command: [sh, -c, "pg_isready -U $POSTGRES_USER"]
              liveness:
                enabled: true
                spec:
                  exec:
                    command: [sh, -c, "pg_isready -U $POSTGRES_USER"]

      immich-redis:
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: "9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5"
            # FIXED: each flag and value must be a separate list item
            args:
              - --save
              - ""
              - --appendonly
              - "no"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [redis-cli, ping]
                  initialDelaySeconds: 5
                  periodSeconds: 5
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: [redis-cli, ping]
                  initialDelaySeconds: 10
                  periodSeconds: 10

    service:
      immich-server:
        controller: immich-server
        type: ClusterIP
        ports:
          http:
            port: 2283
      immich-machine-learning:
        controller: immich-machine-learning
        type: ClusterIP
        ports:
          http:
            port: 3003
      immich-postgres:
        controller: immich-postgres
        type: ClusterIP
        ports:
          db:
            port: 5432
      immich-redis:
        controller: immich-redis
        type: ClusterIP
        ports:
          redis:
            port: 6379

    persistence:
      library:
        enabled: true
        type: persistentVolumeClaim
        storageClass: truenas-nfs
        accessMode: ReadWriteMany
        size: 500Gi
        advancedMounts:
          immich-server:
            app:
              - path: /usr/src/app/upload

      ml-cache:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          immich-machine-learning:
            app:
              - path: /cache

      postgres-data:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          immich-postgres:
            app:
              - path: /var/lib/postgresql/data

      postgres-shm:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
        advancedMounts:
          immich-postgres:
            app:
              - path: /dev/shm