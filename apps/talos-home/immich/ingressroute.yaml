apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: immich             # ← kept in immich namespace as per your original
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`immich.lan`)
      kind: Rule
      middlewares:
        - name: traefik-chain-noauth   # ← kept; Immich handles its own auth
          namespace: networking
      services:
        - name: immich-immich-server   # ← your original service name
          port: 2283                   # ← your original port
          serversTransport: immich-transport
  tls:
    secretName: immich-tls