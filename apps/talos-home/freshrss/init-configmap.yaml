apiVersion: v1
kind: ConfigMap
metadata:
  name: freshrss-init
  namespace: freshrss
data:
  # This script is executed by the linuxserver s6 init system on every container start.
  # It uses the FreshRSS CLI to import the OPML only if feeds have not already been imported,
  # making it fully idempotent — safe to run on every restart.
  00-install-freshrss.sh: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail

    FRESHRSS_CLI="/app/www/cli"
    FRESHRSS_DATA="/config/www/freshrss/data"
    STAMP="/config/bootstrap/.installed"
    USER="${FRESHRSS_DEFAULT_USER:-job}"

    log() { echo "[freshrss-install] $*"; }

    # Wait for app to be ready
    for i in $(seq 1 30); do
      [ -d "/app/www/cli" ] && break
      log "Waiting for app... ($i/30)"; sleep 2
    done

    if [ -f "${STAMP}" ]; then
      log "Already installed. Skipping."; exit 0
    fi

    log "Running FreshRSS install..."
    php "${FRESHRSS_CLI}/do-install.php" \
      --default_user "${USER}" \
      --auth_type form \
      --environment production \
      --base_url "https://freshrss.lan" \
      --language en \
      --api_enabled

    log "Creating admin user..."
    php "${FRESHRSS_CLI}/create-user.php" \
      --user "${USER}" \
      --password "${FRESHRSS_ADMIN_PASSWORD}" \
      --api_password "${FRESHRSS_ADMIN_PASSWORD}" \
      --language en \
      --default_user

    touch "${STAMP}"
    log "Install complete."

  01-import-opml.sh: |
    #!/usr/bin/with-contenv bash
    set -euo pipefail

    OPML_SOURCE="/config/bootstrap/feeds.opml"
    OPML_STAMP="/config/bootstrap/.opml-imported"
    FRESHRSS_CLI="/app/www/cli"
    FRESHRSS_DATA="/config/www/freshrss/data"
    FRESHRSS_USER="${FRESHRSS_DEFAULT_USER:-admin}"

    log() { echo "[opml-import] $*"; }

    # Wait for FreshRSS data directory to be ready (Longhorn PVC may take a moment)
    for i in $(seq 1 30); do
      [ -d "${FRESHRSS_DATA}" ] && break
      log "Waiting for ${FRESHRSS_DATA} to be available... (${i}/30)"
      sleep 2
    done

    if [ ! -d "${FRESHRSS_DATA}" ]; then
      log "ERROR: ${FRESHRSS_DATA} not available after 60s, skipping OPML import."
      exit 0
    fi

    if [ ! -f "${OPML_SOURCE}" ]; then
      log "No OPML file found at ${OPML_SOURCE}, skipping."
      exit 0
    fi

    if [ -f "${OPML_STAMP}" ]; then
      log "OPML already imported (stamp file present). Skipping."
      exit 0
    fi

    # Wait for FreshRSS to finish its own install/init before we import
    for i in $(seq 1 30); do
      [ -f "${FRESHRSS_DATA}/users/${FRESHRSS_USER}/config.php" ] && break
      log "Waiting for FreshRSS user config... (${i}/30)"
      sleep 3
    done

    if [ ! -f "${FRESHRSS_DATA}/users/${FRESHRSS_USER}/config.php" ]; then
      log "FreshRSS user config not found — FreshRSS may not be installed yet. Skipping."
      exit 0
    fi

    log "Importing OPML for user '${FRESHRSS_USER}'..."
    php "${FRESHRSS_CLI}/import-for-user.php" \
      --user "${FRESHRSS_USER}" \
      --filename "${OPML_SOURCE}" \
      && touch "${OPML_STAMP}" \
      && log "OPML import complete. Stamp written to ${OPML_STAMP}." \
      || log "WARNING: OPML import failed. Will retry on next container start."