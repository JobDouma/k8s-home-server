apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freshrss
  namespace: freshrss
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      freshrss:
        replicas: 1

        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false

        containers:
          app:
            image:
              repository: lscr.io/linuxserver/freshrss
              tag: latest

            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam

            ports:
              - name: http
                containerPort: 80

    service:
      app:
        controller: freshrss
        type: ClusterIP
        ports:
          http:
            port: 80

    persistence:
      config:
        enabled: true
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /config

      opml:
        enabled: true
        type: configMap
        name: freshrss-opml
        globalMounts:
          - path: /config/bootstrap/feeds.opml
            subPath: feeds.opml
            readOnly: true