apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: freshrss
  namespace: freshrss
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      freshrss:
        replicas: 1
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/freshrss
              tag: 1.28.1-ls297
            env:
              PUID: '1000'
              PGID: '1000'
              TZ: Europe/Amsterdam
              FRESHRSS_DEFAULT_USER: job
            ports:
            - name: http
              containerPort: 80
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /i/
                    port: 80
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /i/
                    port: 80
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 3
    service:
      app:
        controller: freshrss
        type: ClusterIP
        ports:
          http:
            port: 80
    persistence:
      config:
        enabled: true
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
        - path: /config
      opml:
        enabled: true
        type: configMap
        name: freshrss-opml
        globalMounts:
        - path: /config/bootstrap/feeds.opml
          subPath: feeds.opml
          readOnly: true
      init-scripts:
        enabled: true
        type: configMap
        name: freshrss-init
        defaultMode: 493
        globalMounts:
        - path: /custom-cont-init.d/01-import-opml.sh
          subPath: 01-import-opml.sh
          readOnly: true
