apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: loki
      namespace: monitoring
    - name: falcosidekick
      namespace: falco
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf

    falco:
      # Use snake_case — the chart dumps camelCase as raw passthrough keys that Falco ignores
      json_output: true
      log_level: info
      existingRulesConfigMaps:
        - falco-rules
        - falco-custom-rules
      grpc:
        enabled: false
      grpc_output:
        enabled: false
      http_output:
        enabled: true
        url: "http://falcosidekick.falco.svc.cluster.local:2801"

    daemonset:
      tolerations:
        - operator: Exists
      podAnnotations: {}

    falcosidekick:
      enabled: false

    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi