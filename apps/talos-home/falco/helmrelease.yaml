apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf
    falco:
      jsonOutput: true
      logLevel: info
    daemonset:
      tolerations:
        - operator: Exists
      hostNetwork: true
      hostPID: true
      securityContext:
        privileged: true
    falcosidekick:
      enabled: true
      config:
        loki:
          hostport: http://loki-gateway.monitoring.svc.cluster.local
          minimumpriority: warning
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi