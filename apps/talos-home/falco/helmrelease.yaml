apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf
    falco:
      jsonOutput: true
      logLevel: info
    daemonset:
      tolerations:
        - operator: Exists
    falcosidekick:
      enabled: true
      replicaCount: 1
      webui:
        enabled: true          # optional but nice
        replicaCount: 1
      config:
        loki:
          hostport: http://loki-gateway.monitoring.svc.cluster.local
          minimumpriority: warning
          # These labels make Falco events queryable in Grafana
          customHeaders: "X-Scope-OrgID: 1"
        prometheus:
          # falcosidekick exposes /metrics on port 2801
          # this is scraped by Prometheus via ServiceMonitor below
          hostport: ""
          minimumpriority: ""
      # Expose metrics for Prometheus scraping
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2801"
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi