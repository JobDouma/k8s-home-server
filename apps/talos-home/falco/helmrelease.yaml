apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf
    falco:
      jsonOutput: true
      logLevel: info
    daemonset:
      tolerations:
        - operator: Exists

    # NOT under daemonset — top level
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - talos-cp-3-rpi
    falcosidekick:
      enabled: true
      replicaCount: 1
      webui:
        enabled: true
        replicaCount: 1
      config:
        loki:
          hostport: http://loki-gateway.monitoring.svc.cluster.local
          minimumpriority: warning
          customHeaders: "X-Scope-OrgID: 1"
        prometheus:
          hostport: ""
          minimumpriority: ""
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2801"
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi