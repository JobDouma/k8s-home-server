apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    driver:
      kind: modern_ebpf

    falco:
      jsonOutput: true
      logLevel: info
      existingRulesConfigMaps:
        - falco-rules
        - falco-custom-rules

    daemonset:
      tolerations:
        - operator: Exists
      podAnnotations: {}

    falcosidekick:
      enabled: false

    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi