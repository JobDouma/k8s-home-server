apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falcosidekick
  namespace: falco
spec:
  interval: 15m
  maxHistory: 2
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falcosidekick
      version: "0.13.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: falcosidekick-values
      valuesKey: values.yaml
  values:
    replicaCount: 1
    tolerations:
      - operator: Exists
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 60
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 60

    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "2801"

    config:
      loki:
        hostport: "http://loki-gateway.monitoring.svc.cluster.local"
        minimumpriority: "warning"

    webui:
      enabled: true
      replicaCount: 1

    serviceMonitor:
      enabled: true