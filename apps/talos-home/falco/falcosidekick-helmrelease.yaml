apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falcosidekick
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: falco
      namespace: falco
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falcosidekick
      version: "0.13.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1

    tolerations:
      - operator: Exists

    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "2801"

    config:
      loki:
        hostport: "http://loki-gateway.monitoring.svc.cluster.local"
        minimumpriority: "warning"
        customHeaders: "X-Scope-OrgID: 1"
      ntfy:
        hostport: "http://ntfy.ntfy.svc.cluster.local"
        topic: "homelab-alerts"
        minimumpriority: "warning"
        checkcert: false

    webui:
      enabled: true
      replicaCount: 1

    serviceMonitor:
      enabled: false  # using your existing ServiceMonitor manifest