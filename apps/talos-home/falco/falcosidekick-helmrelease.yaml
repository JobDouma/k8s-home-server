apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falcosidekick
  namespace: falco
spec:
  interval: 15m
  dependsOn:
    - name: falco
      namespace: falco
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: falcosidekick
      version: "0.13.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    tolerations:
      - operator: Exists
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 60
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
        tolerationSeconds: 60

    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "2801"

    config:
      # Falcosidekick's native ntfy integration requires NTFY_TOKEN at init time
      # but the chart secret overrides it with an empty string — broken by design.
      # Use the generic webhook output instead: ntfy accepts plain HTTP POST natively
      # and the Authorization header is all that's needed for auth.
      webhook:
        address: "http://ntfy.ntfy.svc.cluster.local/homelab-alerts"
        minimumpriority: "warning"
        checkcert: false
        customHeaders: "Authorization:Bearer tk_ziuf1kf6mwr78xysvczcr57gs90hv"

      loki:
        hostport: "http://loki-gateway.monitoring.svc.cluster.local"
        minimumpriority: "warning"

    webui:
      enabled: true
      replicaCount: 1

    serviceMonitor:
      enabled: true