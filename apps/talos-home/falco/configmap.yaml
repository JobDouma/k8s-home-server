apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-custom-rules
  namespace: falco
  labels:
    kustomize.toolkit.fluxcd.io/name: apps
    kustomize.toolkit.fluxcd.io/namespace: flux-system
data:
  custom-rules.yaml: |
    # ── Silence expected noisy rules ──────────────────────────────

    - rule: Launch Privileged Container
      condition: and not (container.image.repository in (
        "ghcr.io/linuxserver/sonarr",
        "ghcr.io/linuxserver/radarr",
        "ghcr.io/linuxserver/prowlarr"
      ))
      override:
        condition: append

    - macro: allowed_media_readers
      condition: >
        container.image.repository = "jellyfin/jellyfin" and
        fd.name startswith "/media"

    - macro: qbittorrent_container
      condition: container.image.repository = "ghcr.io/onedr0p/qbittorrent"

    # ── Known legitimate K8s API callers ──────────────────────────

    - macro: allowed_k8s_api_callers
      condition: >
        (k8s.ns.name = "headlamp") or
        (k8s.ns.name = "monitoring" and container.name in (
          "loki-sc-rules",
          "grafana-sc-dashboard",
          "grafana-sc-datasources"
        ))

    - rule: Contact K8S API Server From Container
      condition: and not allowed_k8s_api_callers
      override:
        condition: append

    # ── Custom rules ───────────────────────────────────────────────

    - rule: Unexpected K8s Secret Access
      desc: A process accessed Kubernetes secrets via the API server
      condition: >
        ka.verb in (get, list, watch) and
        ka.target.resource = secrets and
        not ka.user.name in (
          "system:serviceaccount:monitoring:kube-prometheus-stack-prometheus",
          "system:serviceaccount:flux-system:kube-apiserver-health-check"
        )
      output: >
        Unexpected secret access (user=%ka.user.name verb=%ka.verb
        resource=%ka.target.resource ns=%ka.target.namespace)
      priority: WARNING
      source: k8s_audit

    - rule: Shell in Media Container
      desc: Shell spawned inside a media namespace container
      condition: >
        spawned_process and
        shell_procs and
        container and
        k8s.ns.name = "media"
      output: >
        Shell in media container (pod=%k8s.pod.name image=%container.image.repository
        shell=%proc.name)
      priority: WARNING
      tags: [media, shell]

    - rule: Unexpected Listening Port
      desc: A container started listening on an unexpected port
      condition: >
        evt.type = listen and
        container and
        not proc.name in (nginx, traefik, node, python3, java) and
        not fd.sport in (80, 443, 8080, 8096, 8989, 7878, 9696, 5055, 22300, 53)
      output: >
        Unexpected listen port (pod=%k8s.pod.name port=%fd.sport image=%container.image.repository)
      priority: NOTICE
      tags: [network]