# A small Redis deployment to share cache between the two Blocky replicas

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-blocky
  namespace: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-blocky
  template:
    metadata:
      labels:
        app: redis-blocky
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8-alpine@sha256:9eb6a7ba3d344e1958c7e1589fa3dee90373a934e8159c634562a91d622759a0
          args:
            - redis-server
            - --save
            - ""
            - --maxmemory
            - 64mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 80Mi
            limits:
              memory: 96Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-blocky
  namespace: dns
spec:
  selector:
    app: redis-blocky
  ports:
    - port: 6379
      targetPort: 6379