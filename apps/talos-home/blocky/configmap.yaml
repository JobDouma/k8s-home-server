apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns
data:
  config.yml: |
    upstream:
      default:
        - https://one.one.one.one/dns-query
        - https://dns.google/dns-query
        - 1.1.1.1
        - 8.8.8.8

    blocking:
      blackLists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          - https://big.oisd.nl/domainswild
          - https://raw.githubusercontent.com/jerryn70/GoodbyeAds/master/Hosts/GoodbyeAds.txt
        malware:
          - https://mirror1.malwaredomains.com/files/justdomains
          - https://urlhaus.abuse.ch/downloads/hostfile/
      clientGroupsBlock:
        default:
          - ads
          - malware

      # Ensure these are aligned correctly under 'blocking'
      blockType: zeroIp
      refreshPeriod: 4h

    caching:
      minTime: 5m
      maxTime: 30m
      prefetching: true

    ports:
      dns: 53
      http: 4000

    log:
      level: info
