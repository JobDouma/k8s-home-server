apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns
data:
  config.yml: |
    upstreams:
      groups:
        default:
          - https://one.one.one.one/dns-query
          - https://dns.google/dns-query
          - 1.1.1.1
          - 8.8.8.8
      timeout: 2s 

    blocking:
      blackLists:
        ads:
          - https://oisd.nl/downloads/full
          - https://adaway.org/hosts.txt
          - https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
          - https://raw.githubusercontent.com/hoshsadiq/adblock-nocoin-list/master/hosts.txt
          - https://raw.githubusercontent.com/EnergizedProtection/block/master/EnergizedBlu.hosts
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts          # StevenBlack consolidated
          - https://big.oisd.nl                                                        # oisd big (more aggressive)
        malware:
          - https://urlhaus.abuse.ch/downloads/hostfile/
          - https://raw.githubusercontent.com/nicehash/NiceHash-blocklist/master/blocklist.txt
          - https://phishing.army/download/phishing_army_blocklist_extended.txt        # phishing domains
          - https://raw.githubusercontent.com/DandelionSprout/adfilt/master/Alternate%20versions%20Anti-Malware%20List/AntiMalwareHosts.txt

      whiteLists:
        ads:
          - |
            # Common false positives
            clients4.google.com
            clients2.google.com
            s.youtube.com
            time.windows.com

      clientGroupsBlock:
        default:
          - ads
          - malware

      blockType: zeroIp

      loading:
        refreshPeriod: 4h

    caching:
      minTime: 5m
      maxTime: 1h     # was 30m — fine to increase
      prefetching: true          # proactively refresh popular domains before TTL expires
      prefetchExpires: 2h
      prefetchThreshold: 5

    ports:
      dns: 53
      http: 4000

    queryLog:
      type: console
      logRetentionDays: 7
    
    log:
      level: info

    prometheus:
      enable: true
      path: /metrics

    customDNS:
      mapping:
        # Kubernetes ingress
        dashy.lan: 192.168.2.100
        jellyfin.lan: 192.168.2.100
        jellyseerr.lan: 192.168.2.100
        radarr.lan: 192.168.2.100
        sonarr.lan: 192.168.2.100
        sabnzbd.lan: 192.168.2.100
        qbittorrent.lan: 192.168.2.100
        prowlarr.lan: 192.168.2.100
        prometheus.lan: 192.168.2.100
        grafana.lan: 192.168.2.100
        joplin.lan: 192.168.2.100
        traefik.lan: 192.168.2.100
        blocky.lan: 192.168.2.100
        headlamp.lan: 192.168.2.100
        freshrss.lan: 192.168.2.100
        auth.lan: 192.168.2.100
        falco.lan: 192.168.2.100
        longhorn.lan: 192.168.2.100
        gotify.lan: 192.168.2.100
        immich.lan: 192.168.2.100

        # external infra
        truenas.lan: 192.168.2.5
        router.lan: 192.168.2.254
        omni.lan: 192.168.2.12
