apiVersion: v1
kind: ConfigMap
metadata:
  name: blocky-config
  namespace: dns
data:
  config.yml: |
    upstreams:
      groups:
        default:
          - https://one.one.one.one/dns-query
          - https://dns.google/dns-query
          - 1.1.1.1
          - 8.8.8.8

    blocking:
      denylists:
        ads:
          - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
          - https://big.oisd.nl/domainswild
          - https://raw.githubusercontent.com/jerryn70/GoodbyeAds/master/Hosts/GoodbyeAds.txt
        malware:
          - https://mirror1.malwaredomains.com/files/justdomains
          - https://urlhaus.abuse.ch/downloads/hostfile/

      clientGroupsBlock:
        default:
          - ads
          - malware

      blockType: zeroIp
      refreshPeriod: 4h

    caching:
      minTime: 5m
      maxTime: 30m
      prefetching: true

    ports:
      dns: 53
      http: 4000

    log:
      level: info

    customDNS:
      mapping:
        jellyfin.lan: 192.168.2.22
        sonarr.lan: 192.168.2.22
        jellyseerr.lan: 192.168.2.22
        radarr.lan: 192.168.2.22
        qbittorrent.lan: 192.168.2.22
