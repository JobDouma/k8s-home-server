apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: dns
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        replicas: 2

        pod:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          annotations:
            configmap.reloader.stakater.com/reload: "blocky-config"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

        containers:
          main:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.23
            args:
              - --config
              - /app/config.yml

            ports:
              - name: dns-udp
                containerPort: 53
                protocol: UDP
              - name: dns-tcp
                containerPort: 53
                protocol: TCP
              - name: http
                containerPort: 4000
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE

    service:
      main:
        enabled: false

    persistence:
      config:
        enabled: true
        type: configMap
        name: blocky-config
        globalMounts:
          - path: /app/config.yml
            subPath: config.yml
            readOnly: true
