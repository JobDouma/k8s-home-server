apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: dns
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      blocky:
        replicas: 2
        strategy: RollingUpdate

        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: blocky
                  topologyKey: "kubernetes.io/hostname"

        containers:
          app:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.23

            args:
              - --config
              - /app/config.yml

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

            # ─── MOUNTS GO HERE IN V3 ─────────────────────
            volumeMounts:
              - name: config
                mountPath: /app/config.yml
                subPath: config.yml

            probes:
              liveness:
                enabled: true
                type: http
                path: /health
                port: 4000

              readiness:
                enabled: true
                type: http
                path: /health
                port: 4000

    # ─── SERVICE ─────────────────────────────────────────────
    service:
      app:
        controller: blocky
        type: LoadBalancer
        externalTrafficPolicy: Cluster

        annotations:
          metallb.universe.tf/address-pool: "dns-pool"

        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
          http:
            port: 4000

    # ─── PERSISTENCE MUST ONLY DECLARE SOURCE ───────────────
    persistence:
      config:
        type: configMap
        identifier: config
        name: blocky-config
