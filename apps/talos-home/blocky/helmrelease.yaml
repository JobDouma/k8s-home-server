apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: dns
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s # Use the same bjw-s repo as qBittorrent
        namespace: flux-system
  values:
    controllers:
      blocky:
        containers:
          app:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.23 # Better to pin versions than 'latest'
    service:
      app:
        controller: blocky
        type: NodePort
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
          http:
            port: 4000
            nodePort: 32600
    persistence:
      config:
        enabled: true
        type: configMap
        name: blocky-config
        globalMounts:
          - path: /app/config.yml
            subPath: config.yml
