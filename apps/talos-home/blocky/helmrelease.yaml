apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: dns
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      blocky:
        replicas: 2

        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: blocky
                    topologyKey: kubernetes.io/hostname

        containers:
          app:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.23
            args:
              - --config
              - /app/config.yml

            # Explicit container ports so the service can target them by name
            ports:
              dns-udp:
                containerPort: 53
                protocol: UDP
              dns-tcp:
                containerPort: 53
                protocol: TCP
              http:
                containerPort: 4000
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                add:
                  - NET_BIND_SERVICE

    service:
      app:
        controller: blocky
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          metallb.universe.tf/address-pool: "dns-pool"
        labels:
          app.kubernetes.io/name: blocky
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
            targetPort: dns-tcp
          dns-udp:
            port: 53
            protocol: UDP
            targetPort: dns-udp
          http:
            port: 4000
            protocol: TCP
            targetPort: http

    # This is the schema-valid way to mount your ConfigMap as /app/config.yml
    # (Your previous extraVolumes/extraVolumeMounts placement is what broke schema validation.)
    persistence:
      config:
        enabled: true
        type: configMap
        name: blocky-config
        globalMounts:
          - path: /app/config.yml
            subPath: config.yml
            readOnly: true
