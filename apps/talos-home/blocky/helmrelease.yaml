values:
  controller:
    replicas: 1

  image:
    repository: ghcr.io/0xerr0r/blocky
    tag: latest

  service:
    dns:
      enabled: true
      type: ClusterIP
      ports:
        udp:
          port: 53
        tcp:
          port: 53
    http:
      enabled: true
      type: ClusterIP
      ports:
        http:
          port: 4000

  persistence:
    config:
      enabled: true
      type: configMap
      name: blocky-config
      globalMounts:
        - path: /app/config.yml
          subPath: config.yml

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
