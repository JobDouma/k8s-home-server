apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
  namespace: dns
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      blocky:
        replicas: 2

        pod:
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

        containers:
          app:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.23
            args:
              - --config
              - /app/config.yml

    service:
      app:
        controller: blocky
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        annotations:
          metallb.universe.tf/address-pool: "dns-pool"
        labels:
          app.kubernetes.io/name: blocky
        ports:
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
          http:
            port: 4000

    persistence:
      config:
        enabled: true
        type: configMap
        name: blocky-config
        mountPath: /app/config.yml
        readOnly: true
