apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 60m
  dependsOn:
    - name: loki
      namespace: monitoring

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.15.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

  install:
    crds: CreateReplace
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    grafana:
      revisionHistoryLimit: 2
      tolerations:
        - operator: Exists
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 600
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 600
      deploymentStrategy:
        type: Recreate

      grafana.ini:
        unified_alerting:
          enabled: true
        alerting:
          enabled: false

      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi

      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              uid: prometheus
              url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              access: proxy
              isDefault: true
              jsonData:
                timeInterval: 60s    # match new scrape interval
            - name: Loki
              type: loki
              uid: loki
              url: http://loki-gateway.monitoring.svc.cluster.local
              access: proxy
              isDefault: false
              jsonData:
                maxLines: 1000
            - name: Tempo
              type: tempo
              uid: tempo
              url: http://tempo.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false

      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: true
        datasources:
          enabled: false

      admin:
        existingSecret: grafana-admin

      persistence:
        enabled: true
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        size: 5Gi

    prometheus:
      prometheusSpec:
        tolerations:
          - operator: Exists
          - key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 600
          - key: "node.kubernetes.io/unreachable"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 600
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}

        # Scrape every 60s instead of 15s — single biggest CPU reduction
        # Homelab metrics don't need sub-minute resolution
        scrapeInterval: 60s
        evaluationInterval: 60s

        # Keep 5 days — enough for trend analysis without bloating TSDB
        retention: 5d
        retentionSize: 15GB   # hard cap so it can't exceed your 20Gi PVC

        # Compress WAL — reduces memory and disk usage
        walCompression: true

        # Limit TSDB in-memory chunks
        tsdb:
          outOfOrderTimeWindow: 0s  # disable out-of-order ingestion — not needed for homelab

        resources:
          requests:
            cpu: 50m        # down from 100m — 60s interval does 4x less work
            memory: 400Mi   # down from 512Mi
          limits:
            cpu: 500m
            memory: 1Gi     # down from 2Gi — 5d retention needs far less

        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    alertmanager:
      alertmanagerSpec:
        tolerations:
          - operator: Exists
          - key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 600
          - key: "node.kubernetes.io/unreachable"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 600

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi

        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi

    prometheus-node-exporter:
      hostRootFsMount:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi