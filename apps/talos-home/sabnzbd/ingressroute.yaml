apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sabnzbd
  namespace: media
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`sabnzbd.lan`)
      kind: Rule
      middlewares:
        - name: traefik-chain
          namespace: networking
      services:
        - name: sabnzbd
          port: 8080
