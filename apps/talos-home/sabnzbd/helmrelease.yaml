apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      sabnzbd:
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

        # TEST THIS FIRST
        # To add whitelist to conflig/sabnzbd.ini (persisted, so only needed if persistence crashes)
        # initContainers:
        #   fix-host-whitelist:
        #     image: alpine:3.20
        #     command:
        #       - /bin/sh
        #       - -ec
        #       - |
        #         CFG="/config/sabnzbd.ini"

        #         if [ ! -f "$CFG" ]; then
        #           echo "sabnzbd.ini not found yet, skipping"
        #           exit 0
        #         fi

        #         if grep -q '^host_whitelist' "$CFG"; then
        #           sed -i 's/^host_whitelist.*/host_whitelist = sabnzbd.lan,localhost,127.0.0.1/' "$CFG"
        #         else
        #           printf '\n[misc]\nhost_whitelist = sabnzbd.lan,localhost,127.0.0.1\n' >> "$CFG"
        #         fi
        #     volumeMounts:
        #       - name: config
        #         mountPath: /config

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/sabnzbd
              tag: 4.2.3
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add:
                  - SETUID
                  - SETGID
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
              SABNZBD__HOST: 0.0.0.0
              SABNZBD__PORT: 8080
            ports:
              - name: http
                containerPort: 8080
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: sabnzbd
        type: ClusterIP
        ports:
          http:
            port: 8080

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: sabnzbd

      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /downloads
            subPath: usenet
