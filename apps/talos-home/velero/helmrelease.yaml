apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: velero
      version: "11.4.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  values:
    upgradeCRDs: false

    # AWS plugin is required to talk to MinIO (S3-compatible)
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    configuration:
      defaultVolumesToFsBackup: true
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          default: true
          accessMode: ReadWrite
          config:
            region: minio
            s3ForcePathStyle: "true"
            s3Url: http://minio.velero.svc.cluster.local:9000
      maintenanceJobConfig:
        jobTTL: 1h0m0s
      volumeSnapshotLocation: []

    credentials:
      useSecret: true
      existingSecret: velero-minio-credentials
      existingSecretKey: cloud

    deployNodeAgent: true

    metrics:
      enabled: true
      serviceMonitor:
        enabled: false  # managed by servicemonitor.yaml

    schedules:
      daily:
        disabled: false
        schedule: "0 3 * * *"
        template:
          ttl: 720h
          snapshotVolumes: false
          defaultVolumesToFsBackup: true
          excludedNamespaces:
            - metallb-system
            - networking
            - velero