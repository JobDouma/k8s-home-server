apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  timeout: 20m

  chart:
    spec:
      chart: velero
      version: "6.0.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system

  values:

    configuration:
      backupStorageLocation:
        - name: default
          provider: velero.io/fs
          bucket: velero
          default: true
          config:
            path: /backups

      volumeSnapshotLocation: []

    deployNodeAgent: true

    persistence:
      enabled: true
      existingClaim: velero-backup-storage

    schedules:
      daily:
        disabled: false
        schedule: "0 3 * * *"
        template:
          ttl: 720h
          snapshotVolumes: false