# velero/networkpolicy.yaml
# Velero objects-only backup — no node-agent

# Default deny all ingress and egress in velero namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: velero
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Velero server: allow egress to MinIO and Kubernetes API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: velero-server
  namespace: velero
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: velero
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8085
  egress:
    # Allow talking to MinIO
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
    # Allow talking to Kubernetes API
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 6443
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# MinIO: only accept traffic from velero (node-agent removed)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio
  namespace: velero
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: velero
      ports:
        - port: 9000
    # Allow port-forward access for debugging
    - ports:
        - port: 9001
  egress:
    # MinIO writes to NFS PVC — needs host network egress to TrueNAS
    - to:
        - ipBlock:
            cidr: 192.168.2.0/24