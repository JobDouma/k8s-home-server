apiVersion: v1
kind: Namespace
metadata:
  name: actual-ai


#   🔁 How it works (end‑to‑end)
# 1. Every day the CronJob pod starts.
# 2. It logs into Actual Budget using the secret credentials.
# 3. It fetches all transactions where category is null (uncategorized).
# 4. For each transaction, it calls the classifier API with payee_name + notes.
# 5. The classifier first checks the regex rules (ConfigMap). If a match is found, it returns the category and tags immediately.
# 6. Otherwise, it sends the description to Ollama (Mistral) and asks for a JSON classification.
# 7. The worker receives the category and tags, maps the category name to an Actual category ID (by fetching the category list once per run), and updates the transaction.
# 8. Tags are appended to the transaction’s notes field.
# 9. Next run, that transaction will already have a category and won’t be processed again.