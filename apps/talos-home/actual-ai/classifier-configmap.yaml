apiVersion: v1
kind: ConfigMap
metadata:
  name: classifier-config
  namespace: actual-ai
data:
  rules.yaml: |
    rules:
      # ========== FOOD & GROCERIES ==========
      - match: "AH|Albert Heijn|Jumbo|Lidl|Aldi|Dirk"
        category: Groceries
        tags: ["supermarket"]
      - match: "Sphinx Levensmiddelen"
        category: Groceries
        tags: ["supermarket"]
      - match: "Toko Pedis|Toko Rinus"
        category: Groceries
        tags: ["toko","ethnic"]

      # ========== DINING OUT ==========
      - match: "Thuisbezorgd|UberEats|Domino|Pizza"
        category: Dining Out
        tags: ["takeout"]
      - match: "Mcd Utrecht|McDonald"
        category: Dining Out
        tags: ["fastfood"]
      - match: "The Doner Factory|Bck\\*King Doner|Five Guys"
        category: Dining Out
        tags: ["fastfood"]
      - match: "Hoxton Amsterdam|Paak Vinyl Bar"
        category: Dining Out
        tags: ["bar","drinks"]

      # ========== TRANSPORT ==========
      - match: "NS|OV-chipkaart|Trein"
        category: Transport
        tags: ["public-transport"]
      - match: "Uber|Taxi"
        category: Transport
        tags: ["taxi"]
      - match: "Shell|BP|Esso|Total|Tankstation"
        category: Transport
        tags: ["fuel"]

      # ========== HOUSING: RENT ==========
      - match: "Stichting Talis|Talis Woondiensten"
        category: Rent
        tags: ["rent","housing"]

      # ========== HOUSING: MORTGAGE ==========
      - match: "Ing Hypotheken"
        category: Mortgage
        tags: ["mortgage","housing"]

      # ========== BILLS ==========
      - match: "Vitens Nv"
        category: Bills
        tags: ["water"]
      - match: "Youfone Nederland B\\.V\\."
        category: Bills
        tags: ["mobile","internet"]
      - match: "Ziggo|KPN|Vattenfall|Waternet"
        category: Bills
        tags: ["utilities"]
      - match: "Eneco|Eneco Services"
        category: Bills
        tags: ["energy"]
      - match: "Onvz Zorgverzekeraar"
        category: Bills
        tags: ["health-insurance"]
      - match: "Inshared Nederland B\\.V\\."
        category: Bills
        tags: ["car-insurance"]
      - match: "Opgroen Verzekeringen B\\.V\\. Veh"
        category: Bills
        tags: ["house-insurance"]
      - match: "Kosten Oranjepakket"
        category: Bills
        tags: ["bank-fees"]
      - match: "Incasso Ing Creditcard"
        category: Bills
        tags: ["creditcard"]

      # ========== SHOPPING ==========
      - match: "Bol\\.com|Coolblue|Amazon|Wehkamp|Bolcom Bv"
        category: Shopping
        tags: ["online"]
      - match: "Zalando Payments Gmbh"
        category: Shopping
        tags: ["clothing","online"]
      - match: "Vinted via Mangopay Sa"
        category: Shopping
        tags: ["secondhand","clothing"]
      - match: "Zumub via Checkout\\.Com"
        category: Shopping
        tags: ["supplements"]
      - match: "Mangopay|Ppro Payment Services Sa"
        category: Shopping
        tags: ["payment-processor"]
      - match: "Hema"
        category: Shopping
        tags: ["retail"]
      - match: "Alipay"
        category: Shopping
        tags: ["online","international"]

      # ========== HEALTHCARE ==========
      - match: "Huisarts|Apotheek|Dokter|Ziekenhuis"
        category: Healthcare
        tags: ["medical"]

      # ========== ENTERTAINMENT ==========
      - match: "Ticketingpayments|St Paylogic Foundation"
        category: Entertainment
        tags: ["tickets","events"]
      - match: "Netflix|Spotify|Disney\\+"
        category: Entertainment
        tags: ["subscription"]
      - match: "Stayokay Utrechtcentrum"
        category: Entertainment
        tags: ["travel","hostel"]
      # Match "Booking", "Booking.com", "Booking Holdings" — all variants
      - match: "Booking"
        category: Entertainment
        tags: ["travel"]
      - match: "Bleep"
        category: Entertainment
        tags: ["travel"]
      - match: "Breeze|D\\. Top B\\.V\\."
        category: Entertainment
        tags: ["Dating"]

      # ========== INCOME ==========
      - match: "Ing Bank Nv Inzake Salarisbetaling"
        category: Income
        tags: ["salary"]
      - match: "Transfer: Hr J B P Douma"
        category: Income
        tags: ["transfer-in"]

      # ========== PERSONAL TRANSFERS ==========
      - match: "Hr Mi Douma|Hr P F E J Douma|Hr S Lamers|J B P Douma|J\\.B\\.P\\. Douma|Mw Eej Douma"
        category: Personal Transfer
        tags: ["internal"]
      - match: "Trustly Group Ab"
        category: Personal Transfer
        tags: ["payment"]
      # E.P. Vergeer-Koppe — recurring personal transfer (family)
      - match: "Vergeer|Vergeer-Koppe"
        category: Personal Transfer
        tags: ["family"]
      # A. Azaad — small personal payment
      - match: "Azaad"
        category: Personal Transfer
        tags: ["personal"]
      # Cetin via Tikkie
      - match: "Cetin via Tikkie|Tikkie"
        category: Personal Transfer
        tags: ["tikkie"]

      # ========== TAXES / GOVERNMENT ==========
      - match: "Belastingsamenwerking|Belastingdienst|Gemeente"
        category: Taxes & Fees
        tags: ["government"]

      # ========== SAVINGS ==========
      - match: "ASN Bank|Triodos|Rabo"
        category: Savings
        tags: ["savings"]

      # ========== PERSONAL CARE ==========
      - match: "Barber|Kapper"
        category: Personal Care
        tags: ["grooming"]

      # ========== SYSTEM / GENERAL ==========
      - match: "Nlovx75pxnm4egy58z"
        category: General
        tags: ["unknown"]
      # Starting Balance — match both singular and plural variants
      - match: "Starting Balanc"
        category: Starting Balances
        tags: ["initial"]