apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier-api
  namespace: actual-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classifier-api
  template:
    metadata:
      labels:
        app: classifier-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: python:3.14.4-slim@sha256:c11aee3b3cae066f55d1e9318fc812673aa6557073b0db0d792b59491b262e0c
          command:
            - /bin/sh
            - -c
            - |
              pip install --quiet --target /tmp/pypackages fastapi uvicorn pyyaml requests && \
              cp /script/app.py /tmp/app.py && \
              PYTHONPATH=/tmp/pypackages python -m uvicorn app:app --app-dir /tmp --host 0.0.0.0 --port 8080
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: script
              mountPath: /script
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: classifier-config
        - name: script
          configMap:
            name: classifier-script