apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier-api
  namespace: actual-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: classifier-api
  template:
    metadata:
      labels:
        app: classifier-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: python:3.14.5-slim@sha256:7a500125bc50693f2214e842a621440a1b1b9cbb2188f74ab045d29ed2ea5856
          command:
            - /bin/sh
            - -c
            - |
              pip install --quiet --target /tmp/pypackages fastapi uvicorn pyyaml requests && \
              cp /script/app.py /tmp/app.py && \
              PYTHONPATH=/tmp/pypackages python -m uvicorn app:app \
                --app-dir /tmp --host 0.0.0.0 --port 8080
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /config
            - name: script
              mountPath: /script
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /docs
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: classifier-config
        - name: script
          configMap:
            name: classifier-script