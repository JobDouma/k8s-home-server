apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: actual-ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      ollama:
        replicas: 1

        initContainers:
          pull-model:
            image:
              repository: ollama/ollama
              tag: "0.31.0@sha256:02e36fe162a0b008d452f8a5ce034ac2f8e47e2e1f3a40bca1159ce9fc593da3"
            env:
              - name: OLLAMA_HOST
                value: "0.0.0.0"
              - name: OLLAMA_MODELS
                value: /models
            command:
              - /bin/sh
              - -c
              - |
                ollama serve &
                OLLAMA_PID=$!
                sleep 5
                ollama pull mistral
                # Kill gracefully; ignore error if process already exited
                kill $OLLAMA_PID 2>/dev/null || true
                wait $OLLAMA_PID 2>/dev/null || true
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 2Gi

        containers:
          app:
            image:
              repository: ollama/ollama
              tag: "0.31.0@sha256:02e36fe162a0b008d452f8a5ce034ac2f8e47e2e1f3a40bca1159ce9fc593da3"
            env:
              - name: OLLAMA_MODELS
                value: /models
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: 4
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-cp-1
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    service:
      app:
        controller: ollama
        type: ClusterIP
        ports:
          http:
            port: 11434

    persistence:
      models:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: ollama-data
        globalMounts:
          - path: /models
      ollama-home:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /.ollama