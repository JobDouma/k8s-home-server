apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: actual-ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      ollama:
        replicas: 1
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: latest
            env:
              - name: OLLAMA_MODELS
                value: /models
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 4
                memory: 8Gi
    service:
      app:
        controller: ollama
        type: ClusterIP
        ports:
          http:
            port: 11434
    persistence:
      models:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: ollama-data
        globalMounts:
          - path: /models
    initContainers:
      pull-model:
        image: ollama/ollama:latest
        command:
          - /bin/sh
          - -c
          - "ollama pull mistral"
        volumeMounts:
          - name: models
            mountPath: /models