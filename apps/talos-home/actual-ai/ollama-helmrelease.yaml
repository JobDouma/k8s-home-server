apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: actual-ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      ollama:
        replicas: 1

        # initContainers must be nested under the controller, not at values root.
        # This is what ensures Mistral is pulled before the main container starts.
        initContainers:
          pull-model:
            image:
              repository: ollama/ollama
              tag: "0.23.2@sha256:d00473cb58f0082c07cd6ed0d326a8a86f443ab69c51f8fc2b1a41687d45c661"
            env:
              - name: OLLAMA_HOST
                value: "0.0.0.0"
              - name: OLLAMA_MODELS
                value: /models
            command:
              - /bin/sh
              - -c
              - |
                ollama serve &
                sleep 5
                ollama pull mistral
                kill %1
            volumeMounts:
              - name: models
                mountPath: /models
              - name: ollama-home
                mountPath: /.ollama
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 2Gi

        containers:
          app:
            image:
              repository: ollama/ollama
              tag: "0.23.2@sha256:d00473cb58f0082c07cd6ed0d326a8a86f443ab69c51f8fc2b1a41687d45c661"
            env:
              - name: OLLAMA_MODELS
                value: /models
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: 4
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-cp-1
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

    service:
      app:
        controller: ollama
        type: ClusterIP
        ports:
          http:
            port: 11434

    persistence:
      models:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: ollama-data
        globalMounts:
          - path: /models
      ollama-home:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /.ollama