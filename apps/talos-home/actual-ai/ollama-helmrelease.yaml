apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: actual-ai
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      ollama:
        replicas: 1
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: "0.5.1@sha256:722ce8caba5f8b8bd2ee654b2e29466415be3071a704e3f4db1702b83c885f76"
            env:
              - name: OLLAMA_MODELS
                value: /models
            ports:
              - name: http
                containerPort: 11434
            resources:
              requests:
                cpu: 1
                memory: 2Gi
              limits:
                cpu: 4
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]

    defaultPodOptions:
      nodeSelector:
        kubernetes.io/hostname: talos-cp-1
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: ollama-home
          emptyDir: {}

    service:
      app:
        controller: ollama
        type: ClusterIP
        ports:
          http:
            port: 11434

    persistence:
      models:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: ollama-data
        globalMounts:
          - path: /models
      ollama-home:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /.ollama

    initContainers:
      pull-model:
        image:
          repository: ollama/ollama
          tag: "0.5.1@sha256:722ce8caba5f8b8bd2ee654b2e29466415be3071a704e3f4db1702b83c885f76"
        env:
          - name: OLLAMA_MODELS
            value: /models
        command:
          - /bin/sh
          - -c
          - "ollama pull mistral"
        volumeMounts:
          - name: models
            mountPath: /models
          - name: ollama-home
            mountPath: /.ollama
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi