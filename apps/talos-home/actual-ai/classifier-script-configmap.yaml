apiVersion: v1
kind: ConfigMap
metadata:
  name: classifier-script
  namespace: actual-ai
data:
  app.py: |
    import re, yaml, requests, logging
    from fastapi import FastAPI, Query
    from pathlib import Path

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    app = FastAPI()

    RULES_PATH = Path("/config/rules.yaml")
    OLLAMA_URL = "http://ollama.actual-ai.svc.cluster.local:11434/api/generate"
    OLLAMA_MODEL = "mistral"


    def load_rules():
        with open(RULES_PATH) as f:
            return yaml.safe_load(f)["rules"]


    @app.get("/classify")
    def classify(q: str = Query(...)):
        rules = load_rules()

        # 1. Regex rule matching (case-insensitive)
        for rule in rules:
            if re.search(rule["match"], q, re.IGNORECASE):
                logger.info(f"Rule match: '{rule['match']}' → {rule['category']}")
                return {"category": rule["category"], "tags": rule.get("tags", []), "source": "rules"}

        # 2. Fallback: Ollama / Mistral
        prompt = (
            f"Classify this bank transaction into a category and provide relevant tags.\n"
            f"Transaction: {q}\n"
            f"Respond ONLY with valid JSON in this exact format:\n"
            f'{{ "category": "CategoryName", "tags": ["tag1", "tag2"] }}\n'
            f"Categories: Groceries, Dining, Transport, Utilities, Shopping, Healthcare, "
            f"Entertainment, Income, Financial, Transfer, Other"
        )
        try:
            resp = requests.post(
                OLLAMA_URL,
                json={"model": OLLAMA_MODEL, "prompt": prompt, "stream": False},
                timeout=30,
            )
            resp.raise_for_status()
            import json
            result = json.loads(resp.json()["response"])
            logger.info(f"Ollama classified '{q}' → {result}")
            result["source"] = "ollama"
            return result
        except Exception as e:
            logger.error(f"Ollama failed for '{q}': {e}")
            return {"category": "Other", "tags": ["unclassified"], "source": "fallback"}