apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-auto-categorize
  namespace: actual-ai
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: worker
              # node:22.22.2-bookworm — full Debian bookworm, ships with python3/make/g++
              # so better-sqlite3 can compile without apt-get.
              # Pinned to amd64 digest to prevent tag drift (node:22-slim was serving Node 26).
              # Node 22 is Active LTS until April 2027; better-sqlite3 has no Node 26 prebuilds yet.
              image: node:26.1.0-bookworm@sha256:4dcfc817dc5f638b0f50f30c6d545e8d1c45934a5ac228770d14cb9ccc015b61
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Node: $(node --version)"
                  mkdir -p /tmp/actual-data /tmp/npm-cache /tmp/npm-pkgs
                  npm install \
                    --prefix /tmp/npm-pkgs \
                    --cache /tmp/npm-cache \
                    @actual-app/api 2>&1
                  cp /worker/worker.mjs /tmp/npm-pkgs/worker.mjs
                  cd /tmp/npm-pkgs
                  node --experimental-vm-modules worker.mjs
              env:
                - name: ACTUAL_SERVER
                  value: "http://actual-budget.actual-budget.svc.cluster.local:5006"
                - name: ACTUAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: password
                - name: BUDGET_ID
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: budgetId
                - name: CLASSIFIER_URL
                  value: "http://classifier-api.actual-ai.svc.cluster.local:8080/classify"
              volumeMounts:
                - name: worker-script
                  mountPath: /worker
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: worker-script
              configMap:
                name: worker-script