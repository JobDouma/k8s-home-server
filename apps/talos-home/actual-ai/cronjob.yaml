apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-auto-categorize
  namespace: actual-ai
spec:
  schedule: "0 3 * * *"          # 03:00 every night, once per day
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: worker
              # Node 22 is the current Active LTS ("Jod") — correct security choice.
              # Node 26 is "Current" (unstable/bleeding-edge) and better-sqlite3
              # does not yet ship prebuilt binaries for it, causing the gyp/Python
              # compile failure seen during testing.
              # Node 24 is the next LTS but also lacks better-sqlite3 prebuilds as of May 2026.
              # Node 22 LTS has full prebuilt support and security patches until Apr 2027.
              #
              # Tag drift fix: node:22-slim was resolving to Node 26 from cluster cache.
              # We pin to the exact patch release to guarantee the version we get.
              # Use `docker buildx imagetools inspect node:22.15.0-slim` to refresh digest.
              image: node:22.22.2-bookworm@sha256:03746f6aafd73f2da621094d5e27426225820e93bc202daea0cf1fa388c1ce09
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Node version: $(node --version)"
                  apt-get update -qq && \
                  apt-get install -y --no-install-recommends python3 make g++ && \
                  rm -rf /var/lib/apt/lists/*
                  mkdir -p /tmp/actual-data /tmp/npm-cache /tmp/npm-pkgs
                  npm install \
                    --prefix /tmp/npm-pkgs \
                    --cache /tmp/npm-cache \
                    @actual-app/api 2>&1
                  NODE_PATH=/tmp/npm-pkgs/node_modules \
                  node --experimental-vm-modules /worker/worker.mjs
              env:
                - name: ACTUAL_SERVER
                  value: "http://actual-budget.actual-budget.svc.cluster.local:5006"
                - name: ACTUAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: password
                - name: BUDGET_ID
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: budgetId
                - name: CLASSIFIER_URL
                  value: "http://classifier-api.actual-ai.svc.cluster.local:8080/classify"
              volumeMounts:
                - name: worker-script
                  mountPath: /worker
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: worker-script
              configMap:
                name: worker-script