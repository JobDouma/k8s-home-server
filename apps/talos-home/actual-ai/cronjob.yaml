apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-auto-categorize
  namespace: actual-ai
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: worker
              image: python:3.14.4-slim@sha256:c11aee3b3cae066f55d1e9318fc812673aa6557073b0db0d792b59491b262e0c
              command:
                - /bin/sh
                - -c
                - |
                  pip install --quiet --target /tmp/pypackages requests && \
                  PYTHONPATH=/tmp/pypackages python /worker/worker.py
              env:
                - name: ACTUAL_SERVER
                  value: "http://actual-budget.actual-budget.svc.cluster.local:5006"
                - name: ACTUAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: password
                - name: BUDGET_ID
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: budgetId
                - name: CLASSIFIER_URL
                  value: "http://classifier-api.actual-ai.svc.cluster.local:8080/classify"
              volumeMounts:
                - name: worker-script
                  mountPath: /worker
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: worker-script
              configMap:
                name: worker-script