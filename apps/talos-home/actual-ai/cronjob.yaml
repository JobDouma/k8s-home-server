apiVersion: batch/v1
kind: CronJob
metadata:
  name: actual-auto-categorize
  namespace: actual-ai
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: worker
              image: node:22.15.0-slim@sha256:557e52a0fcb928ee113df7e1fb5d4f60c1341dbda53f55e3d815ca10807efdce
              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /tmp/actual-data /tmp/npm-cache && \
                  npm install --prefix /tmp/npm-pkgs --cache /tmp/npm-cache \
                    @actual-app/api node-fetch 2>&1 && \
                  NODE_PATH=/tmp/npm-pkgs/node_modules \
                  node --experimental-vm-modules /worker/worker.mjs
              env:
                - name: ACTUAL_SERVER
                  value: "http://actual-budget.actual-budget.svc.cluster.local:5006"
                - name: ACTUAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: password
                - name: BUDGET_ID
                  valueFrom:
                    secretKeyRef:
                      name: actual-credentials
                      key: budgetId
                - name: CLASSIFIER_URL
                  value: "http://classifier-api.actual-ai.svc.cluster.local:8080/classify"
              volumeMounts:
                - name: worker-script
                  mountPath: /worker
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: worker-script
              configMap:
                name: worker-script