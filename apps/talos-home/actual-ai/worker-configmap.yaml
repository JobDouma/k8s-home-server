apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-script
  namespace: actual-ai
data:
  worker.py: |
    import os, requests, logging
    from typing import List, Dict

    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    ACTUAL_SERVER = os.getenv("ACTUAL_SERVER")
    PASSWORD = os.getenv("ACTUAL_PASSWORD")
    BUDGET_ID = os.getenv("BUDGET_ID")
    CLASSIFIER_URL = os.getenv("CLASSIFIER_URL")

    def get_session():
        sess = requests.Session()
        resp = sess.post(f"{ACTUAL_SERVER}/api/login", json={"password": PASSWORD})
        resp.raise_for_status()
        return sess

    def get_uncategorized(sess):
        url = f"{ACTUAL_SERVER}/api/budgets/{BUDGET_ID}/transactions"
        params = {"uncategorized": "true"}
        resp = sess.get(url, params=params)
        resp.raise_for_status()
        return resp.json().get("data", [])

    def get_category_map(sess):
        resp = sess.get(f"{ACTUAL_SERVER}/api/budgets/{BUDGET_ID}/categories")
        resp.raise_for_status()
        return {c["name"]: c["id"] for c in resp.json()["data"]}

    def main():
        if not all([ACTUAL_SERVER, PASSWORD, BUDGET_ID, CLASSIFIER_URL]):
            logger.error("Missing required env vars")
            return

        sess = get_session()
        txs = get_uncategorized(sess)
        if not txs:
            logger.info("No uncategorized transactions")
            return

        cat_map = get_category_map(sess)
        fallback_id = cat_map.get("Other")

        for tx in txs:
            payee = tx.get("payee_name") or tx.get("description") or "Unknown"
            notes = tx.get("notes", "")
            combined = f"{payee} {notes}".strip()

            try:
                resp = requests.get(CLASSIFIER_URL, params={"q": combined}, timeout=10)
                resp.raise_for_status()
                result = resp.json()
                cat_name = result["category"]
                tags = result.get("tags", [])
            except Exception as e:
                logger.error(f"Classifier failed for {payee}: {e}")
                continue

            cat_id = cat_map.get(cat_name, fallback_id)
            if not cat_id:
                continue

            payload = {"category": cat_id}
            if tags:
                new_notes = f"{notes}\nAI tags: {', '.join(tags)}".strip()
                payload["notes"] = new_notes

            try:
                patch_url = f"{ACTUAL_SERVER}/api/transactions/{tx['id']}"
                sess.patch(patch_url, json=payload).raise_for_status()
                logger.info(f"Updated {payee} → {cat_name} {tags}")
            except Exception as e:
                logger.error(f"Update failed for {tx['id']}: {e}")

    if __name__ == "__main__":
        main()
