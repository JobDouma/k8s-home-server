apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-script
  namespace: actual-ai
data:
  worker.mjs: |
    import * as api from '@actual-app/api';

    const ACTUAL_SERVER   = process.env.ACTUAL_SERVER;
    const ACTUAL_PASSWORD = process.env.ACTUAL_PASSWORD;
    const BUDGET_ID       = process.env.BUDGET_ID;
    const CLASSIFIER_URL  = process.env.CLASSIFIER_URL;
    // Set RESET_CATEGORIES=true to clear all AI-set categories and reprocess from scratch.
    // Use once after rule changes; leave unset for normal daily runs.
    const RESET_MODE      = process.env.RESET_CATEGORIES === 'true';

    const CATEGORY_GROUPS = {
      "Usual Expenses": [
        "Groceries", "Dining Out", "Transport",
        "Rent", "Mortgage",
        "Bills", "Shopping", "Healthcare", "Entertainment",
        "Personal Care", "Personal Transfer", "Taxes & Fees", "General",
      ],
      "Investments and Savings": ["Savings"],
      "Income": ["Income", "Starting Balances"],
    };

    async function classify(text) {
      const url = new URL(CLASSIFIER_URL);
      url.searchParams.set('q', text);
      const resp = await fetch(url.toString(), { signal: AbortSignal.timeout(90000) });
      if (!resp.ok) throw new Error(`Classifier HTTP ${resp.status}`);
      return resp.json();
    }

    async function ensureCategories(existingCats, existingGroups) {
      const catMap   = Object.fromEntries(existingCats.map(c => [c.name, c.id]));
      const groupMap = Object.fromEntries(existingGroups.map(g => [g.name, g.id]));
      for (const [groupName, categoryNames] of Object.entries(CATEGORY_GROUPS)) {
        if (!groupMap[groupName]) {
          console.log(`Creating missing group: ${groupName}`);
          groupMap[groupName] = await api.createCategoryGroup({ name: groupName });
        }
        for (const catName of categoryNames) {
          if (!catMap[catName]) {
            console.log(`Creating missing category: ${catName} in ${groupName}`);
            catMap[catName] = await api.createCategory({
              name: catName,
              group_id: groupMap[groupName],
            });
          }
        }
      }
      return catMap;
    }

    async function main() {
      console.log(`Mode: ${RESET_MODE ? 'RESET + reprocess all' : 'normal (uncategorized only)'}`);
      console.log('Connecting to Actual Budget at', ACTUAL_SERVER);

      await api.init({
        serverURL: ACTUAL_SERVER,
        password:  ACTUAL_PASSWORD,
        dataDir:   '/tmp/actual-data',
      });

      await api.downloadBudget(BUDGET_ID);
      console.log('Budget downloaded');

      const accounts       = await api.getAccounts();
      const existingCats   = await api.getCategories();
      const existingGroups = await api.getCategoryGroups();
      const catMap         = await ensureCategories(existingCats, existingGroups);
      const fallback       = catMap['General'];

      console.log(`Found ${accounts.length} accounts, ${Object.keys(catMap).length} categories`);

      let updated = 0, skipped = 0, failed = 0;

      for (const account of accounts) {
        const txs = await api.getTransactions(account.id);

        let toProcess;
        if (RESET_MODE) {
          // Reset mode: clear category and notes on ALL non-parent transactions,
          // then reprocess everything from scratch.
          toProcess = txs.filter(tx => !tx.is_parent);
          console.log(`RESET: clearing ${toProcess.length} transactions in "${account.name}"`);
          for (const tx of toProcess) {
            await api.updateTransaction(tx.id, {
              id: tx.id,
              category: null,
              notes: '',
            });
          }
        } else {
          // Normal mode: only process uncategorized transactions
          toProcess = txs.filter(tx => !tx.category && !tx.is_parent);
        }

        console.log(`Account "${account.name}": processing ${toProcess.length} transactions`);

        for (const tx of toProcess) {
          const payee    = tx.imported_payee || tx.payee || 'Unknown';
          const notes    = '';  // always start from clean notes
          const combined = payee.trim();

          let result;
          try {
            result = await classify(combined);
          } catch (e) {
            console.error(`  x Classifier failed for "${payee}":`, e.message);
            failed++;
            continue;
          }

          const catId = catMap[result.category] ?? fallback;
          if (!catId) {
            console.warn(`  x No category ID for "${result.category}", payee: "${payee}"`);
            skipped++;
            continue;
          }

          // Write only the category — no tag noise in notes
          const update = { id: tx.id, category: catId };

          try {
            await api.updateTransaction(tx.id, update);
            console.log(`  ok [${result.source}] "${payee}" -> ${result.category}`);
            updated++;
          } catch (e) {
            console.error(`  x Update failed for "${payee}" (${tx.id}):`, e.message);
            failed++;
          }
        }
      }

      console.log(`\nDone. Updated: ${updated}, Skipped: ${skipped}, Failed: ${failed}`);
      await api.shutdown();
    }

    main().catch(e => { console.error(e); process.exit(1); });