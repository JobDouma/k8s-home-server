apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-script
  namespace: actual-ai
data:
  worker.mjs: |
    import * as api from '@actual-app/api';
    // Node 22 has fetch built-in globally — no node-fetch import needed.

    const ACTUAL_SERVER   = process.env.ACTUAL_SERVER;
    const ACTUAL_PASSWORD = process.env.ACTUAL_PASSWORD;
    const BUDGET_ID       = process.env.BUDGET_ID;
    const CLASSIFIER_URL  = process.env.CLASSIFIER_URL;

    async function classify(text) {
      const url = new URL(CLASSIFIER_URL);
      url.searchParams.set('q', text);
      const resp = await fetch(url.toString(), { signal: AbortSignal.timeout(15000) });
      if (!resp.ok) throw new Error(`Classifier HTTP ${resp.status}`);
      return resp.json();
    }

    async function main() {
      console.log('Connecting to Actual Budget at', ACTUAL_SERVER);
      await api.init({
        serverURL: ACTUAL_SERVER,
        password:  ACTUAL_PASSWORD,
        dataDir:   '/tmp/actual-data',
      });

      await api.downloadBudget(BUDGET_ID);
      console.log('Budget downloaded');

      const accounts   = await api.getAccounts();
      const categories = await api.getCategories();
      const catMap     = Object.fromEntries(categories.map(c => [c.name, c.id]));
      const fallback   = catMap['Other'];

      console.log(`Found ${accounts.length} accounts, ${categories.length} categories`);

      let updated = 0, skipped = 0, failed = 0;

      for (const account of accounts) {
        const txs = await api.getTransactions(account.id);
        const uncategorized = txs.filter(tx => !tx.category && !tx.is_parent);
        console.log(`Account "${account.name}": ${uncategorized.length} uncategorized transactions`);

        for (const tx of uncategorized) {
          const payee    = tx.imported_payee || tx.payee || 'Unknown';
          const notes    = tx.notes || '';
          const combined = `${payee} ${notes}`.trim();

          let result;
          try {
            result = await classify(combined);
          } catch (e) {
            console.error(`  x Classifier failed for "${payee}":`, e.message);
            failed++;
            continue;
          }

          const catId = catMap[result.category] ?? fallback;
          if (!catId) {
            console.warn(`  x Unknown category "${result.category}" for "${payee}", skipping`);
            skipped++;
            continue;
          }

          const update = { id: tx.id, category: catId };
          if (result.tags?.length) {
            update.notes = `${notes}\nAI: ${result.tags.join(', ')}`.trim();
          }

          try {
            await api.updateTransaction(tx.id, update);
            console.log(`  ok [${result.source}] "${payee}" -> ${result.category}`, result.tags ?? []);
            updated++;
          } catch (e) {
            console.error(`  x Update failed for "${payee}" (${tx.id}):`, e.message);
            failed++;
          }
        }
      }

      console.log(`Done. Updated: ${updated}, Skipped: ${skipped}, Failed: ${failed}`);
      await api.shutdown();
    }

    main().catch(e => { console.error(e); process.exit(1); });