apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: latest

            env:
              TZ: Europe/Amsterdam

            ports:
              - name: http
                containerPort: 8080
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080
            protocol: TCP
            targetPort: http

    persistence:
      config:
        enabled: true
        type: configMap
        name: dashy-config
        globalMounts:
          - path: /app/public/conf.yml
            subPath: conf.yml
            readOnly: true

      # ✅ Fix: give Dashy a writable dist directory
      dist:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /app/dist
