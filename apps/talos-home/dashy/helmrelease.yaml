apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

      
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        replicas: 1
        pod:
          annotations:
            configmap.reloader.stakater.com/reload: "dashy-config"
        containers:
          main:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: 3.1.12
            env:
              TZ: Europe/Amsterdam
              NODE_ENV: production
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080
            protocol: TCP
            targetPort: http
    persistence:
      config:
        enabled: true
        type: configMap
        name: dashy-config
        globalMounts:
          - path: /app/user-data/conf.yml
            subPath: conf.yml
            readOnly: true