# FILE: ./apps/talos-home/dashy/helmrelease.yaml
# Ensure Dashy is actually reading the config from /app/public/conf.yml (this matches your mount)
# If you already have this, keep it as-is.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: latest
            env:
              TZ: Europe/Amsterdam
              NODE_ENV: production
            command: ["node"]
            args: ["server"]
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080
            protocol: TCP
            targetPort: http
    persistence:
      config:
        enabled: true
        type: configMap
        name: dashy-config
        globalMounts:
          - path: /app/public/conf.yml
            subPath: conf.yml
            readOnly: true
