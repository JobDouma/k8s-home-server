apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashy
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        replicas: 1

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

        containers:
          main:
            image:
              repository: ghcr.io/lissy93/dashy
              tag: latest

            env:
              TZ: Europe/Amsterdam
              NODE_ENV: production

            # Run server only (no build)
            command:
              - node
            args:
              - server

            ports:
              - name: http
                containerPort: 8080
                protocol: TCP

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080
            protocol: TCP
            targetPort: http

    persistence:
      config:
        enabled: true
        type: configMap
        name: dashy-config
        globalMounts:
          - path: /app/public/conf.yml
            subPath: conf.yml
            readOnly: true