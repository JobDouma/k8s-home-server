# FILE: ./apps/talos-home/dashy/configmap.yaml
# Replace your Dashy config with this to:
# - Remove Getting Started / defaults
# - Only show your Media section
# - Use your LAN hostnames (or swap to raw IPs below if you prefer)
# - Hide all help/announcements

apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-config
  namespace: media
data:
  conf.yml: |
    pageInfo:
      title: Home Dashboard
      description: Media stack
      navLinks: []

    appConfig:
      theme: one-dark
      layout: auto
      iconSize: medium
      language: en
      disableConfiguration: true
      disableUpdateCheck: true

    sections:
      - name: Media
        icon: fas fa-photo-video
        items:
          - title: Jellyfin
            description: Media Server
            icon: fas fa-film
            url: http://jellyfin.lan

          - title: Jellyseerr
            description: Requests
            icon: fas fa-ticket-alt
            url: http://jellyseerr.lan

          - title: qBittorrent
            description: Torrent Downloads
            icon: fas fa-download
            url: http://qbittorrent.lan

          - title: SABnzbd
            description: Usenet Downloads
            icon: fas fa-cloud-download-alt
            url: http://sabnzbd.lan

          - title: Sonarr
            description: TV Automation
            icon: fas fa-tv
            url: http://sonarr.lan

          - title: Radarr
            description: Movie Automation
            icon: fas fa-video
            url: http://radarr.lan

          - title: Prowlarr
            description: Indexer Management
            icon: fas fa-search
            url: http://prowlarr.lan

# If you want raw IPs instead of DNS, replace the links above with:
# link: http://192.168.2.100  (and use Traefik host routing won’t work with IP)
# Better: keep .lan hostnames, since Traefik routes by Host header.
