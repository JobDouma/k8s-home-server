apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-config
  namespace: media
data:
  conf.yml: |
    pageInfo:
      title: Home Dashboard
      description: Media & Monitoring
      navLinks: []

    appConfig:
      theme: one-dark
      layout: auto
      iconSize: medium
      language: en
      disableConfiguration: true

    sections:

      - name: Media
        icon: fas fa-play-circle
        displayData:
          sortBy: default
          rows: 2
          cols: 4
        items:

          - title: Jellyfin
            description: Media Server
            icon: fas fa-film
            url: https://jellyfin.lan

          - title: Jellyseerr
            description: Media Requests
            icon: fas fa-ticket-alt
            url: https://jellyseerr.lan

          - title: Sonarr
            description: TV Automation
            icon: fas fa-tv
            url: https://sonarr.lan

          - title: Radarr
            description: Movie Automation
            icon: fas fa-video
            url: https://radarr.lan

          - title: Prowlarr
            description: Indexer Management
            icon: fas fa-search
            url: https://prowlarr.lan

          - title: qBittorrent
            description: Torrent Client
            icon: fas fa-download
            url: https://qbittorrent.lan

          - title: Immich
            description: Photo & Video Backup
            icon: fas fa-images
            url: https://immich.lan


      - name: Productivity
        icon: fas fa-brain
        items:

          - title: Joplin
            description: Notes & Sync Server
            icon: fas fa-sticky-note
            url: https://joplin.lan

          - title: FreshRSS
            description: RSS Reader & News Aggregator
            icon: fas fa-rss
            url: https://freshrss.lan

          - title: Gotify
            description: Push Notifications
            icon: fas fa-bell
            url: https://gotify.lan


      - name: Monitoring
        icon: fas fa-chart-line
        items:

          - title: Grafana
            description: Dashboards
            icon: fas fa-chart-area
            url: https://grafana.lan

          - title: Prometheus
            description: Metrics & Alerting
            icon: fas fa-fire
            url: https://prometheus.lan

          - title: Uptime Kuma
            description: Uptime Monitoring
            icon: fas fa-heartbeat
            url: https://uptime-kuma.lan


      - name: Kubernetes
        icon: fas fa-dharmachakra
        items:

          - title: Headlamp
            description: Cluster Management
            icon: fas fa-cubes
            url: https://headlamp.lan

          - title: Traefik
            description: Ingress Controller
            icon: fas fa-route
            url: https://traefik.lan

          - title: Omni
            description: Talos Machine Management
            icon: fas fa-server
            url: https://omni.lan


      - name: Infrastructure
        icon: fas fa-server
        items:

          - title: TrueNAS
            description: Storage System
            icon: fas fa-database
            url: https://truenas.lan


      - name: Networking
        icon: fas fa-network-wired
        items:

          - title: Blocky
            description: DNS Ad Blocking & Resolver
            icon: fas fa-shield-alt
            url: https://blocky.lan

          - title: UniFi Controller
            description: Network Controller
            icon: fas fa-wifi
            url: https://unifi.lan

          - title: Router
            description: Gateway Management
            icon: fas fa-ethernet
            url: https://router.lan


      - name: Security
        icon: fas fa-lock
        items:

          - title: Authentik
            description: Identity Provider
            icon: fas fa-user-lock
            url: https://auth.lan

          - title: Falco
            description: Runtime Security & Threat Detection
            icon: fas fa-shield-alt
            url: https://falco.lan