apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-config
  namespace: media
data:
  conf.yml: |
    pageInfo:
      title: Home Dashboard
      description: Media & Monitoring
      navLinks: []

    appConfig:
      theme: one-dark
      layout: auto
      iconSize: medium
      language: en
      disableConfiguration: true
      disableUpdateCheck: true

    sections:

      - name: Media
        icon: fas fa-photo-video
        displayData:
          sortBy: default
          rows: 2
          cols: 4
        items:

          - title: Jellyfin
            description: Media Server
            icon: fas fa-film
            url: http://jellyfin.lan

          - title: Jellyseerr
            description: Media Requests
            icon: fas fa-ticket-alt
            url: http://jellyseerr.lan

          - title: Sonarr
            description: TV Automation
            icon: fas fa-tv
            url: http://sonarr.lan

          - title: Radarr
            description: Movie Automation
            icon: fas fa-video
            url: http://radarr.lan

          - title: Prowlarr
            description: Indexer Management
            icon: fas fa-search
            url: http://prowlarr.lan

          - title: qBittorrent
            description: Torrent Client
            icon: fas fa-download
            url: http://qbittorrent.lan

          - title: SABnzbd
            description: Usenet Client
            icon: fas fa-cloud-download-alt
            url: http://sabnzbd.lan


      - name: Productivity
        icon: fas fa-brain
        items:

          - title: Joplin
            description: Notes & Sync Server
            icon: fas fa-sticky-note
            url: http://joplin.lan


      - name: Monitoring
        icon: fas fa-chart-line
        items:

          - title: Grafana
            description: Dashboards
            icon: fas fa-chart-area
            url: http://grafana.lan

          - title: Prometheus
            description: Metrics & Alerting
            icon: fas fa-fire
            url: http://prometheus.lan


      - name: Kubernetes
        icon: fas fa-dharmachakra
        items:

          - title: Kubernetes Dashboard
            description: Cluster Management
            icon: fas fa-cubes
            url: http://kubernetes.lan

          - title: FluxCD
            description: GitOps Controller
            icon: fas fa-code-branch
            url: http://flux.lan

          - title: Traefik
            description: Ingress Controller
            icon: fas fa-route
            url: http://traefik.lan


      - name: Infrastructure
        icon: fas fa-server
        items:

          - title: TrueNAS
            description: Storage System
            icon: fas fa-database
            url: http://truenas.lan

          - title: Proxmox
            description: Hypervisor
            icon: fas fa-layer-group
            url: http://proxmox.lan

          - title: Portainer
            description: Container Management
            icon: fas fa-box
            url: http://portainer.lan


      - name: Networking
        icon: fas fa-network-wired
        items:

          - title: UniFi Controller
            description: Network Controller
            icon: fas fa-wifi
            url: http://unifi.lan

          - title: Router
            description: Gateway Management
            icon: fas fa-ethernet
            url: http://router.lan


      - name: Security
        icon: fas fa-shield-alt
        items:

          - title: Authentik
            description: Identity Provider
            icon: fas fa-user-lock
            url: http://auth.lan

          - title: Vaultwarden
            description: Password Manager
            icon: fas fa-key
            url: http://vaultwarden.lan


      - name: Storage
        icon: fas fa-hdd
        items:

          - title: TrueNAS Datasets
            description: Storage Pools
            icon: fas fa-database
            url: http://truenas.lan/ui/storage


      - name: System
        icon: fas fa-microchip
        items:

          - title: Node Exporter Metrics
            description: Host Metrics
            icon: fas fa-heartbeat
            url: http://prometheus.lan/targets

          - title: Alertmanager
            description: Alert Routing
            icon: fas fa-bell
            url: http://alertmanager.lan




# If you want raw IPs instead of DNS, replace the links above with:
# link: http://192.168.2.100  (and use Traefik host routing won’t work with IP)
# Better: keep .lan hostnames, since Traefik routes by Host header.
