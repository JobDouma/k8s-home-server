apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-traefik-traces
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
data:
  traefik-traces.json: |-
    {
      "title": "Traefik Traces",
      "uid": "traefik-traces",
      "schemaVersion": 37,
      "panels": [
        {
          "type": "traces",
          "title": "Traefik Request Traces",
          "datasource": {
            "type": "tempo",
            "uid": "tempo"
          },
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "tempo", "uid": "tempo" },
              "queryType": "traceql",
              "query": "{ .service.name = \"traefik\" }",
              "refId": "A"
            }
          ]
        }
      ],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s"
    }