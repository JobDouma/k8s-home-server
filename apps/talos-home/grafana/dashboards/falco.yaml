apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-falco
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Security"
data:
  falco-loki.json: |-
    {
      "title": "Falco Security Events",
      "uid": "falco-loki",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-24h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "priority",
            "type": "custom",
            "label": "Priority",
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "Emergency", "value": "Emergency" },
              { "text": "Alert", "value": "Alert" },
              { "text": "Critical", "value": "Critical" },
              { "text": "Error", "value": "Error" },
              { "text": "Warning", "value": "Warning" },
              { "text": "Notice", "value": "Notice" },
              { "text": "Informational", "value": "Informational" },
              { "text": "Debug", "value": "Debug" }
            ],
            "includeAll": true,
            "multi": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Total Events (24h)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["sum"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 200 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum(count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [24h]))",
              "legendFormat": "Total"
            }
          ]
        },
        {
          "id": 2,
          "title": "Critical/Error Events (24h)",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["sum"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum(count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" | priority=~\"Critical|Error|Alert|Emergency\" [24h]))",
              "legendFormat": "Critical/Error"
            }
          ]
        },
        {
          "id": 3,
          "title": "Warning Events (24h)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["sum"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "orange", "value": 50 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum(count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" | priority=\"Warning\" [24h]))",
              "legendFormat": "Warning"
            }
          ]
        },
        {
          "id": 4,
          "title": "Notice Events (24h)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["sum"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum(count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" | priority=\"Notice\" [24h]))",
              "legendFormat": "Notice"
            }
          ]
        },
        {
          "id": 5,
          "title": "Unique Rules Triggered (24h)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "purple", "value": null }]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "count(count by (rule) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [24h])))",
              "legendFormat": "Unique Rules"
            }
          ]
        },
        {
          "id": 6,
          "title": "Events Over Time by Priority",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": { "custom": { "lineWidth": 2, "fillOpacity": 10 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Warning" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Notice" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Informational" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum by (priority) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [5m]))",
              "legendFormat": "{{priority}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Top 10 Triggered Rules",
          "type": "barchart",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "none" },
            "xTickLabelRotation": 0
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "orange", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "topk(10, sum by (rule) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [$__range])))",
              "legendFormat": "{{rule}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "Top 10 Affected Namespaces",
          "type": "barchart",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "legend": { "displayMode": "none" }
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "topk(10, sum by (output_fields_k8s_ns_name) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" | output_fields_k8s_ns_name != \"\" [$__range])))",
              "legendFormat": "{{output_fields_k8s_ns_name}}"
            }
          ]
        },
        {
          "id": 9,
          "title": "Events by Node",
          "type": "piechart",
          "gridPos": { "x": 0, "y": 20, "w": 8, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "right" },
            "pieType": "donut"
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum by (hostname) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [$__range]))",
              "legendFormat": "{{hostname}}"
            }
          ]
        },
        {
          "id": 10,
          "title": "Events by Priority Distribution",
          "type": "piechart",
          "gridPos": { "x": 8, "y": 20, "w": 8, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "right" },
            "pieType": "donut"
          },
          "fieldConfig": {
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Warning" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Notice" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Informational" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "sum by (priority) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" [$__range]))",
              "legendFormat": "{{priority}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "Top Affected Pods",
          "type": "piechart",
          "gridPos": { "x": 16, "y": 20, "w": 8, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "right" },
            "pieType": "donut"
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "topk(8, sum by (output_fields_k8s_pod_name) (count_over_time({app=\"falco\", container=\"falco\"} | json | __error__=\"\" | output_fields_k8s_pod_name != \"\" [$__range])))",
              "legendFormat": "{{output_fields_k8s_pod_name}}"
            }
          ]
        },
        {
          "id": 12,
          "title": "Raw Security Events",
          "type": "logs",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 12 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki" },
              "expr": "{app=\"falco\", container=\"falco\"} | json | __error__=\"\" | priority=~\"$priority\"",
              "legendFormat": ""
            }
          ]
        }
      ]
    }
