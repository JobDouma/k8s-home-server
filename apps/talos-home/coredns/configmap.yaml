apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
        }

        # .lan always goes to Blocky — no fallback needed,
        # these are your private records only Blocky knows.
        forward lan 192.168.2.53 {
            policy sequential
            max_fails 3
            expire 10s
            health_check 5s
        }

        # ALL other DNS goes to Blocky first.
        # Public resolvers are emergency fallback only — only
        # reached when Blocky has exceeded max_fails.
        forward . 192.168.2.53 1.1.1.1 8.8.8.8 {
            policy sequential
            max_fails 3
            expire 10s
            health_check 5s
            prefer_udp
        }

        cache 30
        loop
        reload
        loadbalance
    }