apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
        }
        # Consolidated: Blocky VIP first, then Public
        forward . 192.168.2.53 1.1.1.1 8.8.8.8 {
            policy sequential
            max_fails 3
            expire 10s
            health_check 5s
        }
        cache 30
        loop
        reload
        loadbalance
    }

# For in-cluster DNS — it handles DNS for pods inside Kubernetes. 
# This is completely separate from what Tailscale does.

# Inside cluster (pods):
# Pod DNS query → CoreDNS → Blocky → upstream

# Your phone on 4G via Tailscale:
# Phone DNS query → Tailscale → Blocky (192.168.2.53) → upstream
# Your phone on WiFi with Override local DNS:
# Phone DNS query → Tailscale → Blocky (192.168.2.53) → upstream

# Query → Blocky
#       ↓ (if fails)
#       → 1.1.1.1
#        (if fails)
#       → 8.8.8.8
#       ↓ (if Blocky is back after 5s health check)
#       → Blocky

