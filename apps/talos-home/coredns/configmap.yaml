apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
        }

        # .lan MUST go to Blocky
        forward lan 192.168.2.53 {
          policy sequential
          max_fails 2
          health_check 5s
        }

        # Primary = Blocky, fallback = public DNS
        forward . 192.168.2.53 1.1.1.1 8.8.8.8 {
            policy sequential
            max_fails 2
            health_check 5s
        }

        cache 30
        loop
        reload
        loadbalance
    }

# Query → Blocky
#       ↓ (if fails)
#       → 1.1.1.1
#       ↓ (if fails)
#       → 8.8.8.8

