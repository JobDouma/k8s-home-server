# Replaces your old prometheus IngressRoute + Service.
# VMSingle exposes its own UI at /vmui — much better than Prometheus UI.
# You can browse metrics, run PromQL queries, and see cardinality stats.
#
# The service name is auto-generated by the VM operator from the HelmRelease name:
# vmsingle-<helmrelease-name>  →  vmsingle-victoria-metrics-k8s-stack
#
# Verify after install with:
#   kubectl get svc -n monitoring | grep vmsingle
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-tls
  namespace: monitoring
spec:
  secretName: prometheus-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - prometheus.lan
  issuerRef:
    name: homelab-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prometheus.lan`)
      kind: Rule
      middlewares:
        - name: traefik-chain
          namespace: networking
      services:
        - name: vmsingle-vm-stack    # ← fixed
          port: 8428
  tls:
    secretName: prometheus-tls