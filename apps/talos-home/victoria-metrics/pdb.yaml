# Replaces pdb-prometheus — same intent, updated selector for VMSingle.
# minAvailable: 0 lets Talos drain nodes freely even if VMSingle is the only pod.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-vmsingle
  namespace: monitoring
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: vmsingle