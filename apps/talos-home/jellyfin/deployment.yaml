apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:10.11.8@sha256:1694ff069f0c9dafb283c36765175606866769f5d72f2ed56b6a0f1be922fc37
        env:
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: TZ
          value: Europe/Amsterdam
        ports:
        - containerPort: 8096
          name: http
        - containerPort: 1900
          protocol: UDP
          name: dlna
        volumeMounts:
        - name: config
          mountPath: /config
          subPath: jellyfin
        - name: media
          mountPath: /media
        - name: cache
          mountPath: /cache
        resources:
          requests:
            memory: 1Gi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: '1'
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: tank-configs
      - name: media
        persistentVolumeClaim:
          claimName: media
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.50
  externalTrafficPolicy: Local
  selector:
    app: jellyfin
  ports:
  - name: http
    port: 8096
    targetPort: 8096
  - name: dlna
    port: 1900
    targetPort: 1900
    protocol: UDP
