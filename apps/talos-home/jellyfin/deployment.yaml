apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      initContainers:
        - name: jellyfin-init
          image: alpine:3.21@sha256:a8560b36e8b8210634f77d9f7f9efd7ffa463e380b75e2e74aff4511df3ef88c
          command: ["/bin/sh", "/scripts/init.sh"]
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
              subPath: jellyfin
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.6@sha256:333b647716631443a43c7fabac4b0c46b4e2f036bad19547e00958f10f721b85
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Amsterdam
          ports:
            - containerPort: 8096
              name: http
            - containerPort: 1900
              protocol: UDP
              name: dlna
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: jellyfin
            - name: media
              mountPath: /media
            - name: cache
              mountPath: /cache
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      securityContext:
        fsGroup: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tank-configs
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: cache
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: jellyfin-init
            defaultMode: 0755
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - talos-cp-3
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: media
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.2.50
  externalTrafficPolicy: Local
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: 8096
    - name: dlna
      port: 1900
      targetPort: 1900
      protocol: UDP