apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-init
  namespace: media
data:
  init.sh: |
    #!/bin/sh
    CONFIG=/config

    # ── Plugin repositories ──────────────────────────────────────────────
    REPOS="$CONFIG/repositories.xml"
    if [ ! -f "$REPOS" ]; then
      echo "[init] Writing repositories.xml"
      printf '%s\n' \
        '<?xml version="1.0" encoding="utf-8"?>' \
        '<ArrayOfRepositoryInfo xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">' \
        '  <RepositoryInfo>' \
        '    <Name>Jellyfin Stable</Name>' \
        '    <Url>https://repo.jellyfin.org/releases/plugin/manifest-stable.json</Url>' \
        '    <Enabled>true</Enabled>' \
        '  </RepositoryInfo>' \
        '  <RepositoryInfo>' \
        '    <Name>Intro Skipper</Name>' \
        '    <Url>https://manifest.intro-skipper.org/manifest.json</Url>' \
        '    <Enabled>true</Enabled>' \
        '  </RepositoryInfo>' \
        '  <RepositoryInfo>' \
        '    <Name>IAmParadox27</Name>' \
        '    <Url>https://www.iamparadox.dev/jellyfin/plugins/manifest.json</Url>' \
        '    <Enabled>true</Enabled>' \
        '  </RepositoryInfo>' \
        '</ArrayOfRepositoryInfo>' \
        > "$REPOS"
    else
      echo "[init] repositories.xml already present, skipping"
    fi

    # ── Ultrachromic theme ───────────────────────────────────────────────
    BRANDING="$CONFIG/branding.xml"
    if ! grep -q "Ultrachromic" "$BRANDING" 2>/dev/null; then
      echo "[init] Writing Ultrachromic CSS to branding.xml"
      printf '%s\n' \
        '<?xml version="1.0" encoding="utf-8"?>' \
        '<BrandingOptions>' \
        '  <LoginDisclaimer></LoginDisclaimer>' \
        '  <CustomCss>' \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/fixes.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/jf_font.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/base.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/accentlist.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/rounding.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/type/logowhite.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/effects/hoverglow.css');" \
        "@import url('https://cdn.jsdelivr.net/gh/CTalvio/Ultrachromic/overlaystyle/floating.css');" \
        '  </CustomCss>' \
        '  <SplashscreenEnabled>false</SplashscreenEnabled>' \
        '</BrandingOptions>' \
        > "$BRANDING"
    else
      echo "[init] branding.xml already present, skipping"
    fi

    echo "[init] Done."