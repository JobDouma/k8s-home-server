apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
  values:
    image:
      repository: jellyfin/jellyfin
      tag: latest
    env:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Amsterdam
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    nodeSelector:
      kubernetes.io/hostname: talos-cp-1
    persistence:
      config:
        enabled: true
        type: pvc
        existingClaim: jellyfin-config
        mountPath: /config
      media:
        enabled: true
        type: pvc
        existingClaim: media
        mountPath: /media
    resources:
      requests:
        memory: "1Gi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1"
    service:
      main:
        type: NodePort
        ports:
          http:
            port: 8096
            nodePort: 30096
