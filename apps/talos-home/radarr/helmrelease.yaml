apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      radarr:
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: latest
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                add:
                  - SETUID
                  - SETGID
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
            ports:
              - name: http
                containerPort: 7878
                protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: radarr
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: radarr

      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media
