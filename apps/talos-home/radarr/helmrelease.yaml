apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      radarr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: 5.3.6
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
            ports:
              - name: http
                containerPort: 7878

    service:
      app:
        controller: radarr
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: radarr-config
        globalMounts:
          - path: /config

      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media
