apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:

    controllers:
      radarr:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: 6.0.4

            env:
              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000
              UMASK: 002

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: radarr
        type: ClusterIP
        ports:
          http:
            port: 7878

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: radarr-config
        globalMounts:
          - path: /config

      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media
