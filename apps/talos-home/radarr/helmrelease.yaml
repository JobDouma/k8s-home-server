apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      radarr:
        containers:
          app:
            enabled: true
            image:
              repository: ghcr.io/linuxserver/radarr
              tag: latest
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
              RADARR__SERVER__BINDADDRESS: 0.0.0.0
            ports:
            - name: http
              containerPort: 7878
              protocol: TCP
    service:
      app:
        type: ClusterIP
        controller: radarr
        ports:
          http:
            port: 7878
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: radarr
      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media
      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /downloads
            subPath: downloads
      usenet:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /usenet
            subPath: usenet
