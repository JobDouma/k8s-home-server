apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  timeout: 20m

  chart:
    spec:
      chart: renovate
      version: "46.79.2"
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system

  values:

    cronjob:
      schedule: "10 3 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 0
      failedJobsHistoryLimit: 1
      ttlSecondsAfterFinished: 36000

    envFrom:
      - secretRef:
          name: renovate-secret

    env:
      LOG_LEVEL: info
      RENOVATE_GOTIFY_TOKEN:
        valueFrom:
          secretKeyRef:
            name: renovate-secret
            key: RENOVATE_GOTIFY_TOKEN

    renovate:

      image:
        repository: ghcr.io/renovatebot/renovate
        tag: "43.84.2"

      config: |
        {
          "$schema": "https://docs.renovatebot.com/renovate-schema.json",

          "platform": "github",
          "repositories": ["jobdouma/k8s-home-server"],

          "autodiscover": false,
          "onboarding": false,
          "requireConfig": "optional",

          "dependencyDashboard": true,
          "baseBranchPatterns": ["main"],

          "notificationServices": {
            "gotify": {
              "endpoint": "http://gotify.gotify.svc.cluster.local",
              "token": "{{ env.RENOVATE_GOTIFY_TOKEN }}"
            }
          },

          "notifications": ["gotify"],

          "enabledManagers": [
            "flux",
            "helm-values",
            "kubernetes"
          ],

          "platformAutomerge": true,
          "automergeStrategy": "squash",
          "prCreation": "immediate",
          "rebaseWhen": "never",

          "flux": {
            "fileMatch": [
              "(^|/)clusters/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$",
              "(^|/)apps/.+\\.ya?ml$"
            ],
            "pinDigests": true
          },

          "helm-values": {
            "fileMatch": [
              "(^|/)apps/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$"
            ]
          },

          "kubernetes": {
            "fileMatch": [
              "(^|/)apps/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$",
              "(^|/)clusters/.+\\.ya?ml$"
            ]
          },

          "packageRules": [
            {
              "matchUpdateTypes": ["minor", "patch", "digest"],
              "groupName": "all non-major updates",
              "groupSlug": "all-non-major",
              "automerge": true,
              "automergeType": "pr",
              "platformAutomerge": true,
              "labels": ["automerge"]
            },
            {
              "matchUpdateTypes": ["major"],
              "automerge": false,
              "labels": ["major-update"]
            }
          ]
        }
