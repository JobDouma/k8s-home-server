apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  timeout: 20m

  chart:
    spec:
      chart: renovate
      version: "46.98.9"
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system

  values:

    cronjob:
      schedule: "10 3 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 0
      failedJobsHistoryLimit: 1
      ttlSecondsAfterFinished: 36000
      commandOverride:
        - /bin/bash
        - -c
        - |
          renovate; EXIT=$?
          if [ $EXIT -eq 0 ]; then
            STATUS="✅ Renovate finished successfully"
            PRIORITY=3
          else
            STATUS="❌ Renovate failed (exit: $EXIT)"
            PRIORITY=8
          fi
          curl -s -X POST "http://gotify.gotify.svc.cluster.local/message?token=${RENOVATE_GOTIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\": \"Renovate\", \"message\": \"${STATUS}\", \"priority\": ${PRIORITY}}"
          exit $EXIT

    envFrom:
      - secretRef:
          name: renovate-secret

    env:
      LOG_LEVEL: info

    renovate:

      image:
        repository: ghcr.io/renovatebot/renovate
        tag: "43.102.10@sha256:609138c49dc12303e2bff021c75f2fccb6ceeac1e6d0cd7c4e9d04392eb66419"

      config: |
        {
          "pinDigests": true,
          "$schema": "https://docs.renovatebot.com/renovate-schema.json",

          "platform": "github",
          "repositories": ["jobdouma/k8s-home-server"],

          "autodiscover": false,
          "onboarding": false,
          "requireConfig": "optional",

          "dependencyDashboard": true,
          "baseBranchPatterns": ["main"],

          "enabledManagers": [
            "flux",
            "helm-values",
            "kubernetes"
          ],

          "platformAutomerge": true,
          "automergeStrategy": "squash",
          "prCreation": "immediate",
          "rebaseWhen": "never",

          "flux": {
            "fileMatch": [
              "(^|/)clusters/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$",
              "(^|/)apps/.+\\.ya?ml$"
            ],
            "pinDigests": true
          },

          "helm-values": {
            "fileMatch": [
              "(^|/)apps/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$"
            ]
          },

          "kubernetes": {
            "fileMatch": [
              "(^|/)apps/.+\\.ya?ml$",
              "(^|/)infrastructure/.+\\.ya?ml$",
              "(^|/)clusters/.+\\.ya?ml$"
            ]
          },

          "packageRules": [
            {
              "matchUpdateTypes": ["minor", "patch", "digest"],
              "groupName": "all non-major updates",
              "groupSlug": "all-non-major",
              "automerge": true,
              "automergeType": "pr",
              "platformAutomerge": true,
              "labels": ["automerge"]
            },
            {
              "matchUpdateTypes": ["major"],
              "automerge": false,
              "labels": ["major-update"]
            }
          ]
        }