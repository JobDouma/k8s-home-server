apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  timeout: 20m
  chart:
    spec:
      chart: renovate
      version: "46.231.4"
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system
  values:
    cronjob:
      schedule: "10 3 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 0
      failedJobsHistoryLimit: 1
      ttlSecondsAfterFinished: 300
      # commandOverride:
      #   - /bin/bash
      #   - -c
      #   - |
      #     renovate; EXIT=$?
      #     if [ $EXIT -eq 0 ]; then
      #       STATUS="✅ Renovate finished successfully"
      #       PRIORITY=3
      #     else
      #       STATUS="❌ Renovate failed (exit: $EXIT)"
      #       PRIORITY=8
      #     fi
      #     if [ -z "${RENOVATE_GOTIFY_TOKEN}" ]; then
      #       echo "WARNING: RENOVATE_GOTIFY_TOKEN is unset, skipping notification"
      #     else
      #       curl -s -X POST "http://gotify.gotify.svc.cluster.local/message?token=${RENOVATE_GOTIFY_TOKEN}" \
      #         -H "Content-Type: application/json" \
      #         -d "{\"title\": \"Renovate\", \"message\": \"${STATUS}\", \"priority\": ${PRIORITY}}"
      #     fi
      #     exit $EXIT
    envFrom:
      - secretRef:
          name: renovate-secret
    env:
      LOG_LEVEL: info
    renovate:
      image:
        repository: ghcr.io/renovatebot/renovate
        tag: "43.265.4@sha256:96abb1a8386f21e137be23e01c756d1b9687c13237902f56471442138f4b7953"
      config: |
        {
          "$schema": "https://docs.renovatebot.com/renovate-schema.json",
          "platform": "github",
          "repositories": ["jobdouma/k8s-home-server"],
          "autodiscover": false,
          "onboarding": false,
          "requireConfig": "optional",
          "dependencyDashboard": true,
          "pinDigests": true,
          "baseBranchPatterns": ["main"],
          "schedule": ["after 3am and before 5am"],
          "prCreation": "immediate",
          "prHourlyLimit": 10,
          "prConcurrentLimit": 15,
          "rebaseWhen": "conflicted",
          "gitAuthor": "JobDouma <7521465+JobDouma@users.noreply.github.com>",
          "enabledManagers": [
            "flux",
            "helm-values",
            "kubernetes",
            "custom.regex"
          ],
          "customManagers": [
            {
              "customType": "regex",
              "description": "code-server version tracking",
              "managerFilePatterns": [
                "/(^|/)infrastructure/vs-code/version\\.ya?ml$/"
              ],
              "matchStrings": [
                "code_server_version: \"(?<currentValue>[\\d.]+)\""
              ],
              "depNameTemplate": "coder/code-server",
              "datasourceTemplate": "github-releases",
              "versioningTemplate": "semver"
            },
            {
              "customType": "regex",
              "description": "gitleaks docker image version tracking for pre-commit hook",
              "managerFilePatterns": [
                "/(^|/)\\.githooks/pre-commit$/"
              ],
              "matchStrings": [
                "GITLEAKS_IMAGE=\"zricethezav/gitleaks:(?<currentValue>v[0-9.]+)\""
              ],
              "depNameTemplate": "zricethezav/gitleaks",
              "datasourceTemplate": "docker",
              "versioningTemplate": "docker"
            }
          ],
          "platformAutomerge": true,
          "automergeStrategy": "squash",
          "flux": {
            "managerFilePatterns": [
              "/(^|/)clusters/.+\\.ya?ml$/",
              "/(^|/)infrastructure/.+\\.ya?ml$/",
              "/(^|/)apps/.+\\.ya?ml$/"
            ],
            "pinDigests": true
          },
          "helm-values": {
            "managerFilePatterns": [
              "/(^|/)apps/.+\\.ya?ml$/",
              "/(^|/)infrastructure/.+\\.ya?ml$/"
            ]
          },
          "kubernetes": {
            "managerFilePatterns": [
              "/(^|/)apps/.+\\.ya?ml$/",
              "/(^|/)infrastructure/.+\\.ya?ml$/"
            ]
          },
          "packageRules": [
            {
              "matchUpdateTypes": ["minor", "patch", "digest"],
              "groupName": "all non-major updates",
              "groupSlug": "all-non-major",
              "automerge": true,
              "automergeType": "pr",
              "platformAutomerge": true,
              "labels": ["automerge"]
            },
            {
              "matchUpdateTypes": ["major"],
              "automerge": false,
              "labels": ["major-update"]
            }
          ]
        }