apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
spec:
  interval: 1h
  timeout: 20m

  chart:
    spec:
      chart: renovate
      version: "46.x"
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system

  values:
    cronjob:
      schedule: "10 3 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 2
      failedJobsHistoryLimit: 2

    envFrom:
      - secretRef:
          name: renovate-secret

    env:
      LOG_LEVEL: info
      RENOVATE_AUTODISCOVER: "false"

    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    renovate:
      config: |
        {
          "$schema": "https://docs.renovatebot.com/renovate-schema.json",

          "platform": "github",
          "token": "${RENOVATE_TOKEN}",

          "onboarding": false,
          "requireConfig": "optional",

          "repositories": [
            "jobdouma/k8s-home-server"
          ],

          "baseBranches": ["main"],

          "dependencyDashboard": true,
          "dependencyDashboardAutoclose": true,

          "enabledManagers": ["kubernetes", "flux"],

          "kubernetes": {
            "managerFilePatterns": [
              "/clusters/.+\\.ya?ml$",
              "/infrastructure/.+\\.ya?ml$",
              "/apps/.+\\.ya?ml$"
            ]
          },

          "flux": {
            "managerFilePatterns": [
              "/clusters/.+\\.ya?ml$",
              "/infrastructure/.+\\.ya?ml$",
              "/apps/.+\\.ya?ml$"
            ]
          },

          "prConcurrentLimit": 5,
          "branchConcurrentLimit": 5,

          "automergeStrategy": "pr",

          "packageRules": [
            {
              "matchUpdateTypes": ["minor", "patch", "digest"],
              "groupName": "all non-major updates",
              "groupSlug": "all-non-major",
              "automerge": true,
              "automergeType": "pr",
              "ignoreTests": false
            },
            {
              "matchUpdateTypes": ["major"],
              "automerge": false
            }
          ]
        }

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi