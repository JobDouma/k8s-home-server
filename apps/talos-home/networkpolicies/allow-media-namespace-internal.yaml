#This allows any pod in media to reach any other pod in media (all ports). You still keep protection from other namespaces due to default-deny.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-media-namespace-internal
  namespace: media
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
