apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: actual-budget-tls
  namespace: actual-budget
spec:
  secretName: actual-budget-tls
  duration: 8760h
  renewBefore: 720h
  dnsNames:
    - actual.lan
  issuerRef:
    name: homelab-ca
    kind: ClusterIssuer
    group: cert-manager.io