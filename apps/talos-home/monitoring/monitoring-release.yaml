apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 30m

  chart:
    spec:
      chart: kube-prometheus-stack
      version: "61.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system

  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
    # cleanupOnFail: removed (invalid in v2 API)

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    # cleanupOnFail: removed (invalid in v2 API)

  values:
    prometheus:
      service:
        type: NodePort
        nodePort: 30090
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
