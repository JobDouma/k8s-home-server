apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "61.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # This tells Prometheus to look for "ServiceMonitors" to start scraping
    prometheus:
      service:
        type: NodePort
        nodePort: 30090
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
