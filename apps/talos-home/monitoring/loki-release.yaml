apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  timeout: 20m

  chart:
    spec:
      chart: loki
      version: "6.6.3"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:
    deploymentMode: SingleBinary

    # Disable scalable mode components explicitly
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    loki:
      auth_enabled: false

      # REQUIRED by chart templates even if using filesystem
      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin

      commonConfig:
        replication_factor: 1
        path_prefix: /var/loki

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage_config:
        filesystem:
          directory: /var/loki/chunks

      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true

      limits_config:
        retention_period: 168h

    singleBinary:
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: talos-cp-1
      persistence:
        enabled: true
        storageClass: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi

    gateway:
      enabled: true
      replicas: 1