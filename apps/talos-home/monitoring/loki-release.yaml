apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  timeout: 20m

  chart:
    spec:
      chart: loki
      version: "6.6.3"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system

  values:

    deploymentMode: SingleBinary

    # Disable scalable mode components explicitly
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      schemaConfig:
        configs:
          - from: 2024-01-01
            store: boltdb-shipper
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage_config:
        boltdb_shipper:
          active_index_directory: /var/loki/index
          cache_location: /var/loki/cache
          shared_store: filesystem
        filesystem:
          directory: /var/loki/chunks

      limits_config:
        retention_period: 168h  # 7 days

    singleBinary:
      nodeSelector:
        kubernetes.io/hostname: talos-cp-1
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        accessModes:
          - ReadWriteOnce
        size: 10Gi

    gateway:
      enabled: true