apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        fsGroup: null
        fsGroupChangePolicy: null
        supplementalGroups: []

    controllers:
      prowlarr:
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/prowlarr
              tag: 1.16.2

            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false

            env:
              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000
              UMASK: 002

            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: prowlarr
        type: ClusterIP
        ports:
          http:
            port: 9696

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: prowlarr-config
        globalMounts:
          - path: /config
