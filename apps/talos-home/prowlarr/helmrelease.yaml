apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      prowlarr:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values: [talos-cp-3]

        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/prowlarr
              tag: 2.3.0@sha256:9ef5d8bf832edcacb6082f9262cb36087854e78eb7b1c3e1d4375056055b2d82

            env:
              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000
              UMASK: 002

            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                 memory: 512Mi

    service:
      app:
        controller: prowlarr
        type: ClusterIP
        ports:
          http:
            port: 9696

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: prowlarr-config
        globalMounts:
          - path: /config
