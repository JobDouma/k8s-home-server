apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      prowlarr:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/prowlarr
              tag: 2.4.0@sha256:536036aeb2c740d1a660ccf143b58a8bd6222f09010258fdfc10a538af7bec78
            env:
              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000
              UMASK: 2
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: prowlarr
        type: ClusterIP
        ports:
          http:
            port: 9696
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: prowlarr-config
        globalMounts:
        - path: /config
