apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "3.2.1" # It is better to pin a version than use "*"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      qbittorrent:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/qbittorrent
              tag: latest
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
              WEBUI_PORT: 8080
              # Fixes "Unauthorized" when accessing via different IPs/Hostnames
              WebUI__CSRFProtection: "false"
              WebUI__HostHeaderValidation: "false"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
          exporter:
            image:
              repository: ghcr.io/martabal/qbittorrent-exporter
              tag: latest
            env:
              QBITTORRENT_BASE_URL: "http://localhost:8080"
              QBITTORRENT_USER: "admin"
              QBITTORRENT_PASS: "Harrygvd1!"

    service:
      app:
        controller: qbittorrent
        type: ClusterIP
        ports:
          http:
            port: 8080
          metrics:
            port: 8090

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: qbittorrent
      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
