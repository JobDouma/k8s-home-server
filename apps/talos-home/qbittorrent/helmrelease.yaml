apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      qbittorrent:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.3
            env:
              TZ: Europe/Amsterdam
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__BT_PORT: &bt-port 6881
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
          exporter:
            image:
              repository: ghcr.io/esanchezm/prometheus-qbittorrent-exporter
              tag: v1.6.0
            env:
              QBITTORRENT_HOST: localhost
              QBITTORRENT_PORT: *port
              EXPORTER_PORT: &metrics-port 8000

    service:
      app:
        controller: qbittorrent
        type: NodePort
        ports:
          http:
            port: *port
            nodePort: 30080  # Access via http://192.168.2.22:30080
          metrics:
            port: *metrics-port
            nodePort: 30081
          bittorrent:
            enabled: true
            port: *bt-port
            protocol: TCP
            nodePort: 30881  # Port for peer traffic

    persistence:
      config:
        enabled: true
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: qbittorrent
      downloads:
        enabled: true
        existingClaim: media
        globalMounts:
          - path: /downloads
