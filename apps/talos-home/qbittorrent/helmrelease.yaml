apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 15m
  timeout: 20m

  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: qbittorrent
                  topologyKey: kubernetes.io/hostname

        containers:
          main:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.3

            envFrom:
              - secretRef:
                  name: qbittorrent-webui

            env:
              TZ: Europe/Amsterdam
              QBITTORRENT__PORT: "8080"
              QBITTORRENT__BT_PORT: "6881"
              QBITTORRENT__WEBUI__ADDRESS: "0.0.0.0"
              QBITTORRENT__WEBUI__HOST_HEADER_VALIDATION: "false"
              QBITTORRENT__WEBUI__CSRF_PROTECTION: "false"

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi

            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
              - name: bt
                containerPort: 6881
                protocol: TCP

          exporter:
            image:
              repository: ghcr.io/esanchezm/prometheus-qbittorrent-exporter
              tag: v1.6.0

            envFrom:
              - secretRef:
                  name: qbittorrent-webui

            env:
              QBITTORRENT_HOST: "127.0.0.1"
              QBITTORRENT_PORT: "8080"
              QBITTORRENT_URL_BASE: ""
              EXPORTER_PORT: "8000"

            ports:
              - name: metrics
                containerPort: 8000
                protocol: TCP

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080
            protocol: TCP
            targetPort: http
          bt:
            port: 6881
            protocol: TCP
            targetPort: bt
          metrics:
            port: 8000
            protocol: TCP
            targetPort: metrics

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: qbittorrent

      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /downloads
            subPath: downloads
