apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: "3.2.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      qbittorrent:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
        containers:
          app:
            image:
              repository: ghcr.io/onedr0p/qbittorrent
              tag: 4.6.3
            envFrom:
              - secretRef:
                name: qbittorrent-webui
            env:
              TZ: Europe/Amsterdam
              QBITTORRENT__PORT: &port 8080
              QBITTORRENT__BT_PORT: &bt-port 6881
              QBITTORRENT__WEBUI__ADDRESS: "0.0.0.0"
              QBITTORRENT__WEBUI__HOST_HEADER_VALIDATION: "false"
              QBITTORRENT__WEBUI__CSRF_PROTECTION: "false"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
          exporter:
            image:
              repository: ghcr.io/esanchezm/prometheus-qbittorrent-exporter
              tag: v1.6.0
            env:
              QBITTORRENT_HOST: localhost
              QBITTORRENT_PORT: *port
              EXPORTER_PORT: &metrics-port 8000

    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: 8080
      bittorrent:
        controller: qbittorrent
        type: LoadBalancer
        loadBalancerIP: 192.168.2.241
        ports:
          bt:
            port: 6881
            protocol: TCP

    persistence:
      config:
        enabled: true
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: qbittorrent
      downloads:
        enabled: true
        existingClaim: media
        globalMounts:
          - path: /downloads


    ingress:
      app:
        enabled: true
        className: nginx
        hosts:
          - host: qbittorrent.home.arpa
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http

