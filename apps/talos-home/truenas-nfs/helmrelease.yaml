apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truenas-nfs-provisioner
  namespace: kube-system
spec:
  interval: 15m
  timeout: 10m

  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:

    nfs:
      server: 192.168.2.5
      path: /mnt/tank/configs

    storageClass:
      name: truenas-nfs
      defaultClass: false
      reclaimPolicy: Retain
      archiveOnDelete: true
      accessModes:
        - ReadWriteMany
      
      pathPattern: "${.PVC.namespace}/${.PVC.name}"

    podSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0

    securityContext:
      allowPrivilegeEscalation: true

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
