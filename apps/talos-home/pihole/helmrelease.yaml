apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: dns
spec:
  interval: 15m
  chart:
    spec:
      chart: pihole
      version: 6.3.1
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    image:
      tag: latest
    env:
      TZ: Europe/Amsterdam
      WEBPASSWORD: ""
    envFrom:
      - secretRef:
          name: pihole-admin
    service:
      type: LoadBalancer
      ports:
        - name: dns-tcp
          port: 53
          protocol: TCP
        - name: dns-udp
          port: 53
          protocol: UDP
        - name: http
          port: 80
    persistence:
      enabled: true
      existingClaim: tank-configs
      path: pihole
