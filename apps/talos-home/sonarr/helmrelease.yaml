apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      sonarr:
        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/sonarr
              tag: 4.0.17@sha256:0b5c4803f92456fb9b65bae8375716ea120b4ea17b3cced7da32b63f0085782b

            env:
              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000
              UMASK: 2
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: sonarr
        type: ClusterIP
        ports:
          http:
            port: 8989
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: sonarr-config
        globalMounts:
        - path: /config
      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
        - path: /media
