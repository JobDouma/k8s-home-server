apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      sonarr:
        pod:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/sonarr
              tag: latest
            env:
              PUID: 1000
              PGID: 1000
              TZ: Europe/Amsterdam
              SONARR__SERVER__BINDADDRESS: 0.0.0.0
            ports:
            - name: http
              containerPort: 8989
              protocol: TCP
    service:
      app:
        type: ClusterIP
        controller: sonarr
        ports:
          http:
            port: 8989
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /config
            subPath: sonarr
      media:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /media
      downloads:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /downloads
            subPath: downloads
      usenet:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        globalMounts:
          - path: /usenet
            subPath: usenet

# Container path:	Maps to TrueNAS:
# /config	        /mnt/tank/tank-configs/sonarr
# /media	        /mnt/tank/media
# /downloads	    /mnt/tank/media/downloads
# /usenet         /mnt/tank/media/usenet
