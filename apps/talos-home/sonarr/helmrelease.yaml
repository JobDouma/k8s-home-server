apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
spec:
  interval: 15m
  chart:
    spec:
      chart: sonarr
      version: 3.0.2
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/linuxserver/sonarr
      tag: latest
    env:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Amsterdam
    persistence:
      config:
        enabled: true
        existingClaim: tank-configs
        subPath: sonarr
      downloads:
        enabled: true
        existingClaim: media
        subPath: TV
    service:
      type: ClusterIP
      port: 8989
