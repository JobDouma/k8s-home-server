apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ──────────────────────────────────────
  # Blocky (DNS)
  # ──────────────────────────────────────
  - blocky/namespace.yaml
  - blocky/configmap.yaml
  - blocky/helmrepository.yaml
  - blocky/helmrelease.yaml
  - blocky/servicemonitor.yaml

  # ──────────────────────────────────────
  # Jellyfin
  # ──────────────────────────────────────
  - jellyfin/helmrepository.yaml
  - jellyfin/helmrelease.yaml
  - jellyfin/ingressroute.yaml

  # ──────────────────────────────────────
  # qBittorrent
  # ──────────────────────────────────────
  - qbittorrent/helmrelease.yaml
  - qbittorrent/secret.yaml
  - qbittorrent/ingressroute.yaml

  # ──────────────────────────────────────
  # monitoring / prometheus
  # ──────────────────────────────────────
  - monitoring/namespace.yaml
  - monitoring/monitoring-release.yaml
  - monitoring/monitoring-repo.yaml
  - monitoring/servicemonitor.yaml

  # ──────────────────────────────────────
  # Jellyseerr
  # ──────────────────────────────────────
  - jellyseerr/helmrelease.yaml
  - jellyseerr/ingressroute.yaml

  # ──────────────────────────────────────
  # Network Policies
  # ──────────────────────────────────────
  - networkpolicies/allow-all-kube-system.yaml
  - networkpolicies/allow-renovate-egress.yaml
  - networkpolicies/allow-dns-from-lan.yaml
  - networkpolicies/allow-all-metallb.yaml

  # ──────────────────────────────────────
  # Sonarr
  # ──────────────────────────────────────
  - sonarr/helmrelease.yaml
  - sonarr/ingressroute.yaml

  # ──────────────────────────────────────
  # Radarr
  # ──────────────────────────────────────
  - radarr/helmrelease.yaml
  - radarr/ingressroute.yaml

  # ──────────────────────────────────────
  # PodDisruptionBudgets
  # ──────────────────────────────────────
  - policies/pdb-traefik.yaml
  - policies/pdb-blocky.yaml

  # ──────────────────────────────────────
  # Renovate
  # ──────────────────────────────────────
  - renovate/namespace.yaml
  - renovate/secret.yaml
  - renovate/helmrepository.yaml
  - renovate/helmrelease.yaml

  # ──────────────────────────────────────
  # Renovate
  # ──────────────────────────────────────
  - dashy/configmap.yaml
  - dashy/helmrelease.yaml
  - dashy/ingressroute.yaml

  - prowlarr/helmrelease.yaml
  - prowlarr/ingressroute.yaml

