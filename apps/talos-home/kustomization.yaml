apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # ──────────────────────────────────────
  # Blocky (DNS)
  # ──────────────────────────────────────
  - blocky/namespace.yaml
  - blocky/configmap.yaml
  - blocky/helmrepository.yaml
  - blocky/helmrelease.yaml
  - blocky/servicemonitor.yaml

  # ──────────────────────────────────────
  # Jellyfin
  # ──────────────────────────────────────
  - jellyfin/helmrepository.yaml
  - jellyfin/helmrelease.yaml
  - jellyfin/ingressroute.yaml

  # ──────────────────────────────────────
  # qBittorrent
  # ──────────────────────────────────────
  - qbittorrent/helmrelease.yaml
  - qbittorrent/secret.yaml

  # ──────────────────────────────────────
  # monitoring / prometheus
  # ──────────────────────────────────────
  - monitoring/namespace.yaml
  - monitoring/monitoring-release.yaml
  - monitoring/monitoring-repo.yaml
  - monitoring/servicemonitor.yaml

  # ──────────────────────────────────────
  # Jellyseerr
  # ──────────────────────────────────────
  - jellyseerr/helmrelease.yaml
  - jellyseerr/ingressroute.yaml

  # ──────────────────────────────────────
  # Network Policies
  # ──────────────────────────────────────
  - networkpolicies/default-deny.yaml
  - networkpolicies/allow-traefik.yaml
  - networkpolicies/allow-arr.yaml
  - networkpolicies/allow-monitoring.yaml

  # ──────────────────────────────────────
  # Sonarr
  # ──────────────────────────────────────
  - sonarr/helmrelease.yaml
  - sonarr/ingressroute.yaml

  # ──────────────────────────────────────
  # Radarr
  # ──────────────────────────────────────
  - radarr/helmrelease.yaml
  - radarr/ingressroute.yaml
