apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      strategy: uninstall
      retries: 3

      
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      jellyseerr:
        containers:
          app:
            enabled: true
            image:
              repository: ghcr.io/fallenbagel/jellyseerr
              tag: 1.7.0
            env:
              TZ: Europe/Amsterdam
              LOG_LEVEL: info
              JELLYFIN_URL: http://jellyfin.media.svc.cluster.local:8096
              JELLYFIN_API_KEY: "1c87951811c44a499199f6e137a777f3"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: jellyseerr
        type: ClusterIP
        ports:
          http:
            port: 5055
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /app/config
            subPath: jellyseerr
