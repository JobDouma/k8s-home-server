apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
spec:
  interval: 15m
  timeout: 10m
  
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      
  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  
  values:
    controllers:
      jellyseerr:
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        
        containers:
          app:
            image:
              repository: ghcr.io/fallenbagel/jellyseerr
              tag: 2.7.3
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
            env:
              TZ: Europe/Amsterdam
              LOG_LEVEL: info
              JELLYFIN_URL: http://jellyfin.media.svc.cluster.local:8096
              JELLYFIN_API_KEY: "1c87951811c44a499199f6e137a777f3"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: jellyseerr
        type: ClusterIP
        ports:
          http:
            port: 5055
    persistence:
      config:
        enabled: true
        type: custom
        volumeSpec:
          persistentVolumeClaim:
            accessModes:
              - ReadWriteMany
            storageClassName: truenas-nfs
            resources:
              requests:
                storage: 5Gi

        globalMounts:
          - path: /config



