# Connector: subnet router
#
# Advertises your home LAN (192.168.2.0/24) to your tailnet so that
# any Tailscale device can reach:
#   - your Traefik ingress at 192.168.2.100  (all *.lan services)
#   - TrueNAS at 192.168.2.5
#   - router at 192.168.2.254
#   - blocky DNS at 192.168.2.53
#   - any other host on your LAN
#
# Required ACL policy in the Tailscale admin console
# (https://login.tailscale.com/admin/acls):
#
#   "tagOwners": {
#     "tag:k8s-operator": [],                   // admins own this
#     "tag:k8s":          ["tag:k8s-operator"],  // operator owns this
#   },
#   "autoApprovers": {
#     "routes": {
#       "192.168.2.0/24": ["tag:k8s"],           // auto-approve the subnet route
#     },
#   },
#
# Without autoApprovers you must manually approve the route at:
#   https://login.tailscale.com/admin/machines
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: homelab-subnet-router
  namespace: tailscale
spec:
  hostnamePrefix: talos-home-subnet

  # tag:k8s is owned by the operator (tag:k8s-operator) — do NOT use tag:k8s-operator here
  tags:
    - tag:k8s

  subnetRouter:
    advertiseRoutes:
      - "192.168.2.0/24"
      - "10.244.0.0/16" # advertise the pod CIDR