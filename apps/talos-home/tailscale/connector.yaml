# Step 5 — HA Connector (subnet router with 2 replicas)
#
# Your current Connector runs as a single pod. If it restarts (Talos node
# drain, OOM, upgrade), your phone loses access to .lan, blocky DNS, TrueNAS,
# and the pod CIDR for ~30-60 seconds.
#
# Adding replicas: 2 spins up TWO subnet router pods. Tailscale's control
# plane automatically load-balances traffic across them and routes around
# a pod that goes down. Both pods advertise the same routes; the autoApprovers
# policy already covers this.
#
# Requirements:
#   - Tailscale operator >= 1.92 (you're on 1.94.2 ✓)
#   - proxyClass: homelab → applies the metrics/resource config from step 2
#
# IMPORTANT: delete the old single-replica Connector first if you're applying
# this as a replacement, since the name stays the same:
#   kubectl delete connector homelab-subnet-router -n tailscale
#   kubectl apply -f step5-connector-ha.yaml
# Or just apply directly — the operator will reconcile the new spec.
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: homelab-subnet-router
  namespace: tailscale
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  hostnamePrefix: talos-home-subnet

  # 2 active subnet router replicas — one can restart without dropping LAN access
  replicas: 2

  # Apply metrics + resource limits from the ProxyClass above
  proxyClass: homelab

  # tag:k8s is owned by tag:k8s-operator — correct, do NOT use tag:k8s-operator here
  tags:
    - tag:k8s

  subnetRouter:
    advertiseRoutes:
      - "192.168.2.0/24"
      - "10.244.0.0/16"