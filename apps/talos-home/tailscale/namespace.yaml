apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    # Required for the Tailscale subnet router pod:
    # - sysctler init container sets ip_forward (privileged)
    # - tailscale container needs NET_ADMIN + /dev/net/tun
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
