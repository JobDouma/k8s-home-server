apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tailscale-operator
  namespace: tailscale
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - tailscale
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-operator
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
