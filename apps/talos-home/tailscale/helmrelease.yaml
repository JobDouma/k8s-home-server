apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      strategy: uninstall
      retries: 3

  chart:
    spec:
      chart: tailscale-operator
      # renovate: registryUrl=https://pkgs.tailscale.com/helmcharts
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system

  valuesFrom:
    - kind: Secret
      name: tailscale-oauth
      valuesKey: client_id
      targetPath: oauth.clientId
    - kind: Secret
      name: tailscale-oauth
      valuesKey: client_secret
      targetPath: oauth.clientSecret

  values:
    operatorConfig:
      hostname: talos-home-operator
    apiServerProxyConfig:
      mode: "true"

    # Emit Prometheus metrics for the operator pod itself
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"
      prometheus.io/path: "/metrics"
