apiVersion: batch/v1
kind: CronJob
metadata:
  name: uptime-kuma-provisioner
  namespace: uptime-kuma
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: uptime-kuma
                topologyKey: kubernetes.io/hostname
          containers:
          - name: provisioner
            image: python:3.14-slim@sha256:33ef7446e8c14b21cb247e23afbcdc90e98853b70812ca46b2265e769a7dfb8b
            command:
            - python3
            - /scripts/provision.py
            env:
            - name: UPTIME_KUMA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-user
            - name: UPTIME_KUMA_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-pass
            - name: UPTIME_KUMA_GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: gotify-token
            volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data
          volumes:
          - name: scripts
            configMap:
              name: uptime-kuma-monitors
              defaultMode: 493
          - name: data
            persistentVolumeClaim:
              claimName: uptime-kuma-data