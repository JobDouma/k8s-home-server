apiVersion: batch/v1
kind: CronJob
metadata:
  name: uptime-kuma-provisioner
  namespace: uptime-kuma
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: uptime-kuma
                topologyKey: kubernetes.io/hostname
          containers:
          - name: provisioner
            image: python:3.14-slim@sha256:3989a23fd2c28a34c7be819e488b958a10601d421ac25bea1e7a5d757365e2d5
            command:
            - python3
            - /scripts/provision.py
            env:
            - name: UPTIME_KUMA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-user
            - name: UPTIME_KUMA_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-pass
            - name: UPTIME_KUMA_GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: gotify-token
            volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data
          volumes:
          - name: scripts
            configMap:
              name: uptime-kuma-monitors
              defaultMode: 493
          - name: data
            persistentVolumeClaim:
              claimName: uptime-kuma