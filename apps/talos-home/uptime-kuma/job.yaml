apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-provisioner-v2  # bump this suffix whenever you change the configmap
  namespace: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma-provisioner
  annotations:
    # To add/change monitors: edit configmap.yaml, bump the name suffix above,
    # commit and push. Flux will create a new Job. Old completed Jobs are left
    # in place (harmless) or clean up with:
    #   kubectl delete job -n uptime-kuma -l app.kubernetes.io/name=uptime-kuma-provisioner
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure

      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: uptime-kuma
              topologyKey: kubernetes.io/hostname

      containers:
        - name: provisioner
          image: python:3.12-slim@sha256:3d5ed973e45820f5ba5e46bd065bd88b3a504ff0724d85980dcd05eab361fcf4
          command: [python3, /scripts/provision.py]
          volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data

      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-monitors
            defaultMode: 0755
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma