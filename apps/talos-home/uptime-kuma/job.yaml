apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-provisioner-v3
  namespace: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma-provisioner
  annotations:
    # Workflow for adding/removing monitors:
    # 1. Edit configmap.yaml (add to monitor list or REMOVED list)
    # 2. Bump this Job name suffix (v3 -> v4, etc.)
    # 3. git commit + push — Flux creates a new Job automatically
    # Clean up old jobs:
    #   kubectl delete job -n uptime-kuma -l app.kubernetes.io/name=uptime-kuma-provisioner
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure

      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: uptime-kuma
              topologyKey: kubernetes.io/hostname

      containers:
        - name: provisioner
          image: python:3.14-slim@sha256:fb83750094b46fd6b8adaa80f66e2302ecbe45d513f6cece637a841e1025b4ca
          command: [python3, /scripts/provision.py]
          volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data

      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-monitors
            defaultMode: 0755
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma