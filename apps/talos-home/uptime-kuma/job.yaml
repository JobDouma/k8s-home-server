apiVersion: batch/v1
kind: CronJob
metadata:
  name: uptime-kuma-provisioner-v2
  namespace: uptime-kuma
spec:
  schedule: "0 3 * * *"
  startingDeadlineSeconds: 300
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: uptime-kuma
                topologyKey: kubernetes.io/hostname
          containers:
          - name: provisioner
            image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
            command:
            - python3
            - /scripts/provision.py
            env:
            - name: UPTIME_KUMA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-user
            - name: UPTIME_KUMA_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-pass
            - name: UPTIME_KUMA_GOTIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: gotify-token
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data
          volumes:
          - name: scripts
            configMap:
              name: uptime-kuma-monitors
              defaultMode: 493
          - name: data
            persistentVolumeClaim:
              claimName: uptime-kuma-data