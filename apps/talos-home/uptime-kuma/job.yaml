apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-provisioner
  namespace: uptime-kuma
  annotations:
    # Safe to re-run at any time — skips monitors that already exist by name.
    # SQLite WAL mode allows concurrent access while Kuma is running.
    # Kuma picks up new rows automatically on its next heartbeat cycle (~60s).
    # To re-run: kubectl delete job uptime-kuma-provisioner -n uptime-kuma
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure

      # Longhorn RWO volumes can only attach to one node at a time.
      # This affinity ensures the Job lands on the same node as the Kuma pod.
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: uptime-kuma
              topologyKey: kubernetes.io/hostname

      containers:
        - name: provisioner
          image: python:3.12-slim@sha256:3d5ed973e45820f5ba5e46bd065bd88b3a504ff0724d85980dcd05eab361fcf4
          command: [python3, /scripts/provision.py]
          volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data

      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-monitors
            defaultMode: 0755
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma