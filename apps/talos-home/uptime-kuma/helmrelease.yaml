apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      uptime-kuma:
        replicas: 1

        pod:
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false

        initContainers:
          provision:
            image:
              repository: python
              tag: "3.12-slim"
            command:
              - /bin/sh
              - -c
              - |
                if [ -f /app/data/.monitors-provisioned ]; then
                  echo "[provision] Already provisioned. Skipping."
                  exit 0
                fi
                pip install uptime-kuma-api --quiet --root-user-action=ignore
                python3 /scripts/provision.py
            env:
              UPTIME_KUMA_ADMIN_USER:
                valueFrom:
                  secretKeyRef:
                    name: uptime-kuma-credentials
                    key: admin-user
              UPTIME_KUMA_ADMIN_PASS:
                valueFrom:
                  secretKeyRef:
                    name: uptime-kuma-credentials
                    key: admin-pass
              UPTIME_KUMA_SERVER:
                value: "http://localhost:3001"

        containers:
          app:
            image:
              repository: louislam/uptime-kuma
              tag: "2.2.1@sha256:7337368a77873f159435de9ef09567f68c31285ed5f951dec36256c4b267ee44"

            env:
              TZ: Europe/Amsterdam
              UPTIME_KUMA_ADMIN_USER:
                valueFrom:
                  secretKeyRef:
                    name: uptime-kuma-credentials
                    key: admin-user
              UPTIME_KUMA_ADMIN_PASS:
                valueFrom:
                  secretKeyRef:
                    name: uptime-kuma-credentials
                    key: admin-pass

            ports:
              - name: http
                containerPort: 3001

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3001
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3001
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 3

    service:
      app:
        controller: uptime-kuma
        type: ClusterIP
        ports:
          http:
            port: 3001

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data

      scripts:
        type: configMap
        name: uptime-kuma-monitors
        defaultMode: 0755
        advancedMounts:
          uptime-kuma:
            provision:
              - path: /scripts/provision.py
                subPath: provision.py
                readOnly: true