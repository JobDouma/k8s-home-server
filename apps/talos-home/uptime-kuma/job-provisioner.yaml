apiVersion: batch/v1
kind: Job
metadata:
  name: uptime-kuma-provisioner
  namespace: uptime-kuma
  annotations:
    # To re-run: delete this Job and let Flux recreate it (stamp file on PVC prevents re-provisioning).
    # To force re-provision: delete Job AND the stamp at /app/data/.monitors-provisioned, then let Flux recreate.
spec:
  # No ttlSecondsAfterFinished — avoids Flux fighting GC by recreating the Job on every reconcile.
  # The stamp file on the PVC is the idempotency guard.
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-kuma
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Uptime Kuma..."
              until wget -qO- http://uptime-kuma.uptime-kuma.svc.cluster.local:3001 >/dev/null 2>&1; do
                echo "Not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Uptime Kuma is ready."

      containers:
        - name: provisioner
          image: python:3.12-slim
          command:
            - python3
            - /scripts/provision.py
          env:
            - name: UPTIME_KUMA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-user
            - name: UPTIME_KUMA_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-credentials
                  key: admin-pass
            - name: UPTIME_KUMA_SERVER
              value: "http://uptime-kuma.uptime-kuma.svc.cluster.local:3001"
          volumeMounts:
            - name: scripts
              mountPath: /scripts/provision.py
              subPath: provision.py
              readOnly: true
            - name: data
              mountPath: /app/data

      volumes:
        - name: scripts
          configMap:
            name: uptime-kuma-monitors
            defaultMode: 0755
        - name: data
          persistentVolumeClaim:
            # app-template v4 names PVCs as: <release-name>-<persistence-key>
            claimName: uptime-kuma-data