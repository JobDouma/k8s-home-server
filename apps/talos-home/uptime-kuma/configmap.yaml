apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-monitors
  namespace: uptime-kuma
data:
  # This script provisions all monitors via the Uptime Kuma API on first boot.
  # It is idempotent — a stamp file prevents re-running on subsequent restarts.
  # Uptime Kuma must be fully started before this runs, so it waits for the API.
  provision-monitors.sh: |
    #!/bin/sh
    set -eu

    STAMP="/app/data/.monitors-provisioned"
    BASE_URL="http://localhost:3001"
    USERNAME="${UPTIME_KUMA_ADMIN_USER:-admin}"
    PASSWORD="${UPTIME_KUMA_ADMIN_PASS:-changeme}"

    log() { echo "[provision] $*"; }

    # Already provisioned
    if [ -f "${STAMP}" ]; then
      log "Monitors already provisioned. Skipping."
      exit 0
    fi

    # Wait for Uptime Kuma API to be ready
    log "Waiting for Uptime Kuma API..."
    for i in $(seq 1 60); do
      if wget -qO- "${BASE_URL}/api/entry-page" >/dev/null 2>&1; then
        log "API is up."
        break
      fi
      log "Not ready yet... (${i}/60)"
      sleep 3
    done

    # Login and get token
    log "Logging in as ${USERNAME}..."
    TOKEN=$(wget -qO- \
      --header="Content-Type: application/json" \
      --post-data="{\"username\":\"${USERNAME}\",\"password\":\"${PASSWORD}\"}" \
      "${BASE_URL}/api/login" \
      | grep -o '"token":"[^"]*"' | cut -d'"' -f4)

    if [ -z "${TOKEN}" ]; then
      log "ERROR: Failed to get auth token. Check credentials."
      exit 1
    fi
    log "Authenticated successfully."

    # Helper to add a monitor
    add_monitor() {
      NAME="$1"
      URL="$2"
      GROUP="$3"

      log "Adding monitor: ${NAME} -> ${URL}"
      wget -qO- \
        --header="Content-Type: application/json" \
        --header="Authorization: Bearer ${TOKEN}" \
        --post-data="{
          \"type\": \"http\",
          \"name\": \"${NAME}\",
          \"url\": \"${URL}\",
          \"interval\": 60,
          \"retryInterval\": 60,
          \"maxretries\": 3,
          \"method\": \"GET\",
          \"ignoreTls\": true,
          \"accepted_statuscodes\": [\"200-299\"],
          \"tags\": [{\"name\": \"${GROUP}\"}]
        }" \
        "${BASE_URL}/api/monitors" >/dev/null || log "WARNING: Failed to add ${NAME}"
    }

    # ── Media ─────────────────────────────────────────────────────────────────
    add_monitor "Jellyfin"      "https://jellyfin.lan"      "media"
    add_monitor "Jellyseerr"    "https://jellyseerr.lan"    "media"
    add_monitor "Radarr"        "https://radarr.lan"        "media"
    add_monitor "Sonarr"        "https://sonarr.lan"        "media"
    add_monitor "Prowlarr"      "https://prowlarr.lan"      "media"
    add_monitor "qBittorrent"   "https://qbittorrent.lan"   "media"

    # ── Monitoring ────────────────────────────────────────────────────────────
    add_monitor "Prometheus"    "https://prometheus.lan"    "monitoring"
    add_monitor "Grafana"       "https://grafana.lan"       "monitoring"
    add_monitor "Falco"         "https://falco.lan"         "monitoring"
    add_monitor "Longhorn"      "https://longhorn.lan"      "monitoring"
    add_monitor "Traefik"       "https://traefik.lan"       "networking"

    # ── Networking & DNS ──────────────────────────────────────────────────────
    add_monitor "Blocky DNS"    "https://blocky.lan"        "networking"
    add_monitor "Authentik"     "https://auth.lan"          "networking"

    # ── Apps ──────────────────────────────────────────────────────────────────
    add_monitor "Dashy"         "https://dashy.lan"         "apps"
    add_monitor "FreshRSS"      "https://freshrss.lan"      "apps"
    add_monitor "Joplin"        "https://joplin.lan"        "apps"
    add_monitor "Gotify"        "https://gotify.lan"        "apps"
    add_monitor "Immich"        "https://immich.lan"        "apps"
    add_monitor "Headlamp"      "https://headlamp.lan"      "apps"

    # ── Infrastructure ────────────────────────────────────────────────────────
    add_monitor "TrueNAS"       "https://truenas.lan"       "infrastructure"
    add_monitor "Router"        "http://router.lan"         "infrastructure"
    add_monitor "Omni"          "https://omni.lan"          "infrastructure"

    # ── Talos nodes (TCP ping on port 6443 k8s API) ───────────────────────────
    log "Adding TCP monitors for Talos nodes..."
    for NODE in "talos-cp-1:192.168.2.22" "talos-cp-2:192.168.2.6" "talos-cp-3:192.168.2.16"; do
      LABEL=$(echo "${NODE}" | cut -d: -f1)
      IP=$(echo "${NODE}" | cut -d: -f2)
      wget -qO- \
        --header="Content-Type: application/json" \
        --header="Authorization: Bearer ${TOKEN}" \
        --post-data="{
          \"type\": \"tcp-ping\",
          \"name\": \"${LABEL} (k8s API)\",
          \"hostname\": \"${IP}\",
          \"port\": 6443,
          \"interval\": 30,
          \"retryInterval\": 30,
          \"maxretries\": 3,
          \"tags\": [{\"name\": \"infrastructure\"}]
        }" \
        "${BASE_URL}/api/monitors" >/dev/null || log "WARNING: Failed to add ${LABEL}"
    done

    touch "${STAMP}"
    log "All monitors provisioned successfully."