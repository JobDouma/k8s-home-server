apiVersion: v1
kind: ConfigMap
metadata:
  name: uptime-kuma-monitors
  namespace: uptime-kuma
data:
  provision.py: |
    #!/usr/bin/env python3
    import os, sys, time, subprocess

    SERVER   = os.environ["UPTIME_KUMA_SERVER"]
    USERNAME = os.environ["UPTIME_KUMA_ADMIN_USER"]
    PASSWORD = os.environ["UPTIME_KUMA_ADMIN_PASS"]

    def log(msg): print(f"[provision] {msg}", flush=True)

    log("Installing uptime-kuma-api...")
    subprocess.run(
        [sys.executable, "-m", "pip", "install", "uptime-kuma-api",
         "--quiet", "--root-user-action=ignore"],
        check=True
    )

    from uptime_kuma_api import UptimeKumaApi, MonitorType

    log("Connecting...")
    for i in range(60):
        try:
            api = UptimeKumaApi(SERVER, wait_events=2, ssl_verify=False)
            break
        except Exception as e:
            log(f"  retry {i+1}/60: {e}"); time.sleep(3)
    else:
        log("ERROR: could not connect"); sys.exit(1)

    log(f"Logging in as {USERNAME}...")
    try:
        api.login(USERNAME, PASSWORD)
        log("Authenticated.")
    except Exception as login_err:
        log(f"Login failed ({login_err}), trying setup (fresh instance)...")
        try:
            api.setup(USERNAME, PASSWORD)
            api.login(USERNAME, PASSWORD)
            log("Setup + login OK.")
        except Exception as setup_err:
            if "already" in str(setup_err).lower():
                # Already initialized but wrong credentials
                log(f"ERROR: instance initialized but login failed. Check credentials.")
            else:
                log(f"ERROR: setup failed: {setup_err}")
            api.disconnect()
            sys.exit(1)

    existing = {m["name"] for m in api.get_monitors()}
    log(f"Existing monitors: {len(existing)}")

    def http(name, url):
        if name in existing: log(f"  skip: {name}"); return
        try:
            api.add_monitor(type=MonitorType.HTTP, name=name, url=url,
                            interval=60, retryInterval=60, maxretries=3,
                            ignoreTls=True, accepted_statuscodes=["200-299"])
            log(f"  added: {name}")
        except Exception as e: log(f"  WARN {name}: {e}")

    def tcp(name, host, port):
        if name in existing: log(f"  skip: {name}"); return
        try:
            api.add_monitor(type=MonitorType.TCP_PING, name=name,
                            hostname=host, port=port,
                            interval=30, retryInterval=30, maxretries=3)
            log(f"  added: {name}")
        except Exception as e: log(f"  WARN {name}: {e}")

    # Media
    http("Jellyfin",    "https://jellyfin.lan")
    http("Jellyseerr",  "https://jellyseerr.lan")
    http("Sonarr",      "https://sonarr.lan")
    http("Radarr",      "https://radarr.lan")
    http("Prowlarr",    "https://prowlarr.lan")
    http("qBittorrent", "https://qbittorrent.lan")
    http("SABnzbd",     "https://sabnzbd.lan")
    http("Immich",      "https://immich.lan")
    # Monitoring
    http("Grafana",     "https://grafana.lan")
    http("Prometheus",  "https://prometheus.lan")
    http("Falco",       "https://falco.lan")
    http("Longhorn",    "https://longhorn.lan")
    http("Uptime Kuma", "https://uptime-kuma.lan")
    # Networking
    http("Traefik",     "https://traefik.lan")
    http("Blocky DNS",  "https://blocky.lan")
    http("Authentik",   "https://auth.lan")
    # Apps
    http("Dashy",       "https://dashy.lan")
    http("FreshRSS",    "https://freshrss.lan")
    http("Joplin",      "https://joplin.lan")
    http("Gotify",      "https://gotify.lan")
    http("Headlamp",    "https://headlamp.lan")
    # Infrastructure
    http("TrueNAS",     "https://truenas.lan")
    http("Router",      "http://router.lan")
    http("Omni",        "https://omni.lan")
    # Talos nodes
    tcp("talos-cp-1 (k8s API)", "192.168.2.22", 6443)
    tcp("talos-cp-2 (k8s API)", "192.168.2.6",  6443)
    tcp("talos-cp-3 (k8s API)", "192.168.2.16", 6443)

    api.disconnect()
    log("Done.")