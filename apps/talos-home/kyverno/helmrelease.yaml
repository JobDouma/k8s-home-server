apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system

  values:
    crds:
      install: true

    features:
      backgroundScan:
        enabled: true
        backgroundScanWorkers: 1
        backgroundScanInterval: 12h
        skipResourceFilters: true

    admissionController:
      replicas: 1
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 500m
          memory: 384Mi
        requests:
          cpu: 100m
          memory: 192Mi

    backgroundController:
      enabled: true
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 150m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi

    cleanupController:
      enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi

    reportsController:
      enabled: true
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi

    config:
      excludeGroups:
        - system:nodes
      resourceFilters:
        - '[Event,*,*]'
        - '[*,kube-system,*]'
        - '[*,kube-public,*]'
        - '[*,kube-node-lease,*]'
        - '[*,flux-system,*]'
        - '[ReplicaSet,*,*]'
        - '[ReportChangeRequest,*,*]'
        - '[Node,*,*]'
        - '[APIService,*,*]'
        - '[TokenReview,*,*]'
        - '[SubjectAccessReview,*,*]'