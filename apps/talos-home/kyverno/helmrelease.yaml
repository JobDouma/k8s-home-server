apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system

  values:
    crds:
      install: true

    admissionController:
      replicas: 1  # bump to 3 for HA if you add nodes
      serviceMonitor:
        enabled: true  # scrape by your VictoriaMetrics

    backgroundController:
      enabled: true
      serviceMonitor:
        enabled: true
      extraArgs:
        - --backgroundScanWorkers=1
        - --backgroundScanInterval=12h
      resources:
        limits:
          cpu: 150m
          memory: 128Mi

    cleanupController:
      enabled: true

    reportsController:
      enabled: true
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi

    # Exclude system namespaces from policy enforcement
    # Kyverno self-excludes via the namespace label above
    config:
      excludeGroups:
        - system:nodes
      resourceFilters:
        - '[Event,*,*]'
        - '[*,kube-system,*]'
        - '[*,kube-public,*]'
        - '[*,kube-node-lease,*]'
        - '[*,flux-system,*]'
        - '[ReplicaSet,*,*]'
        - '[ReportChangeRequest,*,*]'
        - '[Node,*,*]'
        - '[APIService,*,*]'
        - '[TokenReview,*,*]'
        - '[SubjectAccessReview,*,*]'