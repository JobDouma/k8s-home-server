apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  chart:
    spec:
      chart: kyverno
      version: "3.8.0"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system

  values:
    crds:
      install: true

    features:
      backgroundScan:
        enabled: true
        backgroundScanWorkers: 2        # was 1; 2 is safe on a 2-node cluster
        backgroundScanInterval: 12h
        skipResourceFilters: true

    admissionController:
      # HA: 3 replicas so a rolling Talos upgrade never leaves 0 webhooks available.
      # With 1 replica + Kyverno webhook in failOpen=false (default), a pod restart
      # during a node drain can block ALL pod scheduling cluster-wide.
      replicas: 3
      podDisruptionBudget:
        minAvailable: 1
      serviceMonitor:
        enabled: true
      # Kyverno admission webhook failure policy:
      # "Ignore" means if all Kyverno pods are down, admission proceeds anyway.
      # For a homelab this is the right default — prevents a Kyverno outage from
      # locking you out of your own cluster. Flip to "Fail" if you need hard guarantees.
      webhookConfiguration:
        failurePolicy: Ignore
        timeoutSeconds: 10
      resources:
        limits:
          cpu: 500m
          memory: 384Mi
        requests:
          cpu: 100m
          memory: 192Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno

    backgroundController:
      enabled: true
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 150m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi

    cleanupController:
      enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi

    reportsController:
      enabled: true
      serviceMonitor:
        enabled: true
      resources:
        limits:
          cpu: 100m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi

    config:
      excludeGroups:
        - system:nodes
      resourceFilters:
        - '[Event,*,*]'
        - '[*,kube-system,*]'
        - '[*,kube-public,*]'
        - '[*,kube-node-lease,*]'
        - '[*,flux-system,*]'
        - '[*,local-path-storage,*]'   # provisioner helper pods are ephemeral
        - '[*,tailscale,*]'            # tailscale uses privileged pods; already audited
        - '[ReplicaSet,*,*]'
        - '[ReportChangeRequest,*,*]'
        - '[Node,*,*]'
        - '[APIService,*,*]'
        - '[TokenReview,*,*]'
        - '[SubjectAccessReview,*,*]'