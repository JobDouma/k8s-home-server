apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-image-signatures
  annotations:
    policies.kyverno.io/title: Enforce Cosign Image Signatures
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Verifies that images from ghcr.io/jobdouma/* are signed with your cosign key.
      Now set to Enforce (was Audit).
      mutateDigest: true so Kyverno pins the exact digest at admission time —
      this prevents tag-mutable attacks even if the registry is compromised after deployment.
      useCache: true avoids re-fetching the manifest on every admission call.
spec:
  validationFailureAction: Audit   # flipped from Audit
  background: true
  rules:
    - name: verify-image-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/jobdouma/*"
          # mutateDigest: true rewrites the image tag to its digest at admission.
          # This means once a Pod is admitted, the exact image layer is pinned —
          # even if someone pushes a new image to the same tag later.
          mutateDigest: false
          # Verify the digest matches what was signed — prevents digest substitution.
          verifyDigest: true
          # Cache registry responses for 10 minutes to reduce latency
          useCache: true
          attestors:
            - entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAElfYkbUXi4Wjb7nH76No8CgnTZNw6
                      EQNYY+5VeuPasj7FatvrsOuVpPMWxPhelHld2RlQG1Id5flgmH2P1ZRPpQ==
                      -----END PUBLIC KEY-----
                    # Rekor transparency log verification — set to false for air-gapped
                    # or if you sign without --upload-tlog. Your cosign key is local so
                    # you likely sign offline; set to false to avoid Rekor NETWORK calls.
                    rekor:
                      ignoreTlog: true