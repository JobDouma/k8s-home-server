apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-latest-tag
  annotations:
    policies.kyverno.io/title: Block Latest Image Tag
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Blocks pods that use ':latest' tag or no tag at all.
      Covers containers, initContainers, and ephemeralContainers.
      Autogen disabled; explicit rules for Pod, Deployment/StatefulSet/DaemonSet/Job, and CronJob.
spec:
  autogenControllers: none
  validationFailureAction: Audit
  background: true
  rules:
    # ── Pod ──────────────────────────────────────────────────────────────────
    - name: block-latest-tag-containers
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "Image tag ':latest' (or no tag) is not allowed. Use a specific tag + digest."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-init-containers
      match:
        any:
          - resources:
              kinds: [Pod]
      preconditions:
        all:
          - key: "{{ request.object.spec.initContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "initContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-ephemeral-containers
      match:
        any:
          - resources:
              kinds: [Pod]
      preconditions:
        all:
          - key: "{{ request.object.spec.ephemeralContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "ephemeralContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.ephemeralContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    # ── Deployment / StatefulSet / DaemonSet / Job (spec.template.spec.*) ───
    - name: block-latest-tag-deploy-containers
      match:
        any:
          - resources:
              kinds: [Deployment, StatefulSet, DaemonSet, Job]
      validate:
        message: "Image tag ':latest' (or no tag) is not allowed. Use a specific tag + digest."
        foreach:
          - list: "request.object.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-deploy-init-containers
      match:
        any:
          - resources:
              kinds: [Deployment, StatefulSet, DaemonSet, Job]
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.initContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "initContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.template.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-deploy-ephemeral-containers
      match:
        any:
          - resources:
              kinds: [Deployment, StatefulSet, DaemonSet, Job]
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.ephemeralContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "ephemeralContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.template.spec.ephemeralContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    # ── CronJob (spec.jobTemplate.spec.template.spec.*) ─────────────────────
    - name: block-latest-tag-cronjob-containers
      match:
        any:
          - resources:
              kinds: [CronJob]
      validate:
        message: "Image tag ':latest' (or no tag) is not allowed. Use a specific tag + digest."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-cronjob-init-containers
      match:
        any:
          - resources:
              kinds: [CronJob]
      preconditions:
        all:
          - key: "{{ request.object.spec.jobTemplate.spec.template.spec.initContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "initContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.initContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"

    - name: block-latest-tag-cronjob-ephemeral-containers
      match:
        any:
          - resources:
              kinds: [CronJob]
      preconditions:
        all:
          - key: "{{ request.object.spec.jobTemplate.spec.template.spec.ephemeralContainers || `[]` | length(@) }}"
            operator: GreaterThanOrEquals
            value: 1
      validate:
        message: "ephemeralContainer image tag ':latest' (or no tag) is not allowed."
        foreach:
          - list: "request.object.spec.jobTemplate.spec.template.spec.ephemeralContainers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image | contains(@, ':') }}"
                    operator: Equals
                    value: "false"