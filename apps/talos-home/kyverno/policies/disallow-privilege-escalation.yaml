apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Ensures containers set allowPrivilegeEscalation: false.
      This prevents a process inside a container from gaining more privileges
      than its parent process — blocking most setuid-based escalation paths.
      Exempts namespaces that legitimately need privilege.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - local-path-storage
                - flux-system
                - tailscale
                - metallb-system
                - falco
                - actual-ai
      validate:
        message: "Container must set securityContext.allowPrivilegeEscalation: false."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.securityContext.allowPrivilegeEscalation || true }}"
                    operator: Equals
                    value: true