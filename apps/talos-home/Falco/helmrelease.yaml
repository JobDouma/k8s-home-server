apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  chart:
    spec:
      chart: falco
      version: "4.8.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values:

    driver:
      kind: modern_ebpf

    falco:
      jsonOutput: true
      logLevel: info

    falcosidekick:
      enabled: true

      config:
        slack:
          webhookurl: ""  # optional
        webhook:
          address: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi