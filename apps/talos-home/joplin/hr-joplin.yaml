apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: joplin
  namespace: joplin
spec:
  interval: 15m
  timeout: 10m

  install:
    remediation:
      retries: 3

  upgrade:
    remediation:
      strategy: uninstall
      retries: 3

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      joplin:
        containers:
          app:
            image:
              repository: joplin/server
              tag: 3.5.2

            env:
              APP_BASE_URL: http://joplin.lan
              APP_PORT: "22300"

              DB_CLIENT: pg
              POSTGRES_HOST: joplin-postgres
              POSTGRES_PORT: "5432"

              PM2_HOME: /home/joplin/.pm2

              TZ: Europe/Amsterdam
              PUID: 1000
              PGID: 1000

            envFrom:
              - secretRef:
                  name: joplin-secret

            probes:
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: http
                  failureThreshold: 30
                  periodSeconds: 10

              readiness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: http

              liveness:
                enabled: true
                spec:
                  httpGet:
                    path: /api/ping
                    port: http

    service:
      app:
        controller: joplin
        type: ClusterIP
        ports:
          http:
            port: 22300
            targetPort: http

    persistence:

      pm2:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: joplin-app-config
        advancedMounts:
          joplin:
            app:
              - path: /home/joplin/.pm2

      logs:
        enabled: true
        type: emptyDir
        advancedMounts:
          joplin:
            app:
              - path: /home/joplin/packages/server/logs


