apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: joplin-postgres
  namespace: joplin
spec:
  interval: 15m

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      postgres:
        containers:
          app:
            image:
              repository: postgres
              tag: 16

            envFrom:
              - secretRef:
                  name: joplin-secret

            env:
              PGDATA: /var/lib/postgresql/data

            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000

            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      postgres:
        controller: postgres
        ports:
          db:
            port: 5432

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: tank-configs
        globalMounts:
          - path: /var/lib/postgresql/data
            subPath: joplin/postgres/data
