apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: joplin-postgres
  namespace: joplin
spec:
  interval: 15m

  chart:
    spec:
      chart: app-template
      version: "4.6.2"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:

    defaultPodOptions:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: false
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      postgres:
        containers:
          app:
            image:
              repository: postgres
              tag: "16"

            envFrom:
              - secretRef:
                  name: joplin-secret

            env:
              PGDATA: /var/lib/postgresql/data

    service:
      postgres:
        controller: postgres
        ports:
          db:
            port: 5432

    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: joplin-postgres-config
        globalMounts:
          - path: /var/lib/postgresql/data
