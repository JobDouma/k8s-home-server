apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: joplin-postgres
  namespace: joplin
spec:
  interval: 15m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      strategy: uninstall
      retries: 3
  chart:
    spec:
      chart: app-template
      version: "5.0.1"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true
        fsGroupChangePolicy: Always
    controllers:
      postgres:
        strategy: Recreate
        initContainers:
          fix-permissions:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                mkdir -p /var/lib/postgresql/data/pgdata
                chown -R 999:999 /var/lib/postgresql/data
                chmod 700 /var/lib/postgresql/data/pgdata
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
        containers:
          app:
            image:
              repository: postgres
              tag: "18@sha256:3a82e1f56c8f0f5616a11103ac3d47e632c3938698946a7ad26da0df1334744a"
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: joplin-secret
            env:
              PGDATA: /var/lib/postgresql/data/pgdata
              POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
              POSTGRES_HOST: 0.0.0.0
              TZ: Europe/Amsterdam
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            probes:
              startup:
                enabled: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER"
                  failureThreshold: 30
                  periodSeconds: 5
              readiness:
                enabled: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER"
              liveness:
                enabled: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER"
    service:
      postgres:
        controller: postgres
        type: ClusterIP
        ports:
          db:
            port: 5432
            targetPort: 5432
    persistence:
      data:
        enabled: true
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: local-path
        advancedMounts:
          postgres:
            app:
              - path: /var/lib/postgresql/data
